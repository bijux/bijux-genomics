site_name: Bijux DNA
site_description: "Contract-first genomics pipelines for FASTQ/BAM with reproducible runs and deterministic reporting."
site_url: !ENV [SITE_URL, https://bijux.github.io/bijux-dna/]
site_author: Bijan Mousavi
repo_url: https://github.com/bijux/bijux-dna
repo_name: bijux/bijux-dna
edit_uri: ""

strict: true
use_directory_urls: true
dev_addr: 127.0.0.1:8000
docs_dir: docs
site_dir: artifacts/docs/site

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/bijux_logo_hq.png
  favicon: assets/bijux_icon.png
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
    - navigation.footer
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - social:
      enabled: !ENV [ENABLE_SOCIAL_CARDS, false]
      cache_dir: artifacts/docs/.cache/social
  - autorefs
  - redirects: {}
  - tags
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom

markdown_extensions:
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - pymdownx.magiclink
  - pymdownx.tasklist
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bijux/bijux-dna
  analytics:
    provider: plausible
    domain: bijux.github.io
  copyright:
    text: "© 2025 Bijan Mousavi"
  release_tag: !ENV [RELEASE_TAG, "main"]

extra_css:
  - assets/styles/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

watch:
  - artifacts
  - src
  - scripts
  - config
  - tests
  - changelog.d

nav:
  - Home: index.md
  - Intro:
      - What Is Bijux DNA: 00-intro/WHAT_IS_BIJUX.md
      - Start Here: 00-intro/QUICKSTART.md
      - Docs Map: 00-intro/DOCS_MAP.md
      - Glossary: 00-intro/GLOSSARY.md
      - Doc Promises: 00-intro/DOC_PROMISES.md
      - Scope: 00-intro/SCOPE.md
      - Refusals: 00-intro/REFUSALS.md
  - Architecture:
      - Overview: 10-architecture/ARCHITECTURE_OVERVIEW.md
      - Boundaries: 10-architecture/BOUNDARY_MAP.md
      - Boundary Diagram: 10-architecture/BOUNDARY_DIAGRAM.md
      - Dependency Rules: 10-architecture/DEPENDENCY_RULES.md
      - SSOT: 10-architecture/SSOT.md
      - Contract Spine: 10-architecture/CONTRACT_SPINE.md
      - Dataflow: 10-architecture/DATAFLOW.md
      - Anti-patterns: 10-architecture/ANTI_PATTERNS.md
      - Contracts:
          - Artifacts: 10-architecture/CONTRACTS/ARTIFACTS.md
          - Run Output: 10-architecture/CONTRACTS/RUN_OUTPUT.md
  - Science:
      - FASTQ:
          - Stage Catalog: 20-science/fastq/STAGE_CATALOG.md
          - Stage Taxonomy: 20-science/fastq/STAGE_TAXONOMY.md
          - Methodological Intent: 20-science/fastq/METHODOLOGICAL_INTENT.md
          - Operational Contract: 20-science/fastq/OPERATIONAL_CONTRACT.md
          - Metric Semantics: 20-science/fastq/METRIC_SEMANTICS.md
          - Tools Roster: 20-science/fastq/TOOLS_ROSTER.md
          - References: 20-science/fastq/REFERENCES.md
          - Scientific Spec: 20-science/fastq/SCIENTIFIC_SPEC.md
          - Gold Pipeline: 20-science/fastq/GOLD_PIPELINE_SPEC.md
      - BAM:
          - Stage Catalog: 20-science/bam/STAGE_CATALOG.md
          - Stage Taxonomy: 20-science/bam/STAGE_TAXONOMY.md
          - Methodological Intent: 20-science/bam/METHODOLOGICAL_INTENT.md
          - Operational Contract: 20-science/bam/OPERATIONAL_CONTRACT.md
          - Metric Semantics: 20-science/bam/METRIC_SEMANTICS.md
          - Tools Roster: 20-science/bam/TOOLS_ROSTER.md
          - References: 20-science/bam/REFERENCES.md
      - Tool Index: 20-science/TOOL_INDEX.md
      - Validity Limits: 20-science/VALIDITY_LIMITS.md
  - Operations:
      - Run Artifacts: 30-operations/RUN_ARTIFACTS.md
      - Report Contract: 30-operations/REPORT_CONTRACT.md
      - Explainability: 30-operations/EXPLAINABILITY.md
      - Containers: 30-operations/CONTAINERS.md
      - Security: 30-operations/SECURITY.md
      - Threat Model: 30-operations/THREAT_MODEL.md
      - CI: 30-operations/CI.md
      - Developer Workflow: 30-operations/DEVELOPER_WORKFLOW.md
      - Artifact Explorer: 30-operations/ARTIFACT_EXPLORER.md
      - Release Hygiene: 30-operations/RELEASE_HYGIENE.md
      - MkDocs Build: 30-operations/MKDOCS_BUILD.md
  - Policies:
      - Policies Explained: 40-policies/POLICIES_EXPLAINED.md
      - Developer Workflow: 40-policies/DEVELOPER_WORKFLOW.md
      - Style: 40-policies/STYLE.md
      - Policy Index: 40-policies/POLICY_INDEX.md
      - Failure Playbooks: 40-policies/FAILURE_PLAYBOOKS.md
      - Policy Ownership: 40-policies/POLICY_OWNERSHIP.md
      - Maturity Ladder: 40-policies/MATURITY_LADDER.md
      - Policy Stability: 40-policies/POLICY_STABILITY.md
  - Reference:
      - Reference Index: 50-reference/REFERENCE_INDEX.md
      - Schemas Index: 50-reference/SCHEMAS_INDEX.md
      - Compatibility Matrix: 50-reference/COMPATIBILITY_MATRIX.md
      - Examples: 50-reference/EXAMPLES.md
      - No Orphans: 50-reference/NO_ORPHANS.md
      - Crate Map: 50-reference/CRATE_MAP.md
      - Pipelines: 50-reference/PIPELINES.md
      - Contract Versioning: 50-reference/CONTRACT_VERSIONING.md

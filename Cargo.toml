[workspace]
resolver = "2"
members = [
  "crates/bijux-analyze",
  "crates/bijux-api",
  "crates/bijux-bench",
  "crates/bijux-cli",
  "crates/bijux-core",
  "crates/bijux-domain-bam",
  "crates/bijux-domain-fastq",
  "crates/bijux-engine",
  "crates/bijux-environment",
  "crates/bijux-guardrails",
  "crates/bijux-infra",
  "crates/bijux-planner-bam",
  "crates/bijux-planner-fastq",
  "crates/bijux-runner",
  "crates/bijux-pipelines",
  "crates/bijux-runtime",
  "crates/bijux-stages-bam",
  "crates/bijux-stages-fastq",
]

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.76"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde", "clock"] }
tracing-appender = "0.2"
walkdir = "2"
regex = "1"
rusqlite = "0.31"
sha2 = "0.10"
sysinfo = "0.30"
tempfile = "3"
schemars = { version = "0.8", features = ["derive"] }
toml = "0.8"
opentelemetry = "0.22"
bijux-guardrails = { path = "crates/bijux-guardrails" }

[workspace.lints.rust]
unsafe_code = "forbid"
unused_imports = "deny"
unused_must_use = "deny"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"

[profile.dev]
debug = 1
incremental = true
codegen-units = 256

[profile.dev.package."*"]
opt-level = 1

[profile.test]
debug = 1
incremental = true
codegen-units = 256

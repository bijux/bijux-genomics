schema_version: "bijux.stage.v1"
stage_id: "vcf.call_gl"
status: "supported"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.call_gl in the governed domain registry."
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "Many"
outputs:
  - name: "gl_sites_vcf"
    data_type: "vcf"
    cardinality: "One"
  - name: "gl_provenance"
    data_type: "json"
    cardinality: "One"
required_inputs: ["bam"]
required_outputs: ["gl_sites_vcf", "gl_provenance"]
tool_capability_requirements: []
metrics:
  - name: "gl_sites_count"
  - name: "mean_gl_depth"
  - name: "gl_parameter_profile"
compatible_tools: ["angsd", "bcftools"]
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "Likelihood-based calling is used for low-coverage contexts."
  - "GL caller defaults are locked (calling model, mapQ/baseQ, and depth filters)."
  - "GL calling emits provenance with parameter values and source references."
bank_hooks: ["none"]
invariants:
  - "tool_pinned"
  - "gl_fields_present"
allowed_missingness:
  - "none"
planned_out_of_scope: []

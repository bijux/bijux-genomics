schema_version: "bijux.stage.v1"
stage_id: "vcf.demography"
status: "planned"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.demography in the governed domain registry."
inputs:
  - name: "ibd_segments"
    data_type: "tsv"
    cardinality: "One"
outputs:
  - name: "demography_report"
    data_type: "json"
    cardinality: "One"
required_inputs: ["ibd_segments"]
required_outputs: ["demography_report"]
tool_capability_requirements: []
metrics:
  - name: "method"
  - name: "inference_status"
  - name: "status"
  - name: "insufficient_reason"
  - name: "time_bins"
  - name: "ne_estimates"
  - name: "insufficient_data_probe"
compatible_tools: ["ibdne"]
single_tool_justification: "ibdne remains the planned default because the active demography contract mirrors its expected Ne trajectory surface while external runtime packaging is still pending."
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "ibd_segments_are_filtered_and_comparable_before_demography"
  - "generation_time_and_recombination_model_are_fixed_per_run"
  - "demography_outputs_emit_metrics_json_with_schema_bijux.vcf.demography.v1"
bank_hooks: ["none"]
invariants: ["stable_artifact_contract"]
allowed_missingness:
  - "none"
planned_out_of_scope: []

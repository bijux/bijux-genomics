schema_version: "bijux.stage.v1"
stage_id: "vcf.demography"
status: "planned"
scope: "post_vcf"
domain: "vcf"
inputs:
  - name: "ibd_segments"
    data_type: "json"
    cardinality: "One"
outputs:
  - name: "demography_report"
    data_type: "json"
    cardinality: "One"
required_inputs: ["ibd_segments"]
required_outputs: ["demography_report"]
metrics:
  - name: "ne_recent"
  - name: "ne_confidence_interval"
compatible_tools: ["ibdne"]
single_tool_justification: "ibdne is the current planned baseline for Ne inference from IBD summaries."
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions: ["planned_stage"]
bank_hooks: ["none"]
invariants: ["stable_artifact_contract"]
allowed_missingness: []
planned_out_of_scope: ["full scientific validation pending downstream admission"]

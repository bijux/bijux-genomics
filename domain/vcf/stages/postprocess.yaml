schema_version: "bijux.stage.v1"
stage_id: "vcf.postprocess"
status: "planned"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.postprocess in the governed domain registry."
inputs:
  - name: "imputed_vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "postprocess_vcf"
    data_type: "vcf"
    cardinality: "One"
required_inputs: ["imputed_vcf"]
required_outputs: ["postprocess_vcf"]
tool_capability_requirements: []
metrics:
  - name: "postprocess_status"
compatible_tools: ["bcftools"]
single_tool_justification: "bcftools is the current deterministic postprocess baseline for planned imputation outputs."
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions: ["planned_stage"]
bank_hooks: ["none"]
invariants: ["stable_artifact_contract"]
allowed_missingness:
  - "none"
planned_out_of_scope: ["full scientific validation pending downstream admission"]

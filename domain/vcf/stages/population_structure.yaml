schema_version: "bijux.stage.v1"
stage_id: "vcf.population_structure"
status: "planned"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.population_structure in the governed domain registry."
inputs:
  - name: "filtered_vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "population_structure_report"
    data_type: "json"
    cardinality: "One"
required_inputs: ["filtered_vcf"]
required_outputs: ["population_structure_report"]
tool_capability_requirements: []
metrics:
  - name: "sample_count"
  - name: "pair_count"
  - name: "within_population_pair_count"
  - name: "cross_population_pair_count"
compatible_tools: ["plink", "plink2", "eigensoft"]
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "sample_population_labels_are_required"
  - "pca_and_admixture_outputs_are_consumed_from_the_same_run"
  - "population_structure_outputs_emit_metrics_json_with_schema_bijux.vcf.population_structure.v1"
bank_hooks: ["none"]
invariants: ["stable_artifact_contract"]
allowed_missingness:
  - "none"
planned_out_of_scope: []

schema_version: "bijux.stage.v1"
stage_id: "vcf.stats"
status: "supported"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.stats in the governed domain registry."
inputs:
  - name: "vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "stats_json"
    data_type: "json"
    cardinality: "One"
required_inputs: ["vcf"]
required_outputs: ["stats_json"]
tool_capability_requirements: []
metrics:
  - name: "variant_count"
  - name: "snp_count"
  - name: "indel_count"
  - name: "transition_count"
  - name: "transversion_count"
  - name: "ti_tv"
  - name: "sample_count"
compatible_tools: ["bcftools"]
single_tool_justification: "bcftools is the only production-approved stats provider in current VCF baseline."
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions: ["vcf_is_normalized"]
bank_hooks: ["none"]
invariants: ["stats_required"]
allowed_missingness:
  - "none"
planned_out_of_scope: []

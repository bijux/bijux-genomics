schema_version: "bijux.stage.v1"
stage_id: "vcf.ibd"
status: "planned"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.ibd in the governed domain registry."
inputs:
  - name: "filtered_vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "ibd_segments"
    data_type: "tsv"
    cardinality: "One"
required_inputs: ["filtered_vcf"]
required_outputs: ["ibd_segments"]
tool_capability_requirements: []
metrics:
  - name: "pair_count"
  - name: "rows"
  - name: "status"
  - name: "insufficient_reason"
  - name: "insufficient_overlap_probe"
compatible_tools: ["germline", "ibdseq", "ibdhap"]
single_tool_justification: "germline remains the planned default because it matches the active normalized pair-row contract while retained alternatives stay comparative."
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "phasing_quality_thresholds_are_fixed_per_run"
  - "ibd_outputs_emit_metrics_json_with_schema_bijux.vcf.ibd.v1"
bank_hooks: ["none"]
invariants: ["stable_artifact_contract"]
allowed_missingness:
  - "none"
planned_out_of_scope: []

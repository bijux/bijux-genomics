schema_version: "bijux.stage.v1"
stage_id: "vcf.ibd"
status: "planned"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.ibd in the governed domain registry."
inputs:
  - name: "vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "ibd_segments"
    data_type: "json"
    cardinality: "One"
required_inputs: ["vcf"]
required_outputs: ["ibd_segments"]
tool_capability_requirements: []
metrics:
  - name: "ibd_segment_count"
  - name: "ibd_total_length_cM"
  - name: "ibd_length_bins_cM"
  - name: "pairwise_ibd_sharing_matrix"
compatible_tools: ["germline", "ibdhap"]
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "phasing_quality_thresholds_are_fixed_per_run"
  - "ibd_outputs_emit_metrics_json_with_schema_bijux.vcf.ibd.v1"
bank_hooks: ["none"]
invariants: ["stable_artifact_contract"]
allowed_missingness:
  - "none"
planned_out_of_scope: ["full scientific validation pending downstream admission"]

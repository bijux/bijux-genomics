schema_version: "bijux.stage.v1"
stage_id: "vcf.pca"
status: "supported"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.pca in the governed domain registry."
inputs:
  - name: "vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "pca_report"
    data_type: "json"
    cardinality: "One"
required_inputs: ["vcf"]
required_outputs: ["pca_report"]
tool_capability_requirements: []
metrics:
  - name: "sample_count"
  - name: "variant_count"
  - name: "excluded_samples"
  - name: "unexpected_samples"
  - name: "eigenvalues"
compatible_tools: ["plink2", "eigensoft"]
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "diploid_assumptions"
  - "ld_pruning_and_missingness_thresholds_are_fixed_per_run"
  - "pca_outputs_emit_metrics_json_with_schema_bijux.vcf.pca.v1"
bank_hooks: ["none"]
invariants: ["stable_artifact_contract"]
allowed_missingness:
  - "none"
planned_out_of_scope: []

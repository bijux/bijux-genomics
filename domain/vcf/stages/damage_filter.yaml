schema_version: "bijux.stage.v1"
stage_id: "vcf.damage_filter"
status: "supported"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.damage_filter in the governed domain registry."
inputs:
  - name: "vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "damage_filtered_vcf"
    data_type: "vcf"
    cardinality: "One"
  - name: "damage_bias_audit_report"
    data_type: "json"
    cardinality: "One"
required_inputs: ["vcf"]
required_outputs: ["damage_filtered_vcf", "damage_bias_audit_report"]
tool_capability_requirements: []
metrics:
  - name: "ct_ga_masked_sites"
  - name: "pmd_filtered_reads"
  - name: "damage_strategy_applied"
  - name: "damage_bias_before_after_summary"
compatible_tools: ["bcftools", "angsd"]
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "C>T/G>A and PMD thresholds are explicit and versioned."
  - "Damage filtering must support PMD-based filtering and C>T/G>A masking strategies."
  - "Bias audit section must summarize before/after damage filtering metrics."
bank_hooks: ["none"]
invariants:
  - "tool_pinned"
  - "damage_rules_reported"
allowed_missingness:
  - "none"
planned_out_of_scope: []

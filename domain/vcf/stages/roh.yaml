schema_version: "bijux.stage.v1"
stage_id: "vcf.roh"
status: "planned"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.roh in the governed domain registry."
inputs:
  - name: "filtered_vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "roh_report"
    data_type: "json"
    cardinality: "One"
required_inputs: ["filtered_vcf"]
required_outputs: ["roh_report"]
tool_capability_requirements: []
metrics:
  - name: "sample_count"
  - name: "segment_count"
  - name: "total_length"
  - name: "segments"
  - name: "per_sample_summary"
  - name: "status"
compatible_tools: ["plink2"]
single_tool_justification: "plink2 is the governed ROH baseline because it emits deterministic homozygosity segments with a stable CLI contract."
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "roh_min_kb_and_density_thresholds_are_fixed_per_run"
  - "roh_outputs_emit_metrics_json_with_schema_bijux.vcf.roh.v1"
bank_hooks: ["none"]
invariants: ["stable_artifact_contract"]
allowed_missingness:
  - "none"
planned_out_of_scope: []

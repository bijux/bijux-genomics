schema_version: "bijux.stage.v1"
stage_id: "vcf.impute"
status: "supported"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.impute in the governed domain registry."
inputs:
  - name: "phased_vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "imputed_vcf"
    data_type: "vcf"
    cardinality: "One"
required_inputs: ["phased_vcf"]
required_outputs: ["imputed_vcf"]
tool_capability_requirements: []
metrics:
  - name: "impute_status"
compatible_tools: ["beagle", "glimpse", "impute5", "minimac4"]
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions: ["panel_required", "genetic_map_required"]
bank_hooks: ["none"]
invariants: ["stable_artifact_contract"]
allowed_missingness:
  - "none"
planned_out_of_scope: []

schema_version: "bijux.stage.v1"
stage_id: "vcf.filter"
status: "supported"
scope: "post_vcf"
domain: "vcf"
description: "VCF stage contract for vcf.filter in the governed domain registry."
inputs:
  - name: "vcf"
    data_type: "vcf"
    cardinality: "One"
outputs:
  - name: "filtered_vcf"
    data_type: "vcf"
    cardinality: "One"
required_inputs: ["vcf"]
required_outputs: ["filtered_vcf"]
tool_capability_requirements: []
metrics:
  - name: "filtered_variants"
compatible_tools: ["bcftools"]
single_tool_justification: "bcftools is the only production-approved filter tool in current VCF baseline."
defaults_source: "doc_ref:domain/vcf/docs/DEFAULT_SETTINGS.md"
assumptions: ["pass_filtering"]
bank_hooks: ["none"]
invariants: ["tool_pinned"]
allowed_missingness:
  - "none"
planned_out_of_scope: []

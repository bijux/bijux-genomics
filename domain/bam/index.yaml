stage_qc_thresholds:
  bam.align: { alignment_rate: { warn: "<0.5", fail: "<0.2" } }
  bam.qc_pre: { bam_validation_pass_rate: { warn: "<1.0", fail: "<0.99" } }
  bam.validate: { bam_validation_pass_rate: { warn: "<1.0", fail: "<0.99" } }
  bam.markdup: { duplication_rate: { warn: ">=0.6", fail: ">=0.8" } }
  bam.complexity: { library_complexity_estimate: { warn: "<10000", fail: "<1000" } }
  bam.filter: { reads_retained_fraction: { warn: "<0.2", fail: "<0.1" } }
  bam.bias_mitigation: { gc_bias_score: { warn: ">0.2", fail: ">0.4" } }
  bam.recalibration: { recalibration_residual_error: { warn: ">0.05", fail: ">0.1" } }
  bam.coverage: { mean_coverage: { warn: "<0.5", fail: "<0.1" } }
  bam.damage: { ct_5prime_rate: { warn: "<0.02", fail: "<0.005" } }
  bam.authenticity: { authenticity_score: { warn: "<0.2", fail: "<0.1" } }
  bam.contamination: { contamination_estimate: { warn: ">0.05", fail: ">0.2" } }

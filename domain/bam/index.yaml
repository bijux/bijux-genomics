stage_default_settings:
  bam.align:
    bwa: { profile: "adna_sane_default", notes: "BWA aln/mem-compatible baseline preset" }
    bowtie2: { profile: "adna_sane_default", notes: "bowtie2 end-to-end conservative preset" }
  bam.validate:
    samtools: { profile: "adna_sane_default", notes: "samtools validation/stats preset" }
    bedtools: { profile: "adna_sane_default", notes: "interval sanity preset" }
    bamtools: { profile: "adna_sane_default", notes: "bam structure validation preset" }
  bam.filter:
    samtools: { profile: "adna_sane_default", notes: "mapping-quality filter preset" }
    bedtools: { profile: "adna_sane_default", notes: "region filter preset" }
    bamtools: { profile: "adna_sane_default", notes: "bam query filter preset" }
  bam.coverage:
    mosdepth: { profile: "adna_sane_default", notes: "fast coverage preset" }
    samtools: { profile: "adna_sane_default", notes: "depth fallback preset" }
  bam.damage:
    mapdamage2: { profile: "adna_sane_default", notes: "historic damage baseline preset" }
    pydamage: { profile: "adna_sane_default", notes: "PMD-centric damage preset" }
    damageprofiler: { profile: "adna_sane_default", notes: "misincorporation profile preset" }
    ngsbriggs: { profile: "adna_sane_default", notes: "Briggs-model PMD preset" }
    addeam: { profile: "adna_sane_default", notes: "scalable damage estimation preset" }
    pmdtools: { profile: "adna_sane_default", notes: "PMD score/filter preset" }
  bam.authenticity:
    authenticct: { profile: "adna_sane_default", notes: "authenticity summary preset" }
    pmdtools: { profile: "adna_sane_default", notes: "PMD evidence authenticity preset" }
    damageprofiler: { profile: "adna_sane_default", notes: "damage-signature authenticity preset" }
  bam.contamination:
    schmutzi: { profile: "adna_sane_default", notes: "mtDNA contamination baseline preset" }
    verifybamid2: { profile: "adna_sane_default", notes: "nuclear contamination estimate preset" }
    contammix: { profile: "adna_sane_default", notes: "Bayesian contamination estimate preset" }
  bam.sex:
    rxy: { profile: "adna_sane_default", notes: "R/Y ratio baseline preset" }
    yleaf: { profile: "adna_sane_default", notes: "Y haplogroup-assisted sex preset" }
    angsd: { profile: "adna_sane_default", notes: "population-model sex inference preset" }
  bam.kinship:
    king: { profile: "adna_sane_default", notes: "kinship baseline preset" }
    angsd: { profile: "adna_sane_default", notes: "likelihood-based kinship preset" }
  bam.qc_pre:
    samtools: { profile: "adna_sane_default", notes: "pre-run sanity qc preset" }
  bam.markdup:
    picard: { profile: "adna_sane_default", notes: "planned duplicate marking preset" }
    samtools: { profile: "adna_sane_default", notes: "planned duplicate marking fallback preset" }
  bam.complexity:
    preseq: { profile: "adna_sane_default", notes: "planned complexity extrapolation preset" }
  bam.bias_mitigation:
    samtools: { profile: "adna_sane_default", notes: "planned bias mitigation preset" }
  bam.recalibration:
    gatk: { profile: "adna_sane_default", notes: "planned recalibration preset" }
  bam.haplogroups:
    yleaf: { profile: "adna_sane_default", notes: "planned haplogroup assignment preset" }
  bam.genotyping:
    gatk: { profile: "adna_sane_default", notes: "planned genotyping preset" }
    angsd: { profile: "adna_sane_default", notes: "planned low-depth genotyping preset" }
stage_comparability_mapping:
  bam.align: ["alignment_rate", "mapped_reads"]
  bam.validate: ["bam_validation_pass_rate"]
  bam.qc_pre: ["bam_validation_pass_rate"]
  bam.filter: ["reads_retained_fraction", "mean_mapq_post_filter"]
  bam.markdup: ["duplication_rate"]
  bam.complexity: ["library_complexity_estimate"]
  bam.coverage: ["mean_coverage", "breadth_1x", "breadth_5x"]
  bam.damage: ["ct_5prime_rate", "ga_3prime_rate", "pmd_score_distribution"]
  bam.authenticity: ["authenticity_score", "pmd_enriched_fraction"]
  bam.contamination: ["contamination_estimate", "contamination_ci_width"]
  bam.sex: ["x_y_coverage_ratio", "sex_call_confidence"]
  bam.bias_mitigation: ["gc_bias_score"]
  bam.recalibration: ["recalibration_residual_error"]
  bam.haplogroups: ["haplogroup_call_confidence"]
  bam.genotyping: ["genotype_call_rate"]
  bam.kinship: ["kinship_coefficient", "relationship_class"]
stage_min_quality_gates:
  bam.align: ["alignment_rate>=0.0"]
  bam.validate: ["validation_pass=true"]
  bam.qc_pre: ["validation_pass=true"]
  bam.filter: ["reads_retained_fraction>=0.0"]
  bam.markdup: ["duplication_rate>=0.0"]
  bam.complexity: ["library_complexity_estimate>=0.0"]
  bam.coverage: ["mean_coverage>=0.0"]
  bam.damage: ["damage_profile_present=true"]
  bam.authenticity: ["authenticity_score>=0.0"]
  bam.contamination: ["contamination_estimate>=0.0", "contamination_estimate<=1.0"]
  bam.sex: ["sex_call_confidence>=0.0"]
  bam.bias_mitigation: ["gc_bias_score>=0.0"]
  bam.recalibration: ["recalibration_residual_error>=0.0"]
  bam.haplogroups: ["haplogroup_call_confidence>=0.0"]
  bam.genotyping: ["genotype_call_rate>=0.0"]
  bam.kinship: ["kinship_coefficient>=-0.5", "kinship_coefficient<=1.0"]
stage_failure_diagnosis_hints:
  bam.align: ["check reference index availability and read-group consistency"]
  bam.validate: ["inspect BAM headers, sort order, and index presence"]
  bam.qc_pre: ["inspect BAM index/header and input integrity before filtering"]
  bam.filter: ["review MAPQ/length/region thresholds for over-filtering"]
  bam.markdup: ["check duplicate identification assumptions and read-group tags"]
  bam.complexity: ["verify library complexity model input depth and duplication signals"]
  bam.coverage: ["verify reference naming consistency and depth inputs"]
  bam.damage: ["check PMD/damage parameterization and read-end clipping assumptions"]
  bam.authenticity: ["verify PMD threshold and deamination model assumptions"]
  bam.contamination: ["ensure required mt/panel references and contamination model inputs"]
  bam.sex: ["check chrX/chrY naming conventions and coverage sparsity"]
  bam.bias_mitigation: ["review GC/fragment-length normalization assumptions"]
  bam.recalibration: ["verify known-sites resources and covariate model inputs"]
  bam.haplogroups: ["check haplogroup marker coverage and reference naming"]
  bam.genotyping: ["inspect genotype likelihood settings and depth cutoffs"]
  bam.kinship: ["verify sample pairing metadata and allele-frequency prerequisites"]
pipeline_compositions:
  pre_hpc_best:
    - bam.align
    - bam.validate
    - bam.filter
    - bam.damage
    - bam.authenticity
    - bam.contamination
    - bam.coverage

  - bam.recalibration
  - bam.haplogroups
  - bam.genotyping
  - bam.kinship
tool_ids:
  - bwa
  - bowtie2
  - samtools
  - mapdamage2
  - pydamage
  - damageprofiler
  - ngsbriggs
  - addeam
  - pmdtools
  - schmutzi
  - verifybamid2
  - contammix

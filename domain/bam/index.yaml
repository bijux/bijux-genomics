stage_coverage_sufficiency:
  bam.align: ["mapped_reads>=100000"]
  bam.qc_pre: ["indexed_bam=true"]
  bam.validate: ["indexed_bam=true"]
  bam.markdup: ["reads_after_dedup>=10000"]
  bam.complexity: ["reads_after_dedup>=10000"]
  bam.filter: ["reads_retained_fraction>=0.1"]
  bam.bias_mitigation: ["reads_retained_fraction>=0.1"]
  bam.recalibration: ["known_sites_available=true"]
  bam.coverage: ["mean_coverage>=0.5", "breadth_1x>=0.6"]
  bam.damage: ["coverage_at_damage_sites>=0.2"]
  bam.authenticity: ["pmd_enriched_reads>=500"]
  bam.contamination: ["panel_or_mt_ref_available=true"]
  bam.sex: ["chrX_chrY_covered_sites>=1000"]
  bam.haplogroups: ["haplogroup_markers_covered>=100"]
  bam.genotyping: ["callable_sites>=1000"]
  bam.kinship: ["shared_markers>=5000"]

schema_version: "bijux.tool.v2"
tool_id: "bowtie2"
upstream: "https://github.com/BenLangmead/bowtie2"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.5.4"
install_kind: "container"
container:
  image: "bijuxdna/bowtie2"
license: "GPL-3.0"
citation: "paper:https://www.nature.com/articles/nmeth.1923"
stage_ids: ["bam.align"]
status: "supported"
scope: "pre_hpc_pre_vcf"
expected_artifacts: ["aligned_bam"]
metrics_schema_id: "bijux.bam.align.v1"
metrics_schema: "bijux.bam.align.v1"
version_cmd: "bowtie2 --version"
help_cmd: "bowtie2 --help"
comparability:
  comparable_with: ["bwa"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

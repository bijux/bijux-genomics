schema_version: "bijux.tool.v2"
tool_id: "contammix"
upstream: "https://bioconductor.org/packages/contamMix"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.0.11"
install_kind: "container"
container:
  image: "bijuxdna/contammix"
license: "GPL-3.0"
citation: "pending:tool-publication"
outputs:
  - name: "contamination_report"
    data_type: "json"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "contamination_estimate"
    data_type: "json"
    cardinality: "One"
  - name: "contammix_report"
    data_type: "text"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "bam"
  expected_outputs:
    - "contamination_report"
    - "summary"
    - "stage_metrics"
    - "contamination_estimate"
    - "contammix_report"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids: ["bam.contamination"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.contamination:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "contamination_report"
      - "summary"
      - "stage_metrics"
      - "contamination_estimate"
      - "contammix_report"
    notes: "ContamMix contamination coverage preserves the governed contamination report surface together with the native contamination estimate and backend report."
expected_artifacts: ["contamination_estimate","contammix_report"]
metrics_schema_id: "bijux.bam.contamination.v1"
metrics_schema: "bijux.bam.contamination.v1"
version_cmd: "contammix --version"
help_cmd: "contammix --help"
comparability:
  comparable_with: ["schmutzi","verifybamid2"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

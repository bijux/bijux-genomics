schema_version: "bijux.tool.v2"
tool_id: "contammix"
upstream: "https://bioconductor.org/packages/contamMix"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.0.11"
install_kind: "container"
container:
  image: "bijuxdna/contammix"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["bam.contamination"]
status: "supported"
scope: "pre_hpc_pre_vcf"
expected_artifacts: ["contamination_estimate","contammix_report"]
metrics_schema_id: "bijux.bam.contamination.v1"
metrics_schema: "bijux.bam.contamination.v1"
version_cmd: "contammix --version"
help_cmd: "contammix --help"
comparability:
  comparable_with: ["schmutzi","verifybamid2"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

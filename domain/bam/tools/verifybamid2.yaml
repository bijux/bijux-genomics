schema_version: "bijux.tool.v2"
tool_id: "verifybamid2"
upstream: "https://github.com/Griffan/VerifyBamID"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.0.1"
install_kind: "container"
container:
  image: "bijuxdna/verifybamid2"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC7050530/"
outputs:
  - name: "contamination_report"
    data_type: "json"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "contamination_estimate"
    data_type: "json"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "bam"
  expected_outputs:
    - "contamination_report"
    - "summary"
    - "stage_metrics"
    - "contamination_estimate"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids: ["bam.contamination"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.contamination:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "contamination_report"
      - "summary"
      - "stage_metrics"
      - "contamination_estimate"
    notes: "VerifyBamID2 contamination coverage preserves the governed contamination report surface together with the native contamination estimate artifact."
expected_artifacts: ["contamination_estimate"]
metrics_schema_id: "bijux.bam.contamination.v1"
metrics_schema: "bijux.bam.contamination.v1"
version_cmd: "verifybamid2 --version"
help_cmd: "verifybamid2 --help"
comparability:
  comparable_with: ["schmutzi","contammix"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

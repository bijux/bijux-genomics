schema_version: "bijux.tool.v2"
tool_id: "bwa"
upstream: "https://github.com/lh3/bwa"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "0.7.17"
install_kind: "container"
container:
  image: "bijuxdna/bwa"
license: "GPL-3.0"
citation: "paper:https://academic.oup.com/bioinformatics/article/25/14/1754/225615"
outputs:
  - name: "align_bam"
    data_type: "bam"
    cardinality: "One"
  - name: "align_bai"
    data_type: "bai"
    cardinality: "One"
  - name: "align_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "flagstat"
    data_type: "text"
    cardinality: "One"
  - name: "idxstats"
    data_type: "text"
    cardinality: "One"
  - name: "stats"
    data_type: "text"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "fastq_r1"
    - "reference_fasta"
    - "reference_index"
  optional_inputs:
    - "fastq_r2"
  expected_outputs:
    - "align_bam"
    - "align_bai"
    - "align_metrics"
    - "flagstat"
    - "idxstats"
    - "stats"
    - "stage_metrics"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids: ["bam.align"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.align:
    required_inputs:
      - "fastq_r1"
      - "reference_fasta"
      - "reference_index"
    optional_inputs:
      - "fastq_r2"
    expected_artifacts:
      - "align_bam"
      - "align_bai"
      - "align_metrics"
      - "flagstat"
      - "idxstats"
      - "stats"
      - "stage_metrics"
    notes: "BWA alignment emits the governed BAM, BAI, mapping summaries, and benchmark-facing alignment metrics while accepting an optional mate FASTQ."
expected_artifacts:
  - "align_bam"
  - "align_bai"
  - "align_metrics"
  - "flagstat"
  - "idxstats"
  - "stats"
  - "stage_metrics"
metrics_schema_id: "bijux.bam.align.v1"
metrics_schema: "bijux.bam.align.v1"
version_cmd: "bwa --version"
help_cmd: "bwa --help"
comparability:
  comparable_with: ["bowtie2"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - "SE"
  - "PE"
io_contract:
  required_inputs:
    - "fastq_r1"
    - "reference_fasta"
    - "reference_index"

notes: "Domain SSOT tool contract entry."

schema_version: "bijux.tool.v2"
tool_id: "bedtools"
upstream: "https://github.com/arq5x/bedtools2"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.31.1"
install_kind: "container"
container:
  image: "bijuxdna/bedtools:2.31.1"
license: "GPL-3.0"
citation: "paper:https://academic.oup.com/bioinformatics/article/26/6/841/244688"
outputs:
  - name: "validation_report"
    data_type: "json"
    cardinality: "One"
  - name: "flagstat"
    data_type: "text"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "filtered_bam"
    data_type: "bam"
    cardinality: "One"
  - name: "filtered_bai"
    data_type: "bai"
    cardinality: "One"
  - name: "flagstat_before"
    data_type: "text"
    cardinality: "One"
  - name: "flagstat_after"
    data_type: "text"
    cardinality: "One"
  - name: "idxstats_before"
    data_type: "text"
    cardinality: "One"
  - name: "idxstats_after"
    data_type: "text"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "coverage_summary"
    data_type: "json"
    cardinality: "One"
  - name: "coverage_depth"
    data_type: "tsv"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "bam"
  optional_inputs:
    - "bam_index"
    - "reference_fasta"
  expected_outputs:
    - "validation_report"
    - "flagstat"
    - "stage_metrics"
    - "filtered_bam"
    - "filtered_bai"
    - "flagstat_before"
    - "flagstat_after"
    - "idxstats_before"
    - "idxstats_after"
    - "summary"
    - "coverage_summary"
    - "coverage_depth"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids: ["bam.validate","bam.filter","bam.coverage"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.coverage:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "coverage_summary"
      - "coverage_depth"
      - "stage_metrics"
    notes: "Bedtools coverage preserves the governed BAM coverage benchmark row through interval coverage summaries plus a comparable depth sidecar for region-level output."
  bam.filter:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "filtered_bam"
      - "filtered_bai"
      - "flagstat_before"
      - "flagstat_after"
      - "idxstats_before"
      - "idxstats_after"
      - "summary"
      - "stage_metrics"
    notes: "Bedtools filter coverage must preserve the governed BAM filter row through deterministic retained/removed read accounting and before-and-after audit artifacts."
  bam.validate:
    required_inputs:
      - "bam"
    optional_inputs:
      - "bam_index"
      - "reference_fasta"
    expected_artifacts:
      - "validation_report"
      - "flagstat"
      - "stage_metrics"
    notes: "Validation emits the governed validation summary, flagstat companion output, and benchmark-facing stage metrics while preserving optional BAM index and reference identity when present."
expected_artifacts: ["interval_report"]
metrics_schema_id: "bijux.bam.validation.v1"
metrics_schema: "bijux.bam.validation.v1"
version_cmd: "bedtools --version"
help_cmd: "bedtools --help"
comparability:
  comparable_with: ["bamtools","mosdepth","samtools"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

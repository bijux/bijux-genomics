schema_version: "bijux.tool.v2"
tool_id: "rxy"
upstream: "https://github.com/bijux/bijux-genomics"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
container:
  image: "bijuxdna/rxy"
license: "GPL-3.0"
citation: "pending:tool-publication"
outputs:
  - name: "sex_report"
    data_type: "json"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "sex_estimate"
    data_type: "json"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "bam"
  expected_outputs:
    - "sex_report"
    - "summary"
    - "stage_metrics"
    - "sex_estimate"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids: ["bam.sex"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.sex:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "sex_report"
      - "summary"
      - "stage_metrics"
      - "sex_estimate"
    notes: "Rxy sex coverage preserves the governed sex report surface together with the native sex estimate artifact."
expected_artifacts: ["sex_estimate"]
metrics_schema_id: "bijux.bam.sex.v1"
metrics_schema: "bijux.bam.sex.v1"
version_cmd: "rxy --version"
help_cmd: "rxy --help"
comparability:
  comparable_with: ["yleaf","angsd"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

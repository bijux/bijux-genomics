schema_version: "bijux.tool.v2"
tool_id: "mosdepth"
upstream: "https://github.com/brentp/mosdepth"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "0.3.10"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://academic.oup.com/bioinformatics/article-abstract/34/5/867/4583630"
outputs:
  - name: "coverage_summary"
    data_type: "json"
    cardinality: "One"
  - name: "coverage_depth"
    data_type: "tsv"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "bam"
  expected_outputs:
    - "coverage_summary"
    - "coverage_depth"
    - "stage_metrics"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids: ["bam.coverage"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.coverage:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "coverage_summary"
      - "coverage_depth"
      - "stage_metrics"
    notes: "Mosdepth preserves the governed BAM coverage benchmark row through deterministic depth summaries, a comparable depth sidecar, and benchmark-facing mean-depth and breadth metrics."
expected_artifacts: ["coverage_summary", "coverage_depth", "stage_metrics"]
metrics_schema_id: "bijux.bam.coverage.v1"
metrics_schema: "bijux.bam.coverage.v1"
version_cmd: "mosdepth --version"
help_cmd: "mosdepth --help"
comparability:
  comparable_with: ["bedtools", "samtools"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

schema_version: "bijux.tool.v2"
tool_id: "picard"
upstream: "https://github.com/broadinstitute/picard"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "software:https://broadinstitute.github.io/picard/"
stage_ids: ["bam.markdup","bam.length_filter","bam.duplication_metrics","bam.insert_size","bam.gc_bias","bam.mapping_summary"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.duplication_metrics:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "duplication_report"
      - "duplication_histogram"
      - "summary"
      - "stage_metrics"
    notes: "Picard duplication-metrics coverage must preserve the governed duplicate-count, duplicate-fraction, estimated-library-size, and duplication-histogram contract even while local comparison planning stays plannable-only."
  bam.markdup:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "markdup_bam"
      - "markdup_bai"
      - "flagstat_before"
      - "flagstat_after"
      - "idxstats_before"
      - "idxstats_after"
      - "summary"
      - "stage_metrics"
    notes: "Picard markdup coverage must preserve the governed marked-BAM, duplicate-metric, duplicate-count, and duplicate-fraction contract even while local comparison planning currently reuses the GATK MarkDuplicatesSpark execution path."
  bam.length_filter:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "filtered_bam"
      - "filtered_bai"
      - "flagstat_before"
      - "flagstat_after"
      - "idxstats_before"
      - "idxstats_after"
      - "summary"
      - "stage_metrics"
    notes: "Picard length-filter coverage must preserve the governed minimum-length threshold, retained-read, removed-read, and filtered-BAM contract even while local comparison planning reuses the samtools length-gating implementation."
  bam.mapping_summary:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "flagstat"
      - "idxstats"
      - "stats"
      - "summary"
      - "stage_metrics"
    notes: "Picard coverage for bam.mapping_summary uses CollectAlignmentSummaryMetrics plus BamIndexStats to preserve the governed mapping-summary benchmark row contract."
expected_artifacts: ["markdup_bam","dup_metrics"]
metrics_schema_id: "bijux.bam.markdup.v1"
metrics_schema: "bijux.bam.markdup.v1"
version_cmd: "picard --version"
help_cmd: "picard --help"
comparability:
  comparable_with: ["samtools"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

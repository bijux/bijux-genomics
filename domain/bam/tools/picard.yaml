schema_version: "bijux.tool.v2"
tool_id: "picard"
upstream: "https://github.com/broadinstitute/picard"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "software:https://broadinstitute.github.io/picard/"
outputs:
  - name: "gc_bias_report"
    data_type: "json"
    cardinality: "One"
  - name: "gc_bias_plot"
    data_type: "png"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "insert_size_report"
    data_type: "json"
    cardinality: "One"
  - name: "insert_size_histogram"
    data_type: "png"
    cardinality: "One"
  - name: "duplication_report"
    data_type: "json"
    cardinality: "One"
  - name: "duplication_histogram"
    data_type: "png"
    cardinality: "One"
  - name: "markdup_bam"
    data_type: "bam"
    cardinality: "One"
  - name: "markdup_bai"
    data_type: "bai"
    cardinality: "One"
  - name: "flagstat_before"
    data_type: "text"
    cardinality: "One"
  - name: "flagstat_after"
    data_type: "text"
    cardinality: "One"
  - name: "idxstats_before"
    data_type: "text"
    cardinality: "One"
  - name: "idxstats_after"
    data_type: "text"
    cardinality: "One"
  - name: "filtered_bam"
    data_type: "bam"
    cardinality: "One"
  - name: "filtered_bai"
    data_type: "bai"
    cardinality: "One"
  - name: "flagstat"
    data_type: "text"
    cardinality: "One"
  - name: "idxstats"
    data_type: "text"
    cardinality: "One"
  - name: "stats"
    data_type: "text"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "bam"
  optional_inputs:
    - "reference"
  expected_outputs:
    - "gc_bias_report"
    - "gc_bias_plot"
    - "summary"
    - "stage_metrics"
    - "insert_size_report"
    - "insert_size_histogram"
    - "duplication_report"
    - "duplication_histogram"
    - "markdup_bam"
    - "markdup_bai"
    - "flagstat_before"
    - "flagstat_after"
    - "idxstats_before"
    - "idxstats_after"
    - "filtered_bam"
    - "filtered_bai"
    - "flagstat"
    - "idxstats"
    - "stats"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids: ["bam.markdup","bam.length_filter","bam.duplication_metrics","bam.insert_size","bam.gc_bias","bam.mapping_summary"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.gc_bias:
    required_inputs:
      - "bam"
      - "reference"
    expected_artifacts:
      - "gc_bias_report"
      - "gc_bias_plot"
      - "summary"
      - "stage_metrics"
    notes: "Picard GC-bias coverage must preserve the governed metrics report, plot, summary JSON, and benchmark-facing GC-bias, AT-dropout, and GC-dropout contract."
  bam.insert_size:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "insert_size_report"
      - "insert_size_histogram"
      - "summary"
      - "stage_metrics"
    notes: "Picard insert-size coverage must preserve the governed insert-size report, histogram path, mean/median/standard-deviation metrics, and paired-template count contract."
  bam.duplication_metrics:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "duplication_report"
      - "duplication_histogram"
      - "summary"
      - "stage_metrics"
    notes: "Picard duplication-metrics coverage must preserve the governed duplicate-count, duplicate-fraction, estimated-library-size, and duplication-histogram contract even while local comparison planning stays plannable-only."
  bam.markdup:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "markdup_bam"
      - "markdup_bai"
      - "flagstat_before"
      - "flagstat_after"
      - "idxstats_before"
      - "idxstats_after"
      - "summary"
      - "stage_metrics"
    notes: "Picard markdup coverage must preserve the governed marked-BAM, duplicate-metric, duplicate-count, and duplicate-fraction contract even while local comparison planning currently reuses the GATK MarkDuplicatesSpark execution path."
  bam.length_filter:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "filtered_bam"
      - "filtered_bai"
      - "flagstat_before"
      - "flagstat_after"
      - "idxstats_before"
      - "idxstats_after"
      - "summary"
      - "stage_metrics"
    notes: "Picard length-filter coverage must preserve the governed minimum-length threshold, retained-read, removed-read, and filtered-BAM contract even while local comparison planning reuses the samtools length-gating implementation."
  bam.mapping_summary:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "flagstat"
      - "idxstats"
      - "stats"
      - "summary"
      - "stage_metrics"
    notes: "Picard coverage for bam.mapping_summary uses CollectAlignmentSummaryMetrics plus BamIndexStats to preserve the governed mapping-summary benchmark row contract."
expected_artifacts: ["markdup_bam","dup_metrics"]
metrics_schema_id: "bijux.bam.markdup.v1"
metrics_schema: "bijux.bam.markdup.v1"
version_cmd: "picard --version"
help_cmd: "picard --help"
comparability:
  comparable_with: ["samtools"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

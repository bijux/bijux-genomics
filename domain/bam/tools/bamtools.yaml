schema_version: "bijux.tool.v2"
tool_id: "bamtools"
upstream: "https://github.com/pezmaster31/bamtools"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.5.2"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://academic.oup.com/bioinformatics/article/27/12/1691/255399"
stage_ids: ["bam.validate","bam.filter","bam.mapq_filter"]
status: "supported"
scope: "pre_hpc_pre_vcf"
expected_artifacts: ["bam_validation_report"]
metrics_schema_id: "bijux.bam.validation.v1"
metrics_schema: "bijux.bam.validation.v1"
version_cmd: "bamtools --version"
help_cmd: "bamtools --help"
comparability:
  comparable_with: ["bedtools","samtools"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

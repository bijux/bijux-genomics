schema_version: "bijux.tool.v2"
tool_id: "pydamage"
upstream: "https://github.com/maxibor/pydamage"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.0.0"
install_kind: "container"
container:
  image: "bijuxdna/pydamage:1.0.0"
license: "GPL-3.0"
citation: "paper:https://pubmed.ncbi.nlm.nih.gov/34395085/"
outputs:
  - name: "damage_report"
    data_type: "json"
    cardinality: "One"
  - name: "terminal_position_metrics"
    data_type: "tsv"
    cardinality: "One"
  - name: "parser_output"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "damage_profile"
    data_type: "json"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "bam"
  expected_outputs:
    - "damage_report"
    - "terminal_position_metrics"
    - "parser_output"
    - "stage_metrics"
    - "damage_profile"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids: ["bam.damage"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.damage:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "damage_report"
      - "terminal_position_metrics"
      - "parser_output"
      - "stage_metrics"
      - "damage_profile"
    notes: "PyDamage damage coverage preserves the governed damage report surface together with the native damage profile artifact."
expected_artifacts: ["damage_profile"]
metrics_schema_id: "bijux.bam.damage.v1"
metrics_schema: "bijux.bam.damage.v1"
version_cmd: "pydamage --version"
help_cmd: "pydamage --help"
comparability:
  comparable_with: ["mapdamage2","damageprofiler","addeam"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

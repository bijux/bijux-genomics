schema_version: "bijux.tool.v2"
tool_id: "schmutzi"
upstream: "https://github.com/grenaud/schmutzi"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
container:
  image: "bijuxdna/schmutzi"
license: "GPL-3.0"
citation: "paper:https://genomebiology.biomedcentral.com/articles/10.1186/s13059-015-0776-0"
outputs:
  - name: "contamination_report"
    data_type: "json"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "contamination_estimate"
    data_type: "json"
    cardinality: "One"
  - name: "mt_consensus"
    data_type: "fasta"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "bam"
  expected_outputs:
    - "contamination_report"
    - "summary"
    - "stage_metrics"
    - "contamination_estimate"
    - "mt_consensus"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids: ["bam.contamination"]
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  bam.contamination:
    required_inputs:
      - "bam"
    expected_artifacts:
      - "contamination_report"
      - "summary"
      - "stage_metrics"
      - "contamination_estimate"
      - "mt_consensus"
    notes: "Schmutzi contamination coverage preserves the governed contamination report surface together with the native contamination estimate and mitochondrial consensus artifacts."
expected_artifacts: ["contamination_estimate","mt_consensus"]
metrics_schema_id: "bijux.bam.contamination.v1"
metrics_schema: "bijux.bam.contamination.v1"
version_cmd: "schmutzi --version"
help_cmd: "schmutzi --help"
comparability:
  comparable_with: ["verifybamid2","contammix"]
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - bam_input
io_contract:
  required_inputs:
    - bam

notes: "Domain SSOT tool contract entry."

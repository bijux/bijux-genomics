schema_version: bijux.tool.v2
tool_id: samtools
upstream: https://github.com/samtools/samtools
versioning_strategy: pinned
pin_strategy: pinned
default_version: '1.21'
install_kind: container
container:
  image: bijuxdna/samtools:1.21
license: MIT
citation: paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC2723002/
outputs:
- name: validation_report
  data_type: json
  cardinality: One
- name: flagstat
  data_type: text
  cardinality: One
- name: stage_metrics
  data_type: json
  cardinality: One
- name: idxstats
  data_type: text
  cardinality: One
- name: stats
  data_type: text
  cardinality: One
- name: summary
  data_type: json
  cardinality: One
- name: filtered_bam
  data_type: bam
  cardinality: One
- name: filtered_bai
  data_type: bai
  cardinality: One
- name: flagstat_before
  data_type: text
  cardinality: One
- name: flagstat_after
  data_type: text
  cardinality: One
- name: idxstats_before
  data_type: text
  cardinality: One
- name: idxstats_after
  data_type: text
  cardinality: One
- name: markdup_bam
  data_type: bam
  cardinality: One
- name: markdup_bai
  data_type: bai
  cardinality: One
- name: duplication_report
  data_type: json
  cardinality: One
- name: duplication_histogram
  data_type: png
  cardinality: One
- name: coverage_summary
  data_type: json
  cardinality: One
- name: coverage_depth
  data_type: tsv
  cardinality: One
- name: endogenous_report
  data_type: json
  cardinality: One
execution_contract:
  required_inputs:
  - bam
  optional_inputs:
  - bam_index
  - reference_fasta
  expected_outputs:
  - validation_report
  - flagstat
  - stage_metrics
  - idxstats
  - stats
  - summary
  - filtered_bam
  - filtered_bai
  - flagstat_before
  - flagstat_after
  - idxstats_before
  - idxstats_after
  - markdup_bam
  - markdup_bai
  - duplication_report
  - duplication_histogram
  - coverage_summary
  - coverage_depth
  - endogenous_report
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids:
- bam.validate
- bam.qc_pre
- bam.mapping_summary
- bam.filter
- bam.mapq_filter
- bam.length_filter
- bam.markdup
- bam.duplication_metrics
- bam.coverage
- bam.endogenous_content
planned_stage_ids:
- bam.align
status: supported
scope: pre_hpc_pre_vcf
stage_contracts:
  bam.endogenous_content:
    required_inputs:
    - bam
    expected_artifacts:
    - endogenous_report
    - summary
    - stage_metrics
    notes: Samtools preserves the governed BAM endogenous-content benchmark row through deterministic total-read, mapped-read, endogenous-read, and endogenous-fraction summaries derived from stable flagstat counts.
  bam.coverage:
    required_inputs:
    - bam
    expected_artifacts:
    - coverage_summary
    - coverage_depth
    - stage_metrics
    notes: Samtools preserves the governed BAM coverage benchmark row through deterministic depth summaries, comparable coverage sidecars, and benchmark-facing mean-depth and breadth metrics.
  bam.duplication_metrics:
    required_inputs:
    - bam
    expected_artifacts:
    - duplication_report
    - duplication_histogram
    - summary
    - stage_metrics
    notes: Samtools preserves the governed BAM duplication-metrics benchmark row through deterministic duplicate observation, duplication histogram output, and comparable duplicate-burden summary metrics.
  bam.markdup:
    required_inputs:
    - bam
    expected_artifacts:
    - markdup_bam
    - markdup_bai
    - flagstat_before
    - flagstat_after
    - idxstats_before
    - idxstats_after
    - summary
    - stage_metrics
    notes: Samtools preserves the governed BAM markdup benchmark row through deterministic duplicate marking, marked-BAM output, before-and-after audit artifacts, and comparable duplicate-burden summary metrics.
  bam.filter:
    required_inputs:
    - bam
    expected_artifacts:
    - filtered_bam
    - filtered_bai
    - flagstat_before
    - flagstat_after
    - idxstats_before
    - idxstats_after
    - summary
    - stage_metrics
    notes: Samtools preserves the governed BAM filter benchmark row through deterministic BAM output, before-and-after audit artifacts, and filter-policy stage metrics.
  bam.mapq_filter:
    required_inputs:
    - bam
    expected_artifacts:
    - filtered_bam
    - filtered_bai
    - flagstat_before
    - flagstat_after
    - idxstats_before
    - idxstats_after
    - summary
    - stage_metrics
    notes: Samtools preserves the governed BAM MAPQ-filter benchmark row through deterministic threshold gating, filtered BAM output, and before-and-after audit artifacts.
  bam.length_filter:
    required_inputs:
    - bam
    expected_artifacts:
    - filtered_bam
    - filtered_bai
    - flagstat_before
    - flagstat_after
    - idxstats_before
    - idxstats_after
    - summary
    - stage_metrics
    notes: Samtools preserves the governed BAM length-filter benchmark row through deterministic minimum-length gating, filtered BAM output, and before-and-after audit artifacts.
  bam.mapping_summary:
    required_inputs:
    - bam
    expected_artifacts:
    - flagstat
    - idxstats
    - stats
    - summary
    - stage_metrics
    notes: Samtools materializes the governed BAM mapping-summary benchmark surface through deterministic flagstat, idxstats, stats, summary, and stage-metrics artifacts.
  bam.qc_pre:
    required_inputs:
    - bam
    expected_artifacts:
    - flagstat
    - idxstats
    - stats
    - stage_metrics
    notes: Samtools materializes the governed BAM qc_pre count surface through flagstat, idxstats, stats, and benchmark-facing stage metrics.
  bam.validate:
    required_inputs:
    - bam
    optional_inputs:
    - bam_index
    - reference_fasta
    expected_artifacts:
    - validation_report
    - flagstat
    - stage_metrics
    notes: Validation emits the governed validation summary, flagstat companion output, and benchmark-facing stage metrics while preserving optional BAM index and reference identity when present.
expected_artifacts:
- bam_index
- bam_stats
metrics_schema_id: bijux.bam.validation.v1
metrics_schema: bijux.bam.validation.v1
version_cmd: samtools --version
help_cmd: samtools --help
comparability:
  comparable_with:
  - multiqc
  - picard
  - bedtools
  - bamtools
  non_comparable_with: []
comparability_notes: Comparable only within same stage contract and input constraints.
capabilities:
- bam_input
- reference_indexing
io_contract:
  required_inputs:
  - bam
notes: Domain SSOT tool contract entry.

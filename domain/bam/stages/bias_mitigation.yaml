extends: "_schema.yaml"
stage_id: "bam.bias_mitigation"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "bias_mitigation_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "bias_report"
    data_type: "json"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "damage_profile"
    data_type: "json"
    cardinality: "One"
  - name: "damage_plot"
    data_type: "png"
    cardinality: "One"
parameters: []
metrics:
  - name: "runtime_s"
    meaning: "Wall-clock runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
description: "BAM bias_mitigation stage contract."
required_inputs:
  - bam
required_outputs:
  - bias_mitigation_report_json
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - mapdamage2
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "admitted bias-mitigation tools must preserve the governed bias report, summary JSON, and benchmark-facing stage metrics"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

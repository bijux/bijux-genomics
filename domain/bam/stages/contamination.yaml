extends: "_schema.yaml"
stage_id: "bam.contamination"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "contamination_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "contamination_report"
    data_type: "json"
    cardinality: "One"
  - name: "contamination_estimate"
    data_type: "json"
    cardinality: "One"
  - name: "contammix_report"
    data_type: "text"
    cardinality: "One"
  - name: "mt_consensus"
    data_type: "fasta"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "estimate"
    meaning: "Contamination estimate preserved across admitted BAM contamination tools when prerequisites pass"
    scientific_threshold:
      pass_direction: "maximum"
      tolerance_kind: "absolute_delta"
      tolerance_value: 0.01
      insufficiency_policy: "warn_and_exclude_stage"
  - name: "ci_low"
    meaning: "Lower confidence interval bound preserved for the governed BAM contamination estimate"
    scientific_threshold:
      pass_direction: "maximum"
      tolerance_kind: "absolute_delta"
      tolerance_value: 0.02
      insufficiency_policy: "warn_and_exclude_stage"
  - name: "ci_high"
    meaning: "Upper confidence interval bound preserved for the governed BAM contamination estimate"
    scientific_threshold:
      pass_direction: "maximum"
      tolerance_kind: "absolute_delta"
      tolerance_value: 0.02
      insufficiency_policy: "warn_and_exclude_stage"
description: "BAM contamination stage contract."
required_inputs:
  - bam
required_outputs:
  - contamination_report_json
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - schmutzi
  - verifybamid2
  - contammix
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "reference_bank"
  - "contamination_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

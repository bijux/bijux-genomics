extends: "_schema.yaml"
stage_id: "bam.insert_size"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "insert_size_report_json"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "runtime_s"
    meaning: "Wall-clock runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
description: "BAM insert-size distribution stage contract."
required_inputs:
  - bam
required_outputs:
  - insert_size_report_json
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - picard
assumptions:
  - "paired-end alignment metadata is available for insert-size inference"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

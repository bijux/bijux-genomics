extends: "_schema.yaml"
stage_id: "bam.authenticity"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "authenticity_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "authenticity_report"
    data_type: "json"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "damage_profile"
    data_type: "json"
    cardinality: "One"
  - name: "damage_plot"
    data_type: "png"
    cardinality: "One"
  - name: "pmd_scores"
    data_type: "tsv"
    cardinality: "One"
parameters: []
metrics:
  - name: "score"
    meaning: "Governed authenticity evidence score preserved across admitted BAM authenticity tools"
  - name: "confidence"
    meaning: "Confidence assigned to the governed BAM authenticity evidence score"
  - name: "pmd_like_signal_present"
    meaning: "PMD-like authenticity signal retained in the governed BAM authenticity comparison surface"
  - name: "consumed_metric_ids"
    meaning: "Upstream evidence inputs consumed by the governed BAM authenticity stage metrics contract"
  - name: "missing_metric_ids"
    meaning: "Expected authenticity evidence inputs that remained unavailable for the governed BAM authenticity benchmark row"
description: "BAM authenticity stage contract."
required_inputs:
  - bam
required_outputs:
  - authenticity_report_json
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - authenticct
  - pmdtools
  - damageprofiler
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

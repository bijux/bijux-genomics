extends: "_schema.yaml"
stage_id: "bam.sex"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "sex_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "sex_report"
    data_type: "json"
    cardinality: "One"
  - name: "sex_estimate"
    data_type: "json"
    cardinality: "One"
  - name: "population_metrics"
    data_type: "tsv"
    cardinality: "One"
  - name: "haplogroup_report"
    data_type: "json"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "x_coverage"
    meaning: "Observed X-chromosome coverage preserved in the governed BAM sex-inference comparison surface"
    scientific_threshold:
      pass_direction: "range"
      tolerance_kind: "relative_fraction"
      tolerance_value: 0.15
      insufficiency_policy: "warn_and_exclude_stage"
  - name: "y_coverage"
    meaning: "Observed Y-chromosome coverage preserved in the governed BAM sex-inference comparison surface"
    scientific_threshold:
      pass_direction: "range"
      tolerance_kind: "relative_fraction"
      tolerance_value: 0.15
      insufficiency_policy: "warn_and_exclude_stage"
  - name: "autosomal_coverage"
    meaning: "Observed autosomal coverage preserved in the governed BAM sex-inference comparison surface"
    scientific_threshold:
      pass_direction: "range"
      tolerance_kind: "relative_fraction"
      tolerance_value: 0.1
      insufficiency_policy: "warn_and_exclude_stage"
  - name: "call"
    meaning: "Governed sex-inference call preserved across admitted BAM sex-inference tools"
    scientific_threshold:
      pass_direction: "exact_match"
      tolerance_kind: "exact_match"
      tolerance_value: 0.0
      insufficiency_policy: "warn_and_exclude_stage"
  - name: "confidence"
    meaning: "Confidence assigned to the governed BAM sex-inference call"
    scientific_threshold:
      pass_direction: "minimum"
      tolerance_kind: "absolute_delta"
      tolerance_value: 0.1
      insufficiency_policy: "warn_and_exclude_stage"
  - name: "status"
    meaning: "Governed BAM sex-inference status preserved when admitted tools cannot emit a final call"
    scientific_threshold:
      pass_direction: "exact_match"
      tolerance_kind: "exact_match"
      tolerance_value: 0.0
      insufficiency_policy: "warn_and_exclude_stage"
description: "BAM sex stage contract."
required_inputs:
  - bam
required_outputs:
  - sex_report_json
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - rxy
  - yleaf
  - angsd
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

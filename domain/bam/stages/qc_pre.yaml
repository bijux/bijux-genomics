extends: "_schema.yaml"
stage_id: "bam.qc_pre"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "flagstat"
    data_type: "text"
    cardinality: "One"
  - name: "idxstats"
    data_type: "text"
    cardinality: "One"
  - name: "stats"
    data_type: "text"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "multiqc_report"
    data_type: "html"
    cardinality: "One"
  - name: "multiqc_data"
    data_type: "dir"
    cardinality: "One"
  - name: "governed_qc_inputs_manifest"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "total_reads"
    meaning: "Total reads observed in the input BAM"
    scientific_threshold:
      pass_direction: "exact_match"
      tolerance_kind: "exact_match"
      tolerance_value: 0.0
      insufficiency_policy: "refuse_stage_comparison"
  - name: "mapped_reads"
    meaning: "Reads reported as mapped in the governed flagstat summary"
    scientific_threshold:
      pass_direction: "range"
      tolerance_kind: "relative_fraction"
      tolerance_value: 0.02
      insufficiency_policy: "refuse_stage_comparison"
  - name: "unmapped_reads"
    meaning: "Reads reported as unmapped in the governed flagstat summary"
    scientific_threshold:
      pass_direction: "range"
      tolerance_kind: "relative_fraction"
      tolerance_value: 0.02
      insufficiency_policy: "refuse_stage_comparison"
  - name: "duplicate_flagged_reads"
    meaning: "Reads carrying the duplicate flag in the governed flagstat summary"
    scientific_threshold:
      pass_direction: "range"
      tolerance_kind: "relative_fraction"
      tolerance_value: 0.05
      insufficiency_policy: "refuse_stage_comparison"
description: "BAM pre-QC contract for governed pre-filter integrity summaries and benchmark-facing count reports."
required_inputs:
  - bam
required_outputs:
  - flagstat
  - idxstats
  - stats
  - stage_metrics
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - samtools
  - multiqc
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "samtools is the governed primary executor for flagstat, idxstats, and stats materialization"
  - "multiqc is a governed reporting companion that aggregates governed bam.qc_pre summaries without redefining the canonical row metrics"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "bam.mapping_summary"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "flagstat"
    data_type: "txt"
    cardinality: "One"
  - name: "idxstats"
    data_type: "txt"
    cardinality: "One"
  - name: "stats"
    data_type: "txt"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "mapping_fraction"
    meaning: "Fraction of reads reported as mapped for the governed BAM input"
  - name: "mapped_reads"
    meaning: "Mapped reads reported by the governed BAM mapping summary row"
  - name: "unmapped_reads"
    meaning: "Unmapped reads preserved in the governed BAM mapping summary row"
  - name: "secondary_reads"
    meaning: "Secondary alignment count preserved in the governed BAM mapping summary row"
  - name: "supplementary_reads"
    meaning: "Supplementary alignment count preserved in the governed BAM mapping summary row"
description: "BAM mapping-summary contract for governed alignment-rate reporting and canonical mapping-count comparisons."
required_inputs:
  - bam
required_outputs:
  - flagstat
  - idxstats
  - stats
  - summary
  - stage_metrics
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - samtools
  - picard
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "samtools remains the governed baseline for fixture-backed BAM mapping-summary smoke coverage"
  - "picard contributes a governed comparison backend for alignment-summary metrics without changing the canonical BAM row metrics"
bank_hooks:
  - "reference_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

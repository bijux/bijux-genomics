extends: "_schema.yaml"
stage_id: "bam.coverage"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "coverage_summary"
    data_type: "text"
    cardinality: "One"
  - name: "coverage_depth"
    data_type: "text"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "mean_depth"
    meaning: "Mean observed depth across the governed target space"
  - name: "breadth_1x"
    meaning: "Fraction of governed target positions with at least one aligned base"
  - name: "covered_bases"
    meaning: "Count of governed target positions with at least one aligned base"
  - name: "runtime_s"
    meaning: "Wall-clock runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
description: "BAM coverage stage contract with governed summary, depth sidecar, and benchmark-facing coverage metrics."
required_inputs:
  - bam
required_outputs:
  - coverage_summary
  - coverage_depth
  - stage_metrics
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - mosdepth
  - samtools
  - bedtools
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "default stage assumptions captured"
  - "coverage summaries stay comparable only when target-space selection is fixed"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

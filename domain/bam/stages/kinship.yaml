extends: "_schema.yaml"
stage_id: "bam.kinship"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "kinship_report_json"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "observed_max_overlap_snps"
    meaning: "Maximum observed SNP overlap preserved in the governed BAM kinship comparison surface"
  - name: "pair_count"
    meaning: "Count of pairwise kinship results emitted by the governed BAM kinship benchmark row"
  - name: "status"
    meaning: "Governed kinship result status preserved across admitted BAM kinship tools"
  - name: "pairwise_results"
    meaning: "Governed pairwise kinship results carrying comparable relationship labels and concordance outputs"
description: "BAM kinship stage contract."
required_inputs:
  - bam
required_outputs:
  - kinship_report_json
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - king
  - angsd
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

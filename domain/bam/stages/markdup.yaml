extends: "_schema.yaml"
stage_id: "bam.markdup"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "markdup_bam"
    data_type: "bam"
    cardinality: "One"
  - name: "markdup_bai"
    data_type: "bai"
    cardinality: "One"
  - name: "flagstat_before"
    data_type: "text"
    cardinality: "One"
  - name: "flagstat_after"
    data_type: "text"
    cardinality: "One"
  - name: "idxstats_before"
    data_type: "text"
    cardinality: "One"
  - name: "idxstats_after"
    data_type: "text"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "duplicate_count"
    meaning: "Duplicate-read count preserved in the governed BAM markdup benchmark row"
    scientific_threshold:
      pass_direction: "range"
      tolerance_kind: "relative_fraction"
      tolerance_value: 0.05
      insufficiency_policy: "refuse_stage_comparison"
  - name: "duplicate_fraction"
    meaning: "Duplicate-read fraction preserved in the governed BAM markdup benchmark row"
    scientific_threshold:
      pass_direction: "maximum"
      tolerance_kind: "absolute_delta"
      tolerance_value: 0.02
      insufficiency_policy: "refuse_stage_comparison"
description: "BAM duplicate-marking contract for governed marked-BAM, duplicate-metric, and duplicate-burden benchmarking."
required_inputs:
  - bam
required_outputs:
  - markdup_bam
  - markdup_bai
  - flagstat_before
  - flagstat_after
  - idxstats_before
  - idxstats_after
  - summary
  - stage_metrics
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - picard
  - samtools
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "admitted BAM markdup tools must preserve the governed marked-BAM, duplicate-metric, duplicate-count, and duplicate-fraction contract"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

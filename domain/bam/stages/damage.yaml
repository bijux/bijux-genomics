extends: "_schema.yaml"
stage_id: "bam.damage"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "damage_report"
    data_type: "json"
    cardinality: "One"
  - name: "terminal_position_metrics"
    data_type: "tsv"
    cardinality: "One"
  - name: "parser_output"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
  - name: "damage_profile"
    data_type: "json"
    cardinality: "One"
  - name: "damage_plot"
    data_type: "png"
    cardinality: "One"
  - name: "damage_clusters"
    data_type: "json"
    cardinality: "One"
  - name: "damage_parameters"
    data_type: "json"
    cardinality: "One"
  - name: "pmd_scores"
    data_type: "tsv"
    cardinality: "One"
parameters: []
metrics:
  - name: "terminal_c_to_t_5p"
    meaning: "Observed 5' terminal C-to-T damage rate preserved in the governed BAM damage benchmark row"
  - name: "terminal_g_to_a_3p"
    meaning: "Observed 3' terminal G-to-A damage rate preserved in the governed BAM damage benchmark row"
  - name: "damage_signal"
    meaning: "Governed categorical damage signal preserved in the BAM damage benchmark row"
  - name: "runtime_s"
    meaning: "Wall-clock runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
description: "BAM damage stage contract with governed damage report, terminal-position metrics, parser-output JSON, and benchmark-facing damage signal semantics."
required_inputs:
  - bam
required_outputs:
  - damage_report
  - terminal_position_metrics
  - parser_output
  - stage_metrics
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - mapdamage2
  - pydamage
  - damageprofiler
  - ngsbriggs
  - addeam
  - pmdtools
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "damage tools emit comparable terminal-position evidence from the same aligned BAM input"
  - "admitted and planned damage rows preserve governed damage-report, terminal-position-metrics, and parser-output semantics even when backend raw artifacts differ"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

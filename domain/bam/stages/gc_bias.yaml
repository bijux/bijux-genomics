extends: "_schema.yaml"
stage_id: "bam.gc_bias"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
  - name: "reference"
    data_type: "fasta"
    cardinality: "One"
outputs:
  - name: "gc_bias_report"
    data_type: "txt"
    cardinality: "One"
  - name: "gc_bias_plot"
    data_type: "pdf"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "gc_bias_score"
    meaning: "Observed GC-bias score preserved in the governed BAM GC-bias benchmark row"
  - name: "at_dropout"
    meaning: "Observed AT-dropout percentage preserved in the governed BAM GC-bias benchmark row"
  - name: "gc_dropout"
    meaning: "Observed GC-dropout percentage preserved in the governed BAM GC-bias benchmark row"
  - name: "runtime_s"
    meaning: "Wall-clock runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
description: "BAM GC-bias stage contract with governed metrics report, plot, summary JSON, and benchmark-facing GC-dropout metrics."
required_inputs:
  - bam
  - reference
required_outputs:
  - gc_bias_report
  - gc_bias_plot
  - summary
  - stage_metrics
tool_capability_requirements:
  - bam_input
  - reference_indexing
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "gc_dropout_non_negative"
  - "at_dropout_non_negative"
allowed_missingness:
  - "none"
compatible_tools:
  - picard
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "reference GC context and aligned read depth are available"
  - "admitted GC-bias tools must preserve the governed metrics report, plot, summary JSON, and benchmark-facing dropout metric contract"
bank_hooks:
  - "reference_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "bam.gc_bias"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "gc_bias_report_json"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "runtime_s"
    meaning: "Wall-clock runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
description: "BAM GC-bias assessment stage contract."
required_inputs:
  - bam
required_outputs:
  - gc_bias_report_json
tool_capability_requirements:
  - bam_input
  - reference_indexing
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "gc_dropout_non_negative"
  - "at_dropout_non_negative"
allowed_missingness:
  - "none"
compatible_tools:
  - picard
assumptions:
  - "reference GC context and aligned read depth are available"
bank_hooks:
  - "reference_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

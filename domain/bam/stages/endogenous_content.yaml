extends: "_schema.yaml"
stage_id: "bam.endogenous_content"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "endogenous_content_report_json"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "runtime_s"
    meaning: "Wall-clock runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
description: "BAM endogenous content estimation stage contract."
required_inputs:
  - bam
required_outputs:
  - endogenous_content_report_json
tool_capability_requirements:
  - bam_input
  - reference_indexing
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - samtools
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "endogenous ratio computed from stable mapping summary counts and host-contig rules"
bank_hooks:
  - "reference_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

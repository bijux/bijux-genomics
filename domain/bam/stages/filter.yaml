extends: "_schema.yaml"
stage_id: "bam.filter"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "bam"
inputs:
  - name: "bam"
    data_type: "bam"
    cardinality: "One"
outputs:
  - name: "filtered_bam"
    data_type: "bam"
    cardinality: "One"
  - name: "filtered_bai"
    data_type: "bai"
    cardinality: "One"
  - name: "flagstat_before"
    data_type: "txt"
    cardinality: "One"
  - name: "flagstat_after"
    data_type: "txt"
    cardinality: "One"
  - name: "idxstats_before"
    data_type: "txt"
    cardinality: "One"
  - name: "idxstats_after"
    data_type: "txt"
    cardinality: "One"
  - name: "summary"
    data_type: "json"
    cardinality: "One"
  - name: "stage_metrics"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "input_reads"
    meaning: "Input read count preserved in the governed BAM filter benchmark row"
  - name: "kept_reads"
    meaning: "Read count retained after the governed BAM filter policy is applied"
  - name: "removed_reads"
    meaning: "Read count removed by the governed BAM filter policy"
  - name: "active_filters"
    meaning: "Named filter clauses that define the governed BAM filter benchmark row"
description: "BAM filter contract for governed retention-count benchmarking and deterministic filter-policy reporting."
required_inputs:
  - bam
required_outputs:
  - filtered_bam
  - filtered_bai
  - flagstat_before
  - flagstat_after
  - idxstats_before
  - idxstats_after
  - summary
  - stage_metrics
tool_capability_requirements:
  - bam_input
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - samtools
  - bedtools
  - bamtools
defaults_source: "doc_ref:domain/bam/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "all admitted BAM filter tools must preserve the governed retained/removed read accounting contract"
  - "active_filters records policy intent even when tool-specific argv differs across samtools, bamtools, and bedtools"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.subsample_reads"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "subsampled_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "subsample_report"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "seed"
    param_type: "int"
    default: "1"
metrics:
  - name: "reads_sampled"
    meaning: "Number of reads retained by governed subsampling."
description: "Subsample FASTQ inputs with deterministic seeds for fair benchmark cohorts."
required_inputs:
  - reads
required_outputs:
  - subsampled_reads
  - subsample_report
tool_capability_requirements:
  - read_subsampling
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "benchmark subsampling requires published seed, sample fraction, and input checksum provenance."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope:
  - bijux_dna

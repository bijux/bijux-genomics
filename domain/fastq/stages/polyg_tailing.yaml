extends: "_schema.yaml"
stage_id: "fastq.polyg_tailing"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "trim_polyg"
    param_type: "bool"
    default: "true"
  - name: "min_polyg_run"
    param_type: "int"
    default: "10"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of output reads after polyG trimming."
  - name: "bases_trimmed_polyg"
    meaning: "Number of bases removed from polyG tails."
description: "FASTQ stage for trimming instrument-derived polyG tails."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads"
required_outputs:
  - "trimmed_reads"
  - "report_json"
tool_capability_requirements:
  - "SE"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "polyg_trim_applied_before_emit"
allowed_missingness:
  - "none"
compatible_tools:
  - fastp
  - bbduk
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "polyG trimming remains a no-op on inputs without terminal G-tail artifacts."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

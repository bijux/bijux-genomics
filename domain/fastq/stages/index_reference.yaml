extends: "_schema.yaml"
stage_id: "fastq.index_reference"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reference_fasta"
    data_type: "fasta"
    cardinality: "One"
outputs:
  - name: "reference_index"
    data_type: "directory"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "threads"
    param_type: "int"
    default: "2"
metrics:
  - name: "index_directory"
    meaning: "Canonical benchmark alias for the emitted index directory consumed by downstream reference-guided stages."
  - name: "index_files"
    meaning: "Structured benchmark list of emitted index files and their sizes."
  - name: "elapsed_time_s"
    meaning: "Canonical benchmark alias for governed index build runtime in seconds."
  - name: "index_size_bytes"
    meaning: "Canonical benchmark alias for total bytes written for the emitted reference index."
  - name: "reference_bytes"
    meaning: "Total bytes in the indexed reference FASTA input"
  - name: "index_file_count"
    meaning: "Number of emitted reference index files"
  - name: "index_bytes"
    meaning: "Total bytes written for the reference index"
description: "Prepare mapper-ready reference indexes for FASTQ reference-guided stages."
required_inputs:
  - reference_fasta
required_outputs:
  - reference_index
  - report_json
tool_capability_requirements:
  - reference_indexing
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - bowtie2_build
  - star
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "selected index backend must match the downstream mapper or host-depletion backend that consumes the index."
bank_hooks:
  - "reference_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

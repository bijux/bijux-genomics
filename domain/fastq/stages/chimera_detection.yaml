extends: "_schema.yaml"
stage_id: "fastq.chimera_detection"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "chimera_filtered_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics:
  - name: "runtime_s"
    meaning: "Stage runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
compatible_tools:
  - vsearch
assumptions:
  - "Reference or de-novo chimera detection mode is fixed per run."
  - "Chimera reference database id/version/checksum is explicit when reference mode is used."
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
bank_hooks:
  - "contaminant_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
required_inputs: []
required_outputs: []
allowed_missingness:
  - "none"

extends: "_schema.yaml"
stage_id: "fastq.length_distribution_pre"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "stats_json"
    data_type: "json"
    cardinality: "One"
  - name: "stats_report"
    data_type: "tsv"
    cardinality: "One"
parameters:
  - name: "histogram_bins"
    param_type: "int"
    default: "100"
metrics:
  - name: "read_count"
    meaning: "Number of reads observed."
  - name: "mean_read_length"
    meaning: "Average read length before trimming."
  - name: "length_histogram"
    meaning: "Length histogram buckets."
description: "FASTQ stage for pre-trim length-distribution summary."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads"
required_outputs:
  - "stats_json"
  - "stats_report"
tool_capability_requirements:
  - "SE"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - seqkit_stats
  - seqfu
  - prinseq
  - fastp
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "length histogram generation must be deterministic for identical reads."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

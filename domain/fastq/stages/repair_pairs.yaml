extends: "_schema.yaml"
stage_id: "fastq.repair_pairs"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "One"
outputs:
  - name: "repaired_reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "repaired_reads_r2"
    data_type: "fastq"
    cardinality: "One"
  - name: "repair_report"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "pair_sync_policy"
    param_type: "string"
    default: "strict"
metrics:
  - name: "orphan_reads"
    meaning: "Number of reads that could not be reconciled into synchronized pairs."
description: "Repair mate synchronization for paired FASTQ inputs before pair-sensitive stages."
required_inputs:
  - reads_r1
  - reads_r2
required_outputs:
  - repaired_reads_r1
  - repaired_reads_r2
  - repair_report
tool_capability_requirements:
  - pair_repair
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "pair repair changes read ordering and must publish orphan accounting before benchmark comparison."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

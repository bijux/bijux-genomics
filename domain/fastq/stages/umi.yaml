extends: "_schema.yaml"
stage_id: "fastq.umi"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "dedup_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "dedup_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "2"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of reads after UMI deduplication"
  - name: "dedup_rate"
    meaning: "Fraction of reads removed by deduplication"
description: "FASTQ stage for UMI extraction and deduplication."

extends: "_schema.yaml"
stage_id: "fastq.screen_taxonomy"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
  - name: "classification_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "unclassified_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unclassified_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "4"
    meaning: "Worker threads for the governed classifier invocation and resource envelope"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads (screening does not remove reads)"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases (screening does not remove bases)"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs"
  - name: "contamination_rate"
    meaning: "Fraction of reads classified as contaminants"
  - name: "classifier"
    meaning: "Governed classifier backend selected for taxonomy screening"
  - name: "report_format"
    meaning: "Governed format emitted for taxonomy screening summaries"
  - name: "database_catalog_id"
    meaning: "Catalog identifier of the taxonomy database used for screening"
  - name: "database_artifact_id"
    meaning: "Artifact identifier of the taxonomy database used for screening"
  - name: "taxonomy_database_id"
    meaning: "Canonical benchmark alias for the governed taxonomy database artifact identifier."
  - name: "minimum_confidence"
    meaning: "Minimum classification confidence threshold enforced by governed screening"
  - name: "emit_unclassified"
    meaning: "Whether unclassified reads were retained in governed taxonomy outputs"
  - name: "contamination_summary"
    meaning: "Structured governed taxonomy summary entries reduced from the raw classifier report"
  - name: "classified_reads"
    meaning: "Canonical benchmark read count derived from the governed classified fraction and input read total."
  - name: "unclassified_reads"
    meaning: "Canonical benchmark read count derived from the governed unclassified fraction and input read total."
  - name: "classified_fraction"
    meaning: "Fraction of reads assigned to non-unclassified taxa under the governed taxonomy report"
  - name: "unclassified_fraction"
    meaning: "Fraction of reads remaining unclassified under the governed taxonomy report"
  - name: "top_taxa"
    meaning: "Highest-abundance classified taxa preserved under the governed taxonomy report contract"
description: "FASTQ stage for read-level taxonomic screening with governed classifier, database, and top-taxa provenance."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "screen_report_tsv"
  - "classification_report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "reads_r2"
  - "unclassified_reads_r1"
  - "unclassified_reads_r2"
compatible_tools:
  - kraken2
  - krakenuniq
  - centrifuge
  - kaiju
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "supported tools must emit read-level taxonomic classifications from the screened FASTQ input."
  - "screen_report_tsv preserves the raw classifier summary while classification_report_json stores the governed taxonomy report contract."
  - "when the selected backend supports unclassified-read export and emit_unclassified is enabled, unclassified_reads_* preserve the reads that remained taxonomically unresolved."
bank_hooks:
  - "taxonomy_database_lock"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope:
  - diamond

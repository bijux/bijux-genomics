extends: "_schema.yaml"
stage_id: "fastq.asv_inference"
status: "out_of_scope"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "asv_table"
    data_type: "table"
    cardinality: "One"
  - name: "asv_sequences"
    data_type: "fasta"
    cardinality: "One"
metrics:
  - name: "runtime_s"
    meaning: "Stage runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
compatible_tools:
  - dada2
assumptions:
  - "ASV inference is not implemented in the current pre-HPC ecology baseline."
  - "OTU clustering is the primary supported ecological quantification path."
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
bank_hooks:
  - "contaminant_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
required_inputs: []
required_outputs: []
allowed_missingness:
  - "none"
planned_out_of_scope:
  - "ASV requires containerized, deterministic engine admission before activation."

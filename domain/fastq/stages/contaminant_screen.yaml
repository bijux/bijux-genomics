extends: "_schema.yaml"
stage_id: "fastq.contaminant_screen"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reference_index"
    data_type: "ref_index"
    cardinality: "One"
outputs:
  - name: "filtered_fastq"
    data_type: "fastq"
    cardinality: "Many"
  - name: "screen_report"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "decoy_mode"
    param_type: "string"
    default: "phix_and_spikeins"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Reads retained after contaminant depletion."
  - name: "reads_removed_contaminant_kmer"
    meaning: "Reads removed by contaminant screen."
description: "FASTQ stage for contaminant/decoy screen distinct from taxonomy classification."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
    - reference_index
  forbids:
    - network
required_inputs:
  - "reads"
  - "reference_index"
required_outputs:
  - "filtered_fastq"
  - "screen_report"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - bbduk
  - bowtie2
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "contaminant decoy reference is explicitly versioned and separate from taxonomy DB."
bank_hooks:
  - "contaminant_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.detect_instrument_artifacts"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "instrument_artifact_report"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "artifact_policy"
    param_type: "string"
    default: "report_only"
metrics:
  - name: "artifact_signal_count"
    meaning: "Number of governed instrument-artifact signals detected in FASTQ quality or sequence patterns."
description: "Detect sequencer-family artifacts before trimming and route-family safety decisions."
required_inputs:
  - reads
required_outputs:
  - instrument_artifact_report
tool_capability_requirements:
  - instrument_artifact_detection
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - bijux_dna
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "instrument-artifact detection is report-only until a governed route explicitly consumes the artifact class."
bank_hooks:
  - "instrument_artifact_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.profile_reads"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "qc_json"
    data_type: "json"
    cardinality: "One"
    meaning: "Governed read-profile report with normalized totals, mate summaries, and histogram provenance."
  - name: "qc_tsv"
    data_type: "tsv"
    cardinality: "One"
    meaning: "Deterministic backend summary table preserved from seqkit statistics output."
  - name: "qc_plots_dir"
    data_type: "dir"
    cardinality: "One"
    meaning: "Normalized histogram artifacts derived from the governed read-profile report."
parameters:
  - name: "threads"
    param_type: "int"
    default: "2"
metrics:
  - name: "reads_total"
    meaning: "Total reads observed"
  - name: "bases_total"
    meaning: "Total bases observed"
  - name: "mean_q"
    meaning: "Mean base quality"
  - name: "gc_percent"
    meaning: "GC percentage"
  - name: "length_histogram"
    meaning: "Read length histogram"
description: "FASTQ stage for read profiling without mutation."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - reads_r1
required_outputs:
  - qc_json
  - qc_tsv
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "reads_r2"
  - "qc_plots_dir"
compatible_tools:
  - seqkit_stats
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "single-end input omits reads_r2; paired-end input preserves mate-level summaries."
  - "qc_json is the governed read-profile report contract and remains the canonical comparison surface for profile_reads."
  - "qc_tsv preserves the seqkit tabular backend summary, while qc_plots_dir contains normalized histogram tables derived from the governed report."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope:
  - "seqkit"
  - "seqfu"

extends: "_schema.yaml"
stage_id: "fastq.validate_reads"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "validation_report"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of reads carried forward by this report-only validation stage"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of bases carried forward by this report-only validation stage"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of read pairs carried forward by this report-only validation stage"
  - name: "reads_total"
    meaning: "Total number of reads observed"
  - name: "reads_valid"
    meaning: "Number of reads that passed validation"
  - name: "reads_invalid"
    meaning: "Number of reads that failed validation"
  - name: "mean_q"
    meaning: "Mean Phred quality score"
description: "FASTQ stage for structural validation and format-integrity accounting before downstream planning."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - reads
required_outputs:
  - validation_report
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - fastqvalidator
  - fastq_scan
  - seqtk
  - fqtools
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "validation is report-only and may not modify FASTQ payloads"
  - "benchmark comparisons require identical input hashes and strict-mode policy"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.correct"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "4"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of corrected reads"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of corrected bases"
  - name: "kmer_fix_rate"
    meaning: "Rate of k-mer fixes applied"
  - name: "mean_q_before"
    meaning: "Mean base quality before correction"
  - name: "mean_q_after"
    meaning: "Mean base quality after correction"
description: "FASTQ stage for error correction of reads."
mutates_fastq: true
report_only: false
may_change_read_count: false

extends: "_schema.yaml"
stage_id: "fastq.filter_low_complexity"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "filtered_fastq_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "filtered_fastq_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "filter_report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "entropy_threshold"
    param_type: "float"
    default: "0.5"
  - name: "polyx_threshold"
    param_type: "int"
    default: "20"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of output reads."
  - name: "bases_in"
    meaning: "Number of input bases before low-complexity filtering."
  - name: "bases_out"
    meaning: "Number of output bases after low-complexity filtering."
  - name: "mean_q_before"
    meaning: "Mean base quality before low-complexity filtering."
  - name: "mean_q_after"
    meaning: "Mean base quality after low-complexity filtering."
  - name: "delta_metrics"
    meaning: "Derived read and base retention deltas for low-complexity filtering."
  - name: "reads_removed_low_complexity"
    meaning: "Reads removed due to low complexity filters."
description: "FASTQ stage for removing low-complexity reads."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "filtered_fastq_r1"
  - "filter_report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "canonical_governed_low_complexity_report_emitted"
  - "poly_n_filter_applied_before_emit"
  - "entropy_threshold_applied_before_emit"
  - "homopolymer_filter_applied_before_emit"
allowed_missingness:
  - "reads_r2"
  - "filtered_fastq_r2"
compatible_tools:
  - prinseq
  - bbduk
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "low-complexity filtering must remain deterministic for identical input."
  - "single-end input omits reads_r2 and filtered_fastq_r2; paired-end input preserves mate synchronization during filtering."
  - "canonical report_json semantics remain comparable across supported low-complexity backends."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope:
  - "fastp"
  - "dustmasker"

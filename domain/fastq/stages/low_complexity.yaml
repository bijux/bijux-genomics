extends: "_schema.yaml"
stage_id: "fastq.low_complexity"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "filtered_fastq"
    data_type: "fastq"
    cardinality: "Many"
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "filter_report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "entropy_threshold"
    param_type: "float"
    default: "0.5"
  - name: "polyx_threshold"
    param_type: "int"
    default: "20"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of output reads."
  - name: "reads_removed_low_complexity"
    meaning: "Reads removed due to low complexity filters."
description: "FASTQ stage for removing low-complexity reads."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads"
required_outputs:
  - "filtered_fastq"
  - "filter_report_json"
tool_capability_requirements:
  - "SE"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "poly_n_filter_applied_before_emit"
  - "entropy_threshold_applied_before_emit"
  - "homopolymer_filter_applied_before_emit"
allowed_missingness:
  - "none"
compatible_tools:
  - dustmasker
  - prinseq
  - bbduk
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "low-complexity filtering must remain deterministic for identical input."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

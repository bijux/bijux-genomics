extends: "_schema.yaml"
stage_id: "fastq.profile_read_lengths"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "length_distribution_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "length_distribution_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "threads"
    param_type: "int"
    default: "2"
    meaning: "Worker threads for the governed read-length profiling invocation and resource envelope"
  - name: "histogram_bins"
    param_type: "int"
    default: "100"
metrics:
  - name: "read_count"
    meaning: "Number of reads observed."
  - name: "min_read_length"
    meaning: "Minimum read length observed before trimming."
  - name: "mean_read_length"
    meaning: "Average read length before trimming."
  - name: "median_read_length"
    meaning: "Median read length before trimming."
  - name: "max_read_length"
    meaning: "Maximum read length observed in the governed profile."
  - name: "distinct_lengths"
    meaning: "Number of distinct read lengths observed in the governed profile."
description: "FASTQ stage for read-length profiling."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "report_json"
  - "length_distribution_tsv"
  - "length_distribution_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "reads_r2"
compatible_tools:
  - fastp
  - prinseq
  - seqfu
  - seqkit_stats
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "report_json is the governed read-length report contract and the canonical comparison surface for this stage."
  - "length histogram generation must be deterministic for identical reads."
  - "single-end input omits reads_r2; paired-end input contributes both mates to the histogram."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

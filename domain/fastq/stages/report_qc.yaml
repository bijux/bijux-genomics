extends: "_schema.yaml"
stage_id: "fastq.report_qc"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "qc_artifacts"
    data_type: "dir"
    cardinality: "Many"
outputs:
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "multiqc_report"
    data_type: "html"
    cardinality: "One"
  - name: "multiqc_data"
    data_type: "dir"
    cardinality: "One"
  - name: "governed_qc_inputs_manifest"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "aggregation_engine"
    param_type: "string"
    default: "multiqc"
  - name: "aggregation_scope"
    param_type: "string"
    default: "governed_qc_artifacts"
metrics:
  - name: "aggregation_engine"
    meaning: "Aggregation backend selected for governed QC reporting"
  - name: "aggregation_scope"
    meaning: "Governed QC aggregation scope used to select upstream contributors"
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads (post-QC reference)"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases (post-QC reference)"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs"
  - name: "mean_q"
    meaning: "Mean base quality"
  - name: "contamination_rate"
    meaning: "Estimated contamination rate"
  - name: "governed_qc_input_count"
    meaning: "Number of governed QC artifacts aggregated into the canonical report"
  - name: "governed_qc_contributor_stage_ids"
    meaning: "Distinct governed contributor stage identifiers"
  - name: "governed_qc_contributor_tool_ids"
    meaning: "Distinct governed contributor tool identifiers"
  - name: "governed_qc_lineage_hash"
    meaning: "Stable governed QC lineage fingerprint for the aggregated inputs"
  - name: "multiqc_sample_count"
    meaning: "Number of samples represented in the MultiQC report"
  - name: "multiqc_module_count"
    meaning: "Number of modules represented in the MultiQC report"
  - name: "raw_fastqc_dir"
    meaning: "Path to raw FastQC output directory"
  - name: "trimmed_fastqc_dir"
    meaning: "Path to trimmed FastQC output directory"
  - name: "multiqc_report"
    meaning: "Path to MultiQC HTML report"
  - name: "multiqc_data"
    meaning: "Path to MultiQC data directory"
description: "FASTQ stage for MultiQC aggregation of FASTQ quality-control reports."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - qc_artifacts
required_outputs:
  - report_json
  - multiqc_report
  - multiqc_data
  - governed_qc_inputs_manifest
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "reads_r2"
compatible_tools:
  - multiqc
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "the stage aggregates existing FASTQ QC inputs rather than recomputing primary read statistics."
  - "governed QC artifacts may come from read profiling, adapter inspection, taxonomy screening, validation, or downstream cleanup stages that emit governed QC summaries."
  - "report_json is the canonical governed aggregation contract; multiqc_report and multiqc_data remain backend-native deliverables for human review and downstream inspection."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

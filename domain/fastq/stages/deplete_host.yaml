extends: "_schema.yaml"
stage_id: "fastq.deplete_host"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reference_index"
    data_type: "ref_index"
    cardinality: "One"
outputs:
  - name: "host_depleted_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "host_depletion_report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "host_identity_threshold"
    param_type: "float"
    default: "0.95"
  - name: "retain_unmapped_only"
    param_type: "bool"
    default: "true"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of reads after host depletion."
  - name: "host_fraction_removed"
    meaning: "Fraction of input reads removed during host depletion."
description: "FASTQ stage for host read depletion via reference mapping."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
    - reference_index
  forbids:
    - network
required_inputs:
  - "reads"
  - "reference_index"
required_outputs:
  - "host_depleted_reads"
  - "host_depletion_report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - bowtie2
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "reference index must match host depletion reference and naming conventions."
bank_hooks:
  - "reference_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

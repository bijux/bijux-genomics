extends: "_schema.yaml"
stage_id: "fastq.deplete_host"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reference_index"
    data_type: "ref_index"
    cardinality: "One"
outputs:
  - name: "host_depleted_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "host_depleted_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "removed_host_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "removed_host_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "host_depletion_report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "host_identity_threshold"
    param_type: "float"
    default: "0.95"
  - name: "retain_unmapped_only"
    param_type: "bool"
    default: "true"
  - name: "threads"
    param_type: "integer"
    default: 0
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of reads after host depletion."
  - name: "depleted_reads"
    meaning: "Canonical benchmark alias for reads removed during host depletion."
  - name: "bases_in"
    meaning: "Number of input bases."
  - name: "bases_out"
    meaning: "Number of output bases after host depletion."
  - name: "pairs_in"
    meaning: "Number of input read pairs."
  - name: "pairs_out"
    meaning: "Number of output read pairs after host depletion."
  - name: "host_fraction_removed"
    meaning: "Fraction of input reads removed during host depletion."
  - name: "host_hit_rate"
    meaning: "Canonical benchmark alias for fraction of input reads classified as host."
  - name: "depletion_summary"
    meaning: "Structured governed depletion summary for host depletion."
description: "FASTQ stage for host read depletion via reference mapping."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
    - reference_index
  forbids:
    - network
required_inputs:
  - "reads_r1"
  - "reference_index"
required_outputs:
  - "host_depleted_reads_r1"
  - "host_depletion_report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "reads_r2"
  - "host_depleted_reads_r2"
  - "removed_host_reads_r2"
compatible_tools:
  - bowtie2
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "reference index must identify the governed host build used for depletion."
  - "single-end input omits reads_r2, host_depleted_reads_r2, and removed_host_reads_r2; paired-end input preserves mate synchronization."
  - "removed_host_reads_* artifacts carry the reads classified as host by the depletion aligner."
  - "host_depletion_report_json is the canonical governed depletion report; backend-native mapping metrics remain traceable from that report."
bank_hooks:
  - "reference_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

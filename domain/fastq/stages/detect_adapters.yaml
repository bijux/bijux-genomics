extends: "_schema.yaml"
stage_id: "fastq.detect_adapters"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "adapter_report"
    data_type: "json"
    cardinality: "One"
  - name: "adapter_evidence_dir"
    data_type: "dir"
    cardinality: "One"
parameters:
  - name: "threads"
    param_type: "int"
    default: "1"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads inspected for adapter evidence."
  - name: "reads_out"
    meaning: "Number of reads preserved after governed adapter inspection."
  - name: "bases_in"
    meaning: "Number of input bases inspected for adapter evidence."
  - name: "bases_out"
    meaning: "Number of bases preserved after governed adapter inspection."
  - name: "mean_q"
    meaning: "Mean base quality observed across the inspected reads."
  - name: "candidate_adapter_count"
    meaning: "Number of governed adapter candidates detected in the evidence report"
  - name: "detected_adapter_ids"
    meaning: "Governed adapter-bank identifiers admitted by adapter inspection after stronger parent motifs suppress nested partial seeds."
  - name: "detection_confidence"
    meaning: "Highest governed per-adapter support fraction among the admitted adapter identities."
  - name: "detection_threshold"
    meaning: "Minimum governed support fraction required to admit an adapter identity for this report."
  - name: "adapter_trimmed_fraction"
    meaning: "Fraction of reads with detectable adapter evidence when the backend can estimate it"
description: "Inspect likely adapter content without mutating reads prior to trimming, while emitting governed adapter-report and identity evidence."
required_inputs:
  - reads_r1
required_outputs:
  - report_json
  - adapter_report
tool_capability_requirements:
  - adapter_detection
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "canonical_governed_report_emitted"
allowed_missingness:
  - "reads_r2"
  - "adapter_evidence_dir"
compatible_tools:
  - fastqc
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "single-end input omits reads_r2; paired-end input contributes both mates to governed evidence-only adapter inspection."
  - "fastqc inspects the full input set, so sampled-read evidence is not claimed by the canonical contract."
  - "governed benchmark rows must expose adapter_report, detected_adapter_ids, detection_confidence, and detection_threshold fields from the canonical adapter-inspection report."
bank_hooks:
  - "adapter_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

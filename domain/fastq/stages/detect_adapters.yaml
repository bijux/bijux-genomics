extends: "_schema.yaml"
stage_id: "fastq.detect_adapters"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "adapter_report"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "candidate_adapter_count"
    meaning: "Number of adapter candidates detected"
description: "Inspect likely adapter content without mutating reads prior to trimming."
required_inputs:
  - reads_r1
required_outputs:
  - adapter_report
tool_capability_requirements:
  - adapter_detection
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "reads_r2"
compatible_tools:
  - fastqc
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "single-end input omits reads_r2; paired-end input contributes both mates to evidence-only adapter inspection."
bank_hooks:
  - "adapter_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

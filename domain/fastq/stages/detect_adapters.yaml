extends: "_schema.yaml"
stage_id: "fastq.detect_adapters"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "adapter_report"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "candidate_adapter_count"
    meaning: "Number of adapter candidates detected"
description: "Detect likely adapter content prior to trimming."
required_inputs:
  - reads_r1
required_outputs:
  - adapter_report
tool_capability_requirements:
  - adapter_detection
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - samtools
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "adapter_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

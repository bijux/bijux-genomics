extends: "_schema.yaml"
stage_id: "fastq.prepare_primer_bank"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "primer_sources"
    data_type: "manifest"
    cardinality: "One"
outputs:
  - name: "primer_bank"
    data_type: "fasta"
    cardinality: "One"
  - name: "asset_lock"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "assay_family"
    param_type: "string"
    default: "marker_amplicon"
metrics:
  - name: "primer_count"
    meaning: "Number of primer records admitted to the governed bank."
description: "Prepare immutable primer banks for primer normalization and amplicon route planning."
required_inputs:
  - primer_sources
required_outputs:
  - primer_bank
  - asset_lock
tool_capability_requirements:
  - primer_bank_prepare
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "primer-bank comparability requires marker regime, orientation policy, mismatch policy, and checksum provenance."
bank_hooks:
  - "primer_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

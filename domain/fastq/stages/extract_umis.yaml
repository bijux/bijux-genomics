extends: "_schema.yaml"
stage_id: "fastq.extract_umis"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "umi_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "umi_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "umi_pattern"
    param_type: "string"
    default: "NNNNNNNN"
  - name: "threads"
    param_type: "int"
    default: "2"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of reads after UMI extraction and tag propagation"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs after UMI extraction"
  - name: "reads_with_umi"
    meaning: "Number of reads for which a UMI was extracted and attached."
  - name: "failed_extractions"
    meaning: "Number of reads for which governed UMI extraction did not yield a valid UMI tag."
  - name: "extracted_umi_count"
    meaning: "Canonical number of reads emitted with extracted UMI tags."
  - name: "invalid_umi_count"
    meaning: "Canonical number of reads that remained untagged because UMI extraction failed."
  - name: "tag_header_format"
    meaning: "Canonical FASTQ header tag format used to propagate extracted UMIs."
description: "FASTQ stage for extracting UMIs and propagating them into read headers."
mutates_fastq: true
report_only: false
may_change_read_count: false
image_requirements:
  needs:
    - gzip
    - paired_end_support
  forbids:
    - network
required_inputs:
  - reads_r1
  - reads_r2
required_outputs:
  - umi_reads_r1
  - umi_reads_r2
tool_capability_requirements:
  - umi_extraction
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "canonical_governed_umi_report_emitted"
allowed_missingness:
  - "none"
compatible_tools:
  - umi_tools
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "UMI extraction must preserve read order and pair synchronization."
  - "UMI barcode pattern must match the library design for emitted tags to remain meaningful."
  - "canonical report_json semantics remain comparable across governed UMI extraction runs."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

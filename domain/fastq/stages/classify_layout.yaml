extends: "_schema.yaml"
stage_id: "fastq.classify_layout"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "layout_classification"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "classification_policy"
    param_type: "string"
    default: "strict"
metrics:
  - name: "layout_confidence"
    meaning: "Confidence score for inferred single-end, paired-end, interleaved, or merged-read layout."
description: "Classify FASTQ input layout before route-family-specific planning."
required_inputs:
  - reads
required_outputs:
  - layout_classification
tool_capability_requirements:
  - layout_classification
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "layout classification must distinguish independent single-end, paired-end, interleaved, and premerged inputs before safety rules are applied."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.abundance_normalization"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "count_table"
    data_type: "table"
    cardinality: "One"
outputs:
  - name: "normalized_abundance_table"
    data_type: "table"
    cardinality: "One"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
compatible_tools:
  - seqkit
  - seqfu
assumptions:
  - "Compositional transforms are interpreted as relative, not absolute abundance."
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
bank_hooks:
  - "contaminant_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
required_inputs: []
required_outputs: []
allowed_missingness:
  - "none"

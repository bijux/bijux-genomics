extends: "_schema.yaml"
stage_id: "fastq.abundance_normalization"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "count_table"
    data_type: "table"
    cardinality: "One"
outputs:
  - name: "normalized_abundance_table"
    data_type: "table"
    cardinality: "One"
  - name: "filtered_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics:
  - name: "runtime_s"
    meaning: "Stage runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
compatible_tools:
  - seqfu
assumptions:
  - "Compositional transforms are interpreted as relative, not absolute abundance."
  - "Normalization mode is explicit (rarefaction or compositional transform)."
  - "Reports must include warnings when normalization assumptions are violated."
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
bank_hooks:
  - "contaminant_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
required_inputs: []
required_outputs: []
allowed_missingness:
  - "none"

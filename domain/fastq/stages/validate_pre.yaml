extends: "_schema.yaml"
stage_id: "fastq.validate_pre"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters: []
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs"
  - name: "reads_total"
    meaning: "Total number of reads observed"
  - name: "reads_valid"
    meaning: "Number of reads that passed validation"
  - name: "reads_invalid"
    meaning: "Number of reads that failed validation"
  - name: "mean_q"
    meaning: "Mean Phred quality score"
description: "FASTQ stage for validation and basic statistics."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs: []
required_outputs:
  - report_json
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - fastqvalidator
  - fastqvalidator_official
  - fastq-scan
  - seqtk
  - fqtools
  - fastqc
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

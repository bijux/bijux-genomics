extends: "_schema.yaml"
stage_id: "fastq.validate_pre"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs: []
parameters: []
metrics:
  - name: "reads_total"
    meaning: "Total number of reads observed"
  - name: "reads_valid"
    meaning: "Number of reads that passed validation"
  - name: "reads_invalid"
    meaning: "Number of reads that failed validation"
  - name: "mean_q"
    meaning: "Mean Phred quality score"
description: "FASTQ stage for validation and basic statistics."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network

extends: "_schema.yaml"
stage_id: "fastq.trim_terminal_damage"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "damage_mode"
    param_type: "string"
    default: "ancient"
  - name: "trim_5p_bases"
    param_type: "int"
    default: "2"
  - name: "trim_3p_bases"
    param_type: "int"
    default: "2"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of reads after damage-aware pretrim."
  - name: "bases_in"
    meaning: "Number of input bases before damage-aware trimming."
  - name: "bases_out"
    meaning: "Number of output bases after damage-aware trimming."
  - name: "udg_classification"
    meaning: "UDG handling classification used for terminal damage policy."
  - name: "ct_ga_asymmetry_pre"
    meaning: "Terminal C>T / G>A asymmetry before trimming."
  - name: "ct_ga_asymmetry_post"
    meaning: "Terminal C>T / G>A asymmetry after trimming."
description: "Damage-aware FASTQ pretrim for aDNA libraries with explicit terminal masking/trimming policies."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "trimmed_reads"
  - "report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "damage_policy_report_emitted_before_stage_complete"
allowed_missingness:
  - "none"
compatible_tools:
  - cutadapt
  - seqkit
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "UDG classification is provided via config/env or inferred deterministically from sample metadata."
  - "Terminal masking/trimming policy is explicit and reproducible."
  - "Refusal occurs when downstream aligner requires untrimmed reads."
bank_hooks:
  - "adapter_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

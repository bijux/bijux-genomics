extends: "_schema.yaml"
stage_id: "fastq.trim_terminal_damage"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "trimmed_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "damage_mode"
    param_type: "string"
    default: "ancient"
  - name: "execution_policy"
    param_type: "string"
    default: "policy_derived"
  - name: "trim_5p_bases"
    param_type: "int"
    default: "2"
  - name: "trim_3p_bases"
    param_type: "int"
    default: "2"
metrics:
  - name: "trim_5p_bases"
    meaning: "Resolved 5' trim length applied during damage-aware trimming."
  - name: "trim_3p_bases"
    meaning: "Resolved 3' trim length applied during damage-aware trimming."
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of reads after damage-aware pretrim."
  - name: "reads_retained"
    meaning: "Number of reads retained after damage-aware pretrim."
  - name: "bases_in"
    meaning: "Number of input bases before damage-aware trimming."
  - name: "bases_out"
    meaning: "Number of output bases after damage-aware trimming."
  - name: "bases_removed"
    meaning: "Number of bases removed by damage-aware terminal trimming."
  - name: "pairs_in"
    meaning: "Number of input read pairs observed before damage-aware trimming."
  - name: "pairs_out"
    meaning: "Number of output read pairs emitted after damage-aware trimming."
  - name: "mean_q_before"
    meaning: "Mean base quality before damage-aware trimming."
  - name: "mean_q_after"
    meaning: "Mean base quality after damage-aware trimming."
  - name: "damage_mode"
    meaning: "Resolved damage trimming mode used by the governed execution policy."
  - name: "execution_policy"
    meaning: "Resolved execution policy applied to terminal damage handling."
  - name: "requested_trim_5p_bases"
    meaning: "Requested 5' trim length recorded by governed terminal-damage planning."
  - name: "requested_trim_3p_bases"
    meaning: "Requested 3' trim length recorded by governed terminal-damage planning."
  - name: "udg_classification"
    meaning: "UDG handling classification used for terminal damage policy."
  - name: "ct_ga_asymmetry_pre"
    meaning: "Terminal C>T / G>A asymmetry before trimming."
  - name: "ct_ga_asymmetry_post"
    meaning: "Terminal C>T / G>A asymmetry after trimming."
  - name: "delta_metrics"
    meaning: "Derived read/base retention and quality deltas after damage-aware trimming."
description: "Damage-aware FASTQ pretrim for aDNA libraries with explicit terminal masking/trimming policies."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "trimmed_reads_r1"
  - "report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "damage_policy_report_emitted_before_stage_complete"
allowed_missingness:
  - "reads_r2"
  - "trimmed_reads_r2"
  - "raw_backend_report_json"
compatible_tools:
  - adapterremoval
  - cutadapt
  - seqkit
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "UDG classification is provided via config/env or inferred deterministically from sample metadata."
  - "execution_policy defaults to policy_derived, which preserves UDG-trimmed ends only for the governed udg_trimmed default trim profile and otherwise applies explicit terminal trimming."
  - "Terminal masking/trimming policy is explicit and reproducible."
  - "Refusal occurs when downstream aligner requires untrimmed reads."
  - "single-end input omits reads_r2 and trimmed_reads_r2; paired-end input preserves mate synchronization during terminal trimming."
bank_hooks:
  - "adapter_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

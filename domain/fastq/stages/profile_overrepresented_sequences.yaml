extends: "_schema.yaml"
stage_id: "fastq.profile_overrepresented_sequences"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "overrepresented_sequences_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "overrepresented_sequences_json"
    data_type: "json"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "top_k"
    param_type: "int"
    default: "50"
metrics:
  - name: "sequence_count"
    meaning: "Number of profiled overrepresented sequences"
  - name: "flagged_sequences"
    meaning: "Number of overrepresented sequences that crossed the governed reporting threshold."
  - name: "top_fraction"
    meaning: "Fraction carried by the dominant overrepresented sequence"
description: "FASTQ report-only stage for profiling overrepresented sequence content."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "overrepresented_sequences_tsv"
  - "overrepresented_sequences_json"
  - "report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "report_only_stage"
  - "deterministic_sequence_ranking"
allowed_missingness:
  - "reads_r2"
compatible_tools:
  - fastqc
  - fastq_scan
  - seqkit
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "overrepresented sequence profiles are diagnostic and do not mutate reads."
  - "single-end input omits reads_r2; paired-end input contributes both mates to sequence ranking."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

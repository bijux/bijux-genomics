extends: "_schema.yaml"
stage_id: "fastq.filter"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "filtered_reads"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "min_quality"
    param_type: "int"
    default: "20"
  - name: "max_n"
    param_type: "int"
    default: "0"
  - name: "low_complexity_threshold"
    param_type: "float"
    default: "0.0"
  - name: "kmer_ref"
    param_type: "path"
    default: ""
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads"
  - name: "reads_dropped"
    meaning: "Number of reads removed by filtering"
  - name: "reads_removed_by_n"
    meaning: "Reads removed due to N content"
  - name: "reads_removed_by_entropy"
    meaning: "Reads removed due to low complexity/entropy"
  - name: "reads_removed_low_complexity"
    meaning: "Reads removed due to low complexity filter"
  - name: "reads_removed_by_kmer"
    meaning: "Reads removed due to k-mer contaminant filtering"
  - name: "reads_removed_contaminant_kmer"
    meaning: "Reads removed due to contaminant k-mer filtering"
  - name: "reads_removed_by_length"
    meaning: "Reads removed due to length thresholds"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs"
  - name: "mean_q_before"
    meaning: "Mean base quality before filtering"
  - name: "mean_q_after"
    meaning: "Mean base quality after filtering"
  - name: "delta_metrics"
    meaning: "Derived retention and quality deltas"
description: "FASTQ stage for filtering reads."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs: []
required_outputs: []
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - fastp
  - seqkit
  - prinseq
  - bbduk
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "contaminant_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

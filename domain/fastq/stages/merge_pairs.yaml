extends: "_schema.yaml"
stage_id: "fastq.merge_pairs"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "One"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "One"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_txt"
    data_type: "text"
    cardinality: "One"
parameters:
  - name: "threads"
    param_type: "int"
    default: "6"
    meaning: "Worker threads for the governed merge invocation and resource envelope"
  - name: "merge_overlap"
    param_type: "int"
    default: "0"
  - name: "min_len"
    param_type: "int"
    default: "0"
  - name: "unmerged_read_policy"
    param_type: "string"
    default: "emit_unmerged_pairs"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads observed across both mates before merging"
  - name: "reads_out"
    meaning: "Number of reads emitted after merge and unmerged handling"
  - name: "bases_in"
    meaning: "Number of input bases observed across both mates before merging"
  - name: "bases_out"
    meaning: "Number of output bases emitted after merge and unmerged handling"
  - name: "pairs_in"
    meaning: "Number of input read pairs eligible for merging"
  - name: "pairs_out"
    meaning: "Number of output read pairs represented after merge processing"
  - name: "reads_r1"
    meaning: "Number of forward reads"
  - name: "reads_r2"
    meaning: "Number of reverse reads"
  - name: "input_pair_count"
    meaning: "Canonical number of input read pairs eligible for merging"
  - name: "reads_merged"
    meaning: "Number of successfully merged pairs"
  - name: "reads_unmerged"
    meaning: "Number of pairs left unmerged"
  - name: "merged_pair_count"
    meaning: "Canonical number of merged read pairs emitted by the benchmark row"
  - name: "unmerged_pair_count"
    meaning: "Canonical number of unmerged read pairs retained by the benchmark row"
  - name: "discarded_pair_count"
    meaning: "Canonical number of input read pairs discarded after merge handling"
  - name: "merge_rate"
    meaning: "Fraction of input pairs that merged"
description: "FASTQ stage for merging paired-end reads into merged amplicon or overlapping read fragments."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
  - "reads_r2"
required_outputs:
  - "merged_reads"
  - "report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "paired_end_input_required"
  - "deterministic_merge_output_names"
allowed_missingness:
  - "unmerged_reads_r1"
  - "unmerged_reads_r2"
  - "raw_backend_report_txt"
compatible_tools:
  - adapterremoval
  - pear
  - vsearch
  - bbmerge
  - flash2
  - leehom
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "merge suitability depends on paired-end overlap and library model."
  - "governed report_json is the canonical merge contract and may preserve the backend-native merge log as raw_backend_report_txt for provenance."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.normalize_read_names"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "normalized_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "name_normalization_report"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "name_policy"
    param_type: "string"
    default: "preserve_pair_suffix"
metrics:
  - name: "renamed_reads"
    meaning: "Number of read headers modified by governed normalization."
description: "Normalize FASTQ read names when downstream tools require a stable header convention."
required_inputs:
  - reads
required_outputs:
  - normalized_reads
  - name_normalization_report
tool_capability_requirements:
  - read_name_normalization
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "read-name normalization is unsafe for provenance-sensitive workflows unless original headers are recoverable."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope:
  - bijux_dna

extends: "_schema.yaml"
stage_id: "fastq.qc_post"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "qc_report_html"
    data_type: "html"
    cardinality: "Many"
  - name: "qc_report_json"
    data_type: "json"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "2"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads (post-QC reference)"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases (post-QC reference)"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs"
  - name: "mean_q"
    meaning: "Mean base quality"
  - name: "contamination_rate"
    meaning: "Estimated contamination rate"
  - name: "raw_fastqc_dir"
    meaning: "Path to raw FastQC output directory"
  - name: "trimmed_fastqc_dir"
    meaning: "Path to trimmed FastQC output directory"
  - name: "multiqc_report"
    meaning: "Path to MultiQC HTML report"
  - name: "multiqc_data"
    meaning: "Path to MultiQC data directory"
description: "FASTQ stage for quality control reporting (FastQC/MultiQC)."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs: []
required_outputs: []
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - samtools
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

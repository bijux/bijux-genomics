extends: "_schema.yaml"
stage_id: "fastq.screen"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "4"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads (screening does not remove reads)"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases (screening does not remove bases)"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs"
  - name: "contamination_rate"
    meaning: "Fraction of reads classified as contaminants"
  - name: "contamination_summary"
    meaning: "Structured contamination summary from screen reports"
description: "FASTQ stage for taxonomic screening/contamination assessment."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs: []
required_outputs: []
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - kraken2
  - krakenuniq
  - bracken
  - centrifuge
  - metaphlan
  - kaiju
  - fastq_screen
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "contaminant_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

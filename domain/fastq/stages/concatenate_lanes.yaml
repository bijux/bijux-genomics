extends: "_schema.yaml"
stage_id: "fastq.concatenate_lanes"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "lane_manifest"
    data_type: "json"
    cardinality: "One"
outputs:
  - name: "concatenated_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "lane_manifest_out"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "lane_order_policy"
    param_type: "string"
    default: "manifest_order"
metrics:
  - name: "lane_count"
    meaning: "Number of input lanes concatenated under governed ordering."
description: "Concatenate lane-split FASTQ inputs with governed sample and lane provenance."
required_inputs:
  - lane_manifest
required_outputs:
  - concatenated_reads
  - lane_manifest_out
tool_capability_requirements:
  - lane_concatenation
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "lane concatenation requires stable lane ordering and explicit sample identity preservation."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope:
  - bijux_dna

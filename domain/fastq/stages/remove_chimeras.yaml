extends: "_schema.yaml"
stage_id: "fastq.remove_chimeras"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "chimera_filtered_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "chimera_filtered_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "chimera_metrics_json"
    data_type: "json"
    cardinality: "One"
  - name: "chimeras_fasta"
    data_type: "fasta"
    cardinality: "One"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of non-chimeric output reads."
  - name: "chimeras_removed"
    meaning: "Number of reads removed as chimeric."
  - name: "chimera_fraction"
    meaning: "Fraction of input reads flagged as chimeric."
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "reads_out <= reads_in"
  - "chimeras_removed == reads_in - reads_out"
  - "chimera_fraction in [0, 1]"
compatible_tools:
  - vsearch
assumptions:
  - "Reference or de-novo chimera detection mode is fixed per run."
  - "Chimera reference database id/version/checksum is explicit when reference mode is used."
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
required_inputs:
  - "reads_r1"
required_outputs:
  - "chimera_filtered_reads_r1"
  - "chimera_metrics_json"
allowed_missingness:
  - "reads_r2"
  - "chimera_filtered_reads_r2"
  - "chimeras_fasta"

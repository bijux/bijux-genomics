extends: "_schema.yaml"
stage_id: "fastq.remove_chimeras"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
description: "FASTQ amplicon stage for chimera detection and governed removal reporting."
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "chimera_filtered_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "chimera_metrics_json"
    data_type: "json"
    cardinality: "One"
  - name: "chimeras_fasta"
    data_type: "fasta"
    cardinality: "One"
  - name: "uchime_report_tsv"
    data_type: "tsv"
    cardinality: "One"
parameters:
  - name: "threads"
    param_type: "int"
    default: "2"
    meaning: "Worker threads for the governed chimera-detection invocation and resource envelope"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of non-chimeric output reads."
  - name: "chimeras_removed"
    meaning: "Number of reads removed as chimeric."
  - name: "chimera_fraction"
    meaning: "Fraction of input reads flagged as chimeric."
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "reads_out <= reads_in"
  - "chimeras_removed == reads_in - reads_out"
  - "chimera_fraction in [0, 1]"
compatible_tools:
  - vsearch
tool_capability_requirements:
  - "SE"
assumptions:
  - "Reference or de-novo chimera detection mode is fixed per run."
  - "Chimera reference database id/version/checksum is explicit when reference mode is used."
  - "paired-end libraries must be merged or otherwise reduced to one analysis stream before chimera removal."
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
required_inputs:
  - "reads"
required_outputs:
  - "chimera_filtered_reads"
  - "report_json"
  - "chimera_metrics_json"
allowed_missingness:
  - "chimeras_fasta"
  - "uchime_report_tsv"

extends: "_schema.yaml"
stage_id: "fastq.materialize_qc_manifest"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "qc_reports"
    data_type: "json"
    cardinality: "Many"
outputs:
  - name: "qc_manifest"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "manifest_policy"
    param_type: "string"
    default: "governed"
metrics:
  - name: "report_count"
    meaning: "Number of FASTQ QC reports represented in the governed manifest."
description: "Materialize a governed QC manifest that binds FASTQ reports, inputs, tools, and asset identities."
required_inputs:
  - qc_reports
required_outputs:
  - qc_manifest
tool_capability_requirements:
  - qc_manifest_materialization
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "QC manifest materialization must preserve report-level checksums and tool identities before aggregation."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope:
  - bijux_dna

extends: "_schema.yaml"
stage_id: "fastq.preprocess"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "final_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "final_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "manifest_json"
    data_type: "json"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "4"
metrics:
  - name: "read_retention"
    meaning: "Final reads_out / reads_in"
  - name: "base_retention"
    meaning: "Final bases_out / bases_in"
  - name: "delta_mean_q"
    meaning: "Mean quality delta across pipeline"
description: "Meta-stage orchestrating validate → trim → merge → correct → filter → stats."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs: []
required_outputs: []
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
planned_out_of_scope: []

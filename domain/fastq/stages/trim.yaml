extends: "_schema.yaml"
stage_id: "fastq.trim"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "min_length"
    param_type: "int"
    default: "30"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs"
  - name: "mean_q_before"
    meaning: "Mean base quality before trimming"
  - name: "mean_q_after"
    meaning: "Mean base quality after trimming"
  - name: "delta_metrics"
    meaning: "Derived retention and quality deltas"
  - name: "adapter_bank_id"
    meaning: "Adapter bank id used for trimming"
  - name: "adapter_bank_hash"
    meaning: "Checksum of adapter bank used for trimming"
  - name: "adapter_preset"
    meaning: "Adapter preset name used for trimming"
  - name: "adapter_overrides"
    meaning: "Adapter enable/disable overrides used for trimming"
description: "FASTQ stage for trimming and preprocessing reads."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs: []
required_outputs: []
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - fastp
  - cutadapt
  - atropos
  - bbduk
  - adapterremoval
  - trimmomatic
  - trim_galore
  - seqpurge
  - prinseq
  - seqkit
  - skewer
  - leehom
  - alientrimmer
  - fastx_clipper
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "adapter_bank"
  - "polyx_bank"
  - "contaminant_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.trim"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "min_length"
    param_type: "int"
    default: "30"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases"
  - name: "mean_q_before"
    meaning: "Mean base quality before trimming"
  - name: "mean_q_after"
    meaning: "Mean base quality after trimming"
  - name: "delta_metrics"
    meaning: "Derived retention and quality deltas"
  - name: "adapter_preset"
    meaning: "Adapter preset name used for trimming"
  - name: "adapter_bank_checksum"
    meaning: "Checksum of adapter bank used for trimming"
  - name: "effective_adapters_path"
    meaning: "Path to effective adapters artifact"
  - name: "adapter_trimming_summary"
    meaning: "Summary of adapter trimming outcomes"
description: "FASTQ stage for trimming and preprocessing reads."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network

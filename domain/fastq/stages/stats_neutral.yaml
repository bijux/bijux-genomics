extends: "_schema.yaml"
stage_id: "fastq.stats_neutral"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "stats_json"
    data_type: "json"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "2"
metrics:
  - name: "reads_total"
    meaning: "Total reads observed"
  - name: "bases_total"
    meaning: "Total bases observed"
  - name: "mean_q"
    meaning: "Mean base quality"
  - name: "gc_percent"
    meaning: "GC percentage"
  - name: "length_histogram"
    meaning: "Read length histogram"
description: "FASTQ stage for neutral statistics (no mutation)."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs: []
required_outputs: []
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - seqkit_stats
  - seqkit
  - seqfu
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

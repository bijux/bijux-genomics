extends: "_schema.yaml"
stage_id: "fastq.overrepresented_sequences"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "top_k"
    param_type: "int"
    default: "50"
metrics:
  - name: "reads_total"
    meaning: "Total reads scanned."
  - name: "reads_removed_contaminant_kmer"
    meaning: "Count proxy for overrepresented sequence burden."
description: "FASTQ stage for overrepresented sequence detection and top-k reporting."
mutates_fastq: false
report_only: true
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads"
required_outputs:
  - "screen_report_tsv"
  - "report_json"
tool_capability_requirements:
  - "SE"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - fastqc
  - fastq-scan
  - seqkit
assumptions:
  - "overrepresented output remains comparable only under same top-k setting."
bank_hooks:
  - "adapter_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

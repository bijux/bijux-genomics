extends: "_schema.yaml"
stage_id: "fastq.normalize_abundance"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "abundance_table"
    data_type: "tsv"
    cardinality: "One"
outputs:
  - name: "normalized_abundance_tsv"
    data_type: "tsv"
    cardinality: "One"
parameters:
  - name: "method"
    param_type: "string"
    default: "relative_abundance"
metrics:
  - name: "table_rows"
    meaning: "Number of rows in the normalized abundance table"
  - name: "sample_count"
    meaning: "Number of samples in the normalized abundance table"
  - name: "zero_fraction"
    meaning: "Fraction of normalized cells equal to zero"
description: "FASTQ-derived amplicon stage for normalizing feature-table abundance values."
mutates_fastq: false
report_only: false
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "abundance_table"
required_outputs:
  - "normalized_abundance_tsv"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "amplicon_only_stage"
  - "per_sample_abundance_is_compositional"
allowed_missingness:
  - "none"
compatible_tools:
  - seqfu
  - seqkit
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "input abundance table is produced by an upstream feature-inference or clustering stage."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

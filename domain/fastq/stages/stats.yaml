extends: "_schema.yaml"
stage_id: "fastq.stats"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "stats_json"
    data_type: "json"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "2"
metrics:
  - name: "reads_total"
    meaning: "Total reads observed"
  - name: "bases_total"
    meaning: "Total bases observed"
  - name: "mean_q"
    meaning: "Mean base quality"
  - name: "gc_percent"
    meaning: "GC percentage"
  - name: "length_histogram"
    meaning: "Read length histogram"
description: "FASTQ stage for neutral statistics (no mutation)."

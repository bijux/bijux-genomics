extends: "_schema.yaml"
stage_id: "fastq.infer_asvs"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "asv_table_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "asv_sequences_fasta"
    data_type: "fasta"
    cardinality: "One"
  - name: "taxonomy_ready_fasta"
    data_type: "fasta"
    cardinality: "One"
  - name: "taxonomy_ready_fastq"
    data_type: "fastq"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "denoising_method"
    param_type: "string"
    default: "dada2"
  - name: "pooling_mode"
    param_type: "string"
    default: "independent"
  - name: "chimera_policy"
    param_type: "string"
    default: "remove_bimera_denovo"
  - name: "threads"
    param_type: "int"
    default: "1"
metrics:
  - name: "asv_count"
    meaning: "Number of inferred ASVs"
  - name: "sample_count"
    meaning: "Number of samples represented in the ASV table"
  - name: "representative_sequence_count"
    meaning: "Number of representative sequences emitted alongside the ASV abundance table."
description: "FASTQ stage for amplicon denoising and ASV table generation."
mutates_fastq: false
report_only: false
may_change_read_count: false
image_requirements:
  needs:
    - gzip
    - r
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "asv_table_tsv"
  - "asv_sequences_fasta"
  - "taxonomy_ready_fasta"
  - "taxonomy_ready_fastq"
  - "report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "amplicon_only_stage"
  - "representative_sequences_match_feature_table"
allowed_missingness:
  - "reads_r2"
compatible_tools:
  - dada2
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "asv inference applies only to amplicon libraries with denoising-aware governance."
  - "single-end input omits reads_r2; paired-end denoising retains mate-aware error modeling through the governed dada2 runtime."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"

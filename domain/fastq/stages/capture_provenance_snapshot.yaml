extends: "_schema.yaml"
stage_id: "fastq.capture_provenance_snapshot"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "plan_manifest"
    data_type: "json"
    cardinality: "One"
outputs:
  - name: "provenance_snapshot"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "snapshot_policy"
    param_type: "string"
    default: "pre_execution"
metrics:
  - name: "provenance_entry_count"
    meaning: "Number of plan, tool, asset, and input entries captured in the provenance snapshot."
description: "Capture a pre-execution provenance snapshot for governed FASTQ plans."
required_inputs:
  - plan_manifest
required_outputs:
  - provenance_snapshot
tool_capability_requirements:
  - provenance_snapshot_capture
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "plan certification requires a provenance snapshot that binds stage graph, tools, containers, runtime assets, and input checksums."
bank_hooks:
  - "provenance_registry"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

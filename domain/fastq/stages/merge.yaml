schema_version: "bijux.stage.v1"
stage_id: "fastq.merge"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "min_overlap"
    param_type: "int"
    default: "10"
metrics:
  - name: "reads_r1"
    meaning: "Number of reads in read 1 input"
  - name: "reads_r2"
    meaning: "Number of reads in read 2 input"
  - name: "reads_merged"
    meaning: "Number of merged reads"
  - name: "reads_unmerged"
    meaning: "Number of unmerged reads (per end)"
  - name: "merge_rate"
    meaning: "Fraction of reads that merged"
description: "FASTQ stage for merging paired-end reads."

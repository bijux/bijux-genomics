extends: "_schema.yaml"
stage_id: "fastq.merge"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "min_overlap"
    param_type: "int"
    default: "10"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of merged reads output"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of merged read pairs"
  - name: "reads_r1"
    meaning: "Number of reads in read 1 input"
  - name: "reads_r2"
    meaning: "Number of reads in read 2 input"
  - name: "reads_merged"
    meaning: "Number of merged reads"
  - name: "reads_unmerged"
    meaning: "Number of unmerged reads (per end)"
  - name: "merge_rate"
    meaning: "Fraction of reads that merged"
description: "FASTQ stage for merging paired-end reads."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
    - paired_end_support
  forbids:
    - network
required_inputs: []
required_outputs: []
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - pear
  - vsearch
  - bbmerge
  - flash2
  - leehom
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.damage_aware_pretrim"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics:
  - name: "udg_classification"
    meaning: "Library damage treatment classification (udg/partial/non_udg)."
  - name: "terminal_base_composition_pre"
    meaning: "5p/3p terminal base composition before pretrim."
  - name: "terminal_base_composition_post"
    meaning: "5p/3p terminal base composition after pretrim."
  - name: "ct_ga_asymmetry_pre"
    meaning: "C>T/G>A terminal asymmetry before pretrim."
  - name: "ct_ga_asymmetry_post"
    meaning: "C>T/G>A terminal asymmetry after pretrim."
  - name: "masked_or_trimmed_reads"
    meaning: "Reads modified by terminal mask/trim policy."
description: "Damage-aware FASTQ pretrim for aDNA libraries with explicit terminal masking/trimming policies."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs: []
required_outputs: []
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - cutadapt
  - seqkit
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "UDG classification is provided via config/env or inferred deterministically from sample metadata."
  - "Terminal masking/trimming policy is explicit and reproducible."
  - "Refusal occurs when downstream aligner requires untrimmed reads."
bank_hooks:
  - "adapter_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

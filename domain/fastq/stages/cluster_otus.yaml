extends: "_schema.yaml"
stage_id: "fastq.cluster_otus"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "otu_table"
    data_type: "tsv"
    cardinality: "One"
  - name: "otu_table_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "otu_representatives"
    data_type: "fasta"
    cardinality: "One"
  - name: "representative_sequences_fasta"
    data_type: "fasta"
    cardinality: "One"
  - name: "taxonomy_ready_fasta"
    data_type: "fasta"
    cardinality: "One"
  - name: "taxonomy_ready_fastq"
    data_type: "fastq"
    cardinality: "One"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads contributing to OTU clustering."
  - name: "clustering_threshold"
    meaning: "Canonical benchmark alias for the governed OTU identity threshold."
  - name: "otu_count"
    meaning: "Number of OTU clusters emitted."
  - name: "sample_count"
    meaning: "Number of samples represented in the governed OTU abundance table."
  - name: "representative_count"
    meaning: "Number of representative OTU sequences emitted."
  - name: "representative_sequence_count"
    meaning: "Canonical benchmark alias for the representative OTU sequence count emitted with the OTU table."
  - name: "runtime_s"
    meaning: "Stage runtime in seconds"
  - name: "memory_mb"
    meaning: "Peak memory usage in MB"
parameters:
  - name: "otu_identity"
    param_type: "float"
    default: "0.97"
    meaning: "Governed OTU identity threshold that the benchmark row exposes through the `clustering_threshold` alias."
  - name: "threads"
    param_type: "int"
    default: "4"
description: "FASTQ amplicon stage for deterministic OTU clustering and representative sequence emission."
mutates_fastq: false
report_only: false
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
tool_capability_requirements:
  - "SE"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "clustering_threshold == otu_identity"
  - "representative_sequence_count == representative_count"
compatible_tools:
  - vsearch
assumptions:
  - "OTU identity threshold is declared in the run configuration."
  - "OTU clustering uses reproducible parameters and deterministic centroid ordering."
  - "paired-end libraries must be merged or otherwise reduced to one analysis stream before OTU clustering."
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
required_inputs:
  - "reads"
required_outputs:
  - "report_json"
  - "otu_table"
  - "otu_representatives"
  - "taxonomy_ready_fasta"
  - "taxonomy_ready_fastq"
allowed_missingness:
  - "none"

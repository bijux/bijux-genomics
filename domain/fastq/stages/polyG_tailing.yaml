extends: "_schema.yaml"
stage_id: "fastq.polyG_tailing"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_fastq"
    data_type: "fastq"
    cardinality: "Many"
  - name: "trim_report"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "polyg_min_len"
    param_type: "int"
    default: "10"
  - name: "polyx_min_len"
    param_type: "int"
    default: "10"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of output reads."
  - name: "trimmed_read_fraction"
    meaning: "Fraction of reads changed by polyG/polyX trimming."
description: "FASTQ stage for explicit polyG/polyX tail trimming."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads"
required_outputs:
  - "trimmed_fastq"
  - "trim_report"
tool_capability_requirements:
  - "SE"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - fastp
  - bbduk
assumptions:
  - "polyG handling is isolated from generic adapter trimming for comparability."
bank_hooks:
  - "polyx_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.detect_duplicates_premerge"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "duplicate_signal_report"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "duplicate_detection_policy"
    param_type: "string"
    default: "report_only"
metrics:
  - name: "duplicate_signal_fraction"
    meaning: "Fraction of reads with premerge duplicate-like sequence signatures."
description: "Report duplicate-like signals before merge only when route-family evidence justifies the interpretation."
required_inputs:
  - reads
required_outputs:
  - duplicate_signal_report
tool_capability_requirements:
  - premerge_duplicate_detection
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "premerge duplicate detection is not equivalent to aligned duplicate marking and must stay report-only until route evidence is present."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope:
  - bijux_dna

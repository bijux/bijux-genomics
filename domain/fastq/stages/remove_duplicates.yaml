extends: "_schema.yaml"
stage_id: "fastq.remove_duplicates"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "dedup_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "dedup_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "duplicate_classes_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "duplicate_provenance_json"
    data_type: "json"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "threads"
    param_type: "int"
    default: "4"
    meaning: "Worker threads for the governed duplicate-removal invocation and resource envelope"
  - name: "dedup_mode"
    param_type: "string"
    default: "exact"
  - name: "keep_order"
    param_type: "bool"
    default: "true"
metrics:
  - name: "tool"
    meaning: "Resolved tool identifier for duplicate-removal observation."
  - name: "threads"
    meaning: "Resolved worker threads executed by the selected duplicate-removal backend."
  - name: "dedup_mode"
    meaning: "Governed duplicate-definition mode applied by the selected backend."
  - name: "paired_mode"
    meaning: "Whether duplicate removal ran on single-end or paired-end reads."
  - name: "keep_order"
    meaning: "Whether the governed plan preserves input read order in emitted deduplicated reads."
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "input_reads"
    meaning: "Canonical benchmark alias for the number of input reads."
  - name: "reads_out"
    meaning: "Number of output reads."
  - name: "duplicate_reads"
    meaning: "Canonical benchmark alias for the number of reads removed as duplicates."
  - name: "unique_reads"
    meaning: "Canonical benchmark alias for the number of deduplicated reads retained."
  - name: "output_reads"
    meaning: "Canonical benchmark alias for the number of output reads."
  - name: "duplicates_removed"
    meaning: "Number of reads removed as duplicates."
  - name: "dedup_rate"
    meaning: "Fraction of reads removed as duplicates."
  - name: "pair_count_match"
    meaning: "Whether paired duplicate removal preserved the governed pair count contract."
  - name: "duplicate_class_count"
    meaning: "Number of duplicate classes preserved in the governed duplicate-class summary."
  - name: "duplicate_provenance_json"
    meaning: "Structured governed duplicate provenance summary emitted by the backend."
  - name: "raw_backend_report_format"
    meaning: "Native backend report format preserved alongside the governed duplicate summary."
description: "FASTQ stage for duplicate removal while preserving pair semantics."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "dedup_reads_r1"
  - "duplicate_classes_tsv"
  - "duplicate_provenance_json"
  - "report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "reads_out <= reads_in"
  - "reads_removed_duplicates == reads_in - reads_out"
allowed_missingness:
  - "reads_r2"
  - "dedup_reads_r2"
compatible_tools:
  - fastuniq
  - clumpify
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "paired-end input may emit r1+r2 outputs; single-end may omit r2 artifact."
  - "report_json is the canonical governed deduplication contract; duplicate_classes_tsv and duplicate_provenance_json preserve class-level and backend-lineage evidence for comparison."
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

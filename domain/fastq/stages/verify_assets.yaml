extends: "_schema.yaml"
stage_id: "fastq.verify_assets"
status: "planned"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "asset_locks"
    data_type: "json"
    cardinality: "Many"
outputs:
  - name: "asset_verification_report"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "verification_policy"
    param_type: "string"
    default: "strict"
metrics:
  - name: "verified_asset_count"
    meaning: "Number of locked runtime assets verified before execution."
description: "Verify runtime asset locks and checksums before FASTQ execution starts."
required_inputs:
  - asset_locks
required_outputs:
  - asset_verification_report
tool_capability_requirements:
  - asset_verification
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools: []
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "asset verification must fail closed for world-class-closed plans when any declared asset lock is missing or mismatched."
bank_hooks:
  - "asset_lock_registry"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

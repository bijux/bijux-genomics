extends: "_schema.yaml"
stage_id: "fastq.qc2"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "qc_report_html"
    data_type: "html"
    cardinality: "Many"
  - name: "qc_report_json"
    data_type: "json"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "2"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "mean_q"
    meaning: "Mean base quality"
  - name: "contamination_rate"
    meaning: "Estimated contamination rate"
description: "FASTQ stage for quality control reporting (FastQC/MultiQC)."

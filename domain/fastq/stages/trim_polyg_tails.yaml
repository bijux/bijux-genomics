extends: "_schema.yaml"
stage_id: "fastq.trim_polyg_tails"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "trimmed_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_txt"
    data_type: "text"
    cardinality: "One"
parameters:
  - name: "threads"
    param_type: "int"
    default: "4"
  - name: "trim_polyg"
    param_type: "bool"
    default: "true"
  - name: "min_polyg_run"
    param_type: "int"
    default: "10"
metrics:
  - name: "threads"
    meaning: "Resolved trim-polyg worker threads executed by the selected backend."
  - name: "paired_mode"
    meaning: "Whether the stage ran on single-end or paired-end reads."
  - name: "trim_polyg"
    meaning: "Whether terminal polyG trimming was enabled for the run."
  - name: "min_polyg_run"
    meaning: "Minimum terminal polyG run length required before trimming is applied."
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of output reads after polyG trimming."
  - name: "bases_in"
    meaning: "Number of input bases before polyG trimming."
  - name: "bases_out"
    meaning: "Number of output bases after polyG trimming."
  - name: "pairs_in"
    meaning: "Number of input read pairs observed before polyG trimming."
  - name: "pairs_out"
    meaning: "Number of output read pairs emitted after polyG trimming."
  - name: "mean_q_before"
    meaning: "Mean base quality before polyG trimming."
  - name: "mean_q_after"
    meaning: "Mean base quality after polyG trimming."
  - name: "delta_metrics"
    meaning: "Derived read/base retention and quality deltas for polyG trimming."
  - name: "trimmed_tail_count"
    meaning: "Number of reads whose terminal polyG tail was trimmed."
  - name: "bases_trimmed_polyg"
    meaning: "Number of bases removed from polyG tails."
  - name: "polyx_bank_id"
    meaning: "Resolved polyX bank identifier used to govern polyG trimming chemistry defaults."
  - name: "raw_backend_report_format"
    meaning: "Native backend report format preserved inside the governed trim-polyg report."
  - name: "polyx_bank_hash"
    meaning: "Resolved polyX bank hash used to record chemistry provenance for the run."
  - name: "polyx_preset"
    meaning: "Resolved polyX bank preset used to govern trim-polyg chemistry defaults."
description: "FASTQ stage for trimming instrument-derived polyG tails with governed backend-report normalization."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "trimmed_reads_r1"
  - "report_json"
tool_capability_requirements:
  - "polyx_trim"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "polyg_trim_applied_before_emit"
allowed_missingness:
  - "reads_r2"
  - "trimmed_reads_r2"
  - "raw_backend_report_json"
  - "raw_backend_report_txt"
compatible_tools:
  - fastp
  - bbduk
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "polyG trimming remains a no-op on inputs without terminal G-tail artifacts."
  - "single-end input omits reads_r2 and trimmed_reads_r2; paired-end input preserves mate synchronization during terminal trimming."
  - "governed report_json is the canonical trim-polyg contract and preserves backend-native report provenance for downstream comparison."
  - "backend-native reports are emitted as optional raw_backend_report_json or raw_backend_report_txt artifacts when the selected backend supports them."
bank_hooks:
  - "polyx_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.trim_polyg_tails"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "trim_polyg"
    param_type: "bool"
    default: "true"
  - name: "min_polyg_run"
    param_type: "int"
    default: "10"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads."
  - name: "reads_out"
    meaning: "Number of output reads after polyG trimming."
  - name: "bases_in"
    meaning: "Number of input bases before polyG trimming."
  - name: "bases_out"
    meaning: "Number of output bases after polyG trimming."
  - name: "mean_q_before"
    meaning: "Mean base quality before polyG trimming."
  - name: "mean_q_after"
    meaning: "Mean base quality after polyG trimming."
  - name: "bases_trimmed_polyg"
    meaning: "Number of bases removed from polyG tails."
description: "FASTQ stage for trimming instrument-derived polyG tails."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "trimmed_reads"
  - "report_json"
tool_capability_requirements:
  - "polyx_trim"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "polyg_trim_applied_before_emit"
allowed_missingness:
  - "reads_r2"
compatible_tools:
  - fastp
  - bbduk
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "polyG trimming remains a no-op on inputs without terminal G-tail artifacts."
  - "single-end input omits reads_r2; paired-end input preserves mate synchronization during terminal trimming."
bank_hooks:
  - "polyx_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

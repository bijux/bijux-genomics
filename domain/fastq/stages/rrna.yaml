extends: "_schema.yaml"
stage_id: "fastq.rrna"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "rrna_filtered_reads"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "rrna_db"
    param_type: "path"
    default: ""
  - name: "min_identity"
    param_type: "float"
    default: "0.95"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Reads retained after rRNA filtering"
  - name: "reads_rrna"
    meaning: "Reads classified as rRNA and removed"
description: "FASTQ stage for optional rRNA depletion/screening."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs: []
required_outputs: []
tool_capability_requirements:
  - "rrna_classification"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - sortmerna
assumptions:
  - "default stage assumptions captured"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

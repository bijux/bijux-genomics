extends: "_schema.yaml"
stage_id: "fastq.correct_errors"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "threads"
    param_type: "int"
    default: "1"
  - name: "quality_encoding"
    param_type: "string"
    default: "phred33"
  - name: "kmer_size"
    param_type: "int"
    default: "null"
  - name: "max_memory_gb"
    param_type: "int"
    default: "null"
  - name: "trusted_kmer_artifact"
    param_type: "path"
    default: "null"
  - name: "conservative_mode"
    param_type: "bool"
    default: "false"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of corrected reads"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of corrected bases"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs"
  - name: "kmer_fix_rate"
    meaning: "Rate of k-mer fixes applied"
  - name: "mean_q_before"
    meaning: "Mean base quality before correction"
  - name: "mean_q_after"
    meaning: "Mean base quality after correction"
description: "FASTQ stage for error correction of reads."
mutates_fastq: true
report_only: false
may_change_read_count: false
image_requirements:
  needs:
    - gzip
    - paired_end_support
  forbids:
    - network
required_inputs:
  - reads_r1
  - reads_r2
required_outputs:
  - corrected_reads_r1
  - corrected_reads_r2
  - report_json
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "none"
compatible_tools:
  - rcorrector
  - musket
  - lighter
  - bayeshammer
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "default stage assumptions captured"
bank_hooks:
  - "none"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

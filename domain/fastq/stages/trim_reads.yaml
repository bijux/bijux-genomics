extends: "_schema.yaml"
stage_id: "fastq.trim_reads"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "trimmed_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "min_length"
    param_type: "int"
    default: "30"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of output bases"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of output read pairs"
  - name: "mean_q_before"
    meaning: "Mean base quality before trimming"
  - name: "mean_q_after"
    meaning: "Mean base quality after trimming"
  - name: "delta_metrics"
    meaning: "Derived retention and quality deltas"
  - name: "adapter_bank_id"
    meaning: "Adapter bank id used for trimming"
  - name: "adapter_bank_hash"
    meaning: "Checksum of adapter bank used for trimming"
  - name: "adapter_preset"
    meaning: "Adapter preset name used for trimming"
  - name: "adapter_overrides"
    meaning: "Adapter enable/disable overrides used for trimming"
description: "FASTQ stage for trimming reads."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "trimmed_reads_r1"
  - "report_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
  - "trim_report_emitted_before_stage_complete"
allowed_missingness:
  - "reads_r2"
  - "trimmed_reads_r2"
compatible_tools:
  - fastp
  - cutadapt
  - atropos
  - bbduk
  - adapterremoval
  - trimmomatic
  - trim_galore
  - prinseq
  - seqkit
  - skewer
  - leehom
  - alientrimmer
  - fastx_clipper
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "adapter, polyx, and contaminant trimming policies are explicit in effective params."
  - "single-end input omits reads_r2 and trimmed_reads_r2; paired-end input preserves mate synchronization during trimming."
bank_hooks:
  - "adapter_bank"
  - "polyx_bank"
  - "contaminant_db_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

extends: "_schema.yaml"
stage_id: "fastq.normalize_primers"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "normalized_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "normalized_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "primer_orientation_report"
    data_type: "tsv"
    cardinality: "One"
  - name: "primer_stats_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "primer_set_id"
    param_type: "string"
    default: "default"
  - name: "orientation_policy"
    param_type: "string"
    default: "normalize_to_forward_primer"
  - name: "max_mismatch_rate"
    param_type: "float"
    default: "0.10"
  - name: "min_overlap_bp"
    param_type: "int"
    default: "10"
  - name: "strict_5p_anchor"
    param_type: "bool"
    default: "true"
  - name: "allow_iupac_codes"
    param_type: "bool"
    default: "true"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads presented for primer normalization."
  - name: "reads_out"
    meaning: "Number of reads emitted after primer normalization."
  - name: "matched_primers"
    meaning: "Number of reads whose configured primer sequence was matched and trimmed during normalization."
  - name: "unmatched_reads"
    meaning: "Number of input reads that did not match the governed primer set during normalization."
  - name: "trimmed_primer_bases"
    meaning: "Number of primer-derived bases removed while normalizing read orientation and primer boundaries."
  - name: "primer_trimmed_fraction"
    meaning: "Fraction of reads that required primer trimming"
  - name: "orientation_forward_fraction"
    meaning: "Fraction of reads normalized to forward orientation"
description: "FASTQ stage for primer-aware amplicon orientation normalization."
mutates_fastq: true
report_only: false
may_change_read_count: false
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "normalized_reads_r1"
  - "report_json"
  - "primer_orientation_report"
  - "primer_stats_json"
tool_capability_requirements: []
invariants:
  - "stable_artifact_contract"
  - "amplicon_only_stage"
  - "deterministic_orientation_policy"
allowed_missingness:
  - "reads_r2"
  - "normalized_reads_r2"
compatible_tools:
  - cutadapt
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "primer normalization applies only to amplicon libraries with explicit primer governance."
  - "single-end input omits reads_r2 and normalized_reads_r2; paired-end input preserves mate synchronization."
bank_hooks:
  - "primer_bank"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

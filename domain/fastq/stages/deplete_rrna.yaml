extends: "_schema.yaml"
stage_id: "fastq.deplete_rrna"
status: "supported"
scope: "pre_hpc_pre_vcf"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "rrna_filtered_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "rrna_filtered_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "rrna_removed_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "rrna_removed_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "rrna_report_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "rrna_report_json"
    data_type: "json"
    cardinality: "One"
parameters:
  - name: "threads"
    param_type: "int"
    default: "0"
  - name: "rrna_db"
    param_type: "path"
    default: ""
  - name: "min_identity"
    param_type: "float"
    default: "0.95"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Reads retained after rRNA filtering"
  - name: "retained_reads"
    meaning: "Canonical benchmark alias for retained reads after rRNA depletion"
  - name: "reads_removed"
    meaning: "Reads removed as rRNA during depletion"
  - name: "removed_reads"
    meaning: "Canonical benchmark alias for reads removed as rRNA during depletion"
  - name: "bases_in"
    meaning: "Number of input bases"
  - name: "bases_out"
    meaning: "Number of retained bases after rRNA filtering"
  - name: "pairs_in"
    meaning: "Number of input read pairs"
  - name: "pairs_out"
    meaning: "Number of retained read pairs after rRNA filtering"
  - name: "rrna_fraction_removed"
    meaning: "Fraction of input reads removed as rRNA"
  - name: "depletion_rate"
    meaning: "Canonical benchmark alias for fraction of reads removed as rRNA"
  - name: "depletion_summary"
    meaning: "Structured governed depletion summary for rRNA depletion"
description: "FASTQ stage for optional rRNA depletion/screening."
mutates_fastq: true
report_only: false
may_change_read_count: true
image_requirements:
  needs:
    - gzip
  forbids:
    - network
required_inputs:
  - "reads_r1"
required_outputs:
  - "rrna_filtered_reads_r1"
  - "rrna_removed_reads_r1"
  - "rrna_report_tsv"
  - "rrna_report_json"
tool_capability_requirements:
  - "rrna_classification"
invariants:
  - "stable_artifact_contract"
  - "deterministic_output_order"
allowed_missingness:
  - "reads_r2"
  - "rrna_filtered_reads_r2"
  - "rrna_removed_reads_r2"
compatible_tools:
  - sortmerna
defaults_source: "doc_ref:domain/fastq/docs/DEFAULT_SETTINGS.md"
assumptions:
  - "rRNA reference bank is versioned separately from host and taxonomy databases."
  - "single-end input omits reads_r2 and rrna_filtered_reads_r2; paired-end input preserves mate synchronization."
bank_hooks:
  - "rrna_database_lock"
metrics_schema: "bijux.stage.metrics.v1"
planned_out_of_scope: []

schema_version: "bijux.tool.v2"
tool_id: "bowtie2"
upstream: "https://github.com/BenLangmead/bowtie2"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.5.4"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://www.nature.com/articles/nmeth.1923"
container:
  image: "bijuxdna/bowtie2"
outputs:
  - name: "host_depleted_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "host_depleted_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "removed_host_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "removed_host_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "contaminant_screened_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "contaminant_screened_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "host_depletion_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "contaminant_screen_report_json"
    data_type: "json"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reference_index"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "host_depleted_reads_r1"
    - "host_depleted_reads_r2"
    - "removed_host_reads_r1"
    - "removed_host_reads_r2"
    - "contaminant_screened_reads_r1"
    - "contaminant_screened_reads_r2"
    - "host_depletion_report_json"
    - "contaminant_screen_report_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids:
  - "fastq.deplete_host"
  - "fastq.deplete_reference_contaminants"
status: "supported"
scope: "pre_hpc_pre_vcf"
stage_contracts:
  fastq.deplete_host:
    required_inputs:
      - "reads_r1"
      - "reference_index"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "host_depleted_reads_r1"
      - "host_depleted_reads_r2"
      - "removed_host_reads_r1"
      - "removed_host_reads_r2"
      - "host_depletion_report_json"
    notes: "Reference-guided host depletion emits governed retained-read and removed-read artifacts together with a canonical host depletion report and accepts an optional mate input for paired depletion runs."
  fastq.deplete_reference_contaminants:
    required_inputs:
      - "reads_r1"
      - "reference_index"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "contaminant_screened_reads_r1"
      - "contaminant_screened_reads_r2"
      - "contaminant_screen_report_json"
    notes: "Reference-contaminant depletion emits governed retained-read artifacts together with a canonical contaminant screen report and accepts an optional mate input for paired depletion runs."
expected_artifacts:
  - "host_depleted_reads_r1"
  - "host_depleted_reads_r2"
  - "removed_host_reads_r1"
  - "removed_host_reads_r2"
  - "contaminant_screened_reads_r1"
  - "contaminant_screened_reads_r2"
  - "host_depletion_report_json"
  - "contaminant_screen_report_json"
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "bowtie2 --version"
help_cmd: "bowtie2 --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
reference_index_backends:
  - "bowtie2_build"
capabilities:
  - "SE"
  - "PE"

schema_version: "bijux.tool.v1"
tool_id: "fastuniq"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
container:
  image: "bijuxdna/fastuniq"
  digest: "sha256:pending"
command_template:
  - "bash"
  - "-lc"
  - "set -euo pipefail\nwork_dir='{{out_dir}}/fastuniq_workspace'\nmkdir -p \"$work_dir\"\ngzip -dc -- '{{reads_r1}}' > \"$work_dir/input_r1.fastq\"\ngzip -dc -- '{{reads_r2}}' > \"$work_dir/input_r2.fastq\"\nprintf '%s\\n%s\\n' \"$work_dir/input_r1.fastq\" \"$work_dir/input_r2.fastq\" > '{{out_dir}}/fastuniq_inputs.txt'\nfastuniq -i '{{out_dir}}/fastuniq_inputs.txt' -t q -o \"$work_dir/output_r1.fastq\" -p \"$work_dir/output_r2.fastq\" > '{{out_dir}}/fastuniq.log' 2>&1\ngzip -c \"$work_dir/output_r1.fastq\" > '{{dedup_reads_r1}}'\ngzip -c \"$work_dir/output_r2.fastq\" > '{{dedup_reads_r2}}'\nrm -rf \"$work_dir\"\n"
outputs:
  - name: "dedup_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "dedup_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "duplicate_classes_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "duplicate_provenance_json"
    data_type: "json"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "deduplicate_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "dedup_reads_r1"
    - "dedup_reads_r2"
    - "duplicate_classes_tsv"
    - "duplicate_provenance_json"
    - "report_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
upstream: "https://sourceforge.net/projects/fastuniq/"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.1"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC3527383/"
stage_ids: ["fastq.remove_duplicates"]
stage_contracts:
  fastq.remove_duplicates:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    expected_artifacts:
      - "dedup_reads_r1"
      - "dedup_reads_r2"
      - "duplicate_classes_tsv"
      - "duplicate_provenance_json"
      - "report_json"
    notes: "FastUniq duplicate removal emits governed deduplicated paired reads plus the canonical report_json; duplicate_classes_tsv and duplicate_provenance_json preserve normalized duplicate evidence and backend lineage for comparison."
expected_artifacts: ["dedup_reads_r1", "dedup_reads_r2", "duplicate_classes_tsv", "duplicate_provenance_json", "report_json"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "fastuniq --version"
help_cmd: "fastuniq -h"
comparability:
  comparable_with: ["clumpify"]
  non_comparable_with: []
comparability_notes: "Comparable when duplicate definition and pair-handling parameters are aligned and the governed report_json plus duplicate_provenance_json artifacts are compared together."

schema_version: "bijux.tool.v1"
tool_id: "fastuniq"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
container:
  image: "bijuxdna/fastuniq"
  digest: "sha256:pending"
command_template:
  - "sh"
  - "-lc"
  - "set -euo pipefail\nprintf '%s\\n%s\\n' '{{reads_r1}}' '{{reads_r2}}' > '{{out_dir}}/fastuniq_inputs.txt'\nfastuniq -i '{{out_dir}}/fastuniq_inputs.txt' -t q -o '{{dedup_reads_r1}}' -p '{{dedup_reads_r2}}' > '{{out_dir}}/fastuniq.log' 2>&1\nprintf '%s\\n' '{\"schema_version\":\"bijux.fastq.remove_duplicates.report.v1\",\"tool_id\":\"fastuniq\"}' > '{{report_json}}'\n"
outputs:
  - name: "dedup_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "dedup_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "deduplicate_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "dedup_reads_r1"
    - "dedup_reads_r2"
    - "report_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
upstream: "https://sourceforge.net/projects/fastuniq/"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.1"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.remove_duplicates"]
stage_contracts:
  fastq.remove_duplicates:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    expected_artifacts:
      - "dedup_reads_r1"
      - "dedup_reads_r2"
      - "report_json"
    notes: "FastUniq duplicate removal emits governed deduplicated paired reads and the normalized duplicate report."
expected_artifacts: ["dedup_reads_r1", "dedup_reads_r2", "report_json"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "fastuniq -h"
help_cmd: "fastuniq -h"
comparability:
  comparable_with: ["clumpify"]
  non_comparable_with: []
comparability_notes: "Comparable when duplicate definition and pair-handling parameters are aligned."

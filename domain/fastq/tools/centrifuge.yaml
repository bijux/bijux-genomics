schema_version: "bijux.tool.v1"
tool_id: "centrifuge"
stage_id: "fastq.screen"
role: "diagnostic"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/centrifuge"
  digest: "sha256:pending"
command_template:
  - "centrifuge"
  - "-S"
  - "{{screen_report_tsv}}"
  - "-q"
  - "{{reads_r1}}"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
metrics_parser: "centrifuge_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*"
  forbidden_outputs: []
  forbid_unexpected_outputs: true


schema_version: "bijux.tool.v1"
tool_id: "centrifuge"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/centrifuge"
  digest: "sha256:7a29ee8d8dc156513a23e05e9f8fda2299032ab7e6d5cb3c241c9f34c3f81553"
command_template:
  - "centrifuge"
  - "-S"
  - "{{screen_report_tsv}}"
  - "-q"
  - "{{reads_r1}}"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
  - name: "classification_report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "centrifuge_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "classification_report_json"
    - "screen_report_tsv"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/DaehwanKimLab/centrifuge"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.0.4"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://genome.cshlp.org/content/26/12/1721"
stage_ids: ["fastq.screen_taxonomy"]
stage_contracts:
  fastq.screen_taxonomy:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "screen_report_tsv"
      - "classification_report_json"
    notes: "Raw classifier summaries are preserved in screen_report_tsv while classification_report_json carries the governed taxonomy report contract."
expected_artifacts: ["classification_report_json", "screen_report_tsv"]
metrics_schema_id: "bijux.fastq.classify.v1"
metrics_schema: "bijux.fastq.classify.v1"
version_cmd: "centrifuge --version"
help_cmd: "centrifuge --help"
comparability:
  comparable_with:
    - "kaiju"
    - "kraken2"
    - "krakenuniq"
  non_comparable_with: []
comparability_notes: "Comparable with governed taxonomy classifiers only when database lineage, report normalization, and read layout are held constant."

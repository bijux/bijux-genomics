schema_version: "bijux.tool.v1"
tool_id: "centrifuge"
stage_id: "fastq.screen"
role: "diagnostic"
authoritative: false
strict_capable: false
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/centrifuge"
  digest: "sha256:pending"
command_template:
  - "centrifuge"
  - "-S"
  - "{{screen_report_tsv}}"
  - "-q"
  - "{{reads_r1}}"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
metrics_parser: "centrifuge_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.screen"]
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
metrics_schema: "bijux.unknown.v1"
version_cmd: "centrifuge --version"
help_cmd: "centrifuge --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

schema_version: "bijux.tool.v1"
tool_id: "fastq_screen"
stage_id: "fastq.screen"
role: "diagnostic"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/fastq_screen"
  digest: "sha256:pending"
command_template:
  - "fastq_screen"
  - "--subset"
  - "1000"
  - "{{reads_r1}}"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
metrics_parser: "fastq_screen_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*"
  forbidden_outputs: []
  forbid_unexpected_outputs: true


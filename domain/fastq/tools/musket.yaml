schema_version: "bijux.tool.v1"
tool_id: "musket"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/musket"
  digest: "sha256:d2761679719e961709c0c4842842c0bcb5b3fdc23a5046aa6cd2b28a6dfaca68"
command_template:
  - "musket"
  - "-p"
  - "{{threads}}"
  - "-omulti"
  - "{{corrected_reads_dir}}/corrected"
  - "-inorder"
  - "{{reads_r1}}"
  - "{{reads_r2}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "musket_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "corrected_reads_r1"
    - "report_json"
  optional_outputs:
    - "corrected_reads_r2"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://sourceforge.net/projects/musket/"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.1"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://academic.oup.com/bioinformatics/article/29/3/308/257257"
stage_ids: ["fastq.correct_errors"]
stage_contracts:
  fastq.correct_errors:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "corrected_reads_r1"
      - "corrected_reads_r2"
      - "report_json"
    notes: "Error correction emits governed corrected read artifacts and the normalized correction report; reads_r2 and corrected_reads_r2 remain optional when the planner admits single-end inputs."
expected_artifacts: ["corrected_reads_r1", "corrected_reads_r2", "report_json"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "musket --version"
help_cmd: "musket --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

schema_version: "bijux.tool.v1"
tool_id: "musket"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
  - "SE"
container:
  image: "bijuxdna/musket"
  digest: "sha256:pending"
command_template:
  - "musket"
  - "-p"
  - "{{threads}}"
  - "-in1"
  - "{{reads_r1}}"
  - "-in2"
  - "{{reads_r2}}"
  - "-o1"
  - "{{corrected_reads_r1}}"
  - "-o2"
  - "{{corrected_reads_r2}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "musket_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*.cor.fq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://sourceforge.net/projects/musket/"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.1"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.correct_errors"]
stage_contracts:
  fastq.correct_errors:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    expected_artifacts:
      - "corrected_reads_r1"
      - "corrected_reads_r2"
    notes: "Error correction emits governed corrected read artifacts for both mates."
expected_artifacts: ["corrected_reads_r1", "corrected_reads_r2"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "musket --version"
help_cmd: "musket --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

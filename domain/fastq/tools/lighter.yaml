schema_version: "bijux.tool.v1"
tool_id: "lighter"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/lighter"
  digest: "sha256:e65d145062ddedd1e584f7aec7db45c13ddf33f849888e61d6c3b91e89730085"
command_template:
  - "lighter"
  - "-K"
  - "{{kmer_size}}"
  - "{{genome_size}}"
  - "-t"
  - "{{threads}}"
  - "-od"
  - "{{corrected_reads_dir}}"
  - "-r"
  - "{{reads_r1}}"
  - "-r"
  - "{{reads_r2}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "lighter_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "corrected_reads_r1"
    - "report_json"
  optional_outputs:
    - "corrected_reads_r2"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/mourisl/Lighter"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.1.2"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC4248469/"
stage_ids: ["fastq.correct_errors"]
stage_contracts:
  fastq.correct_errors:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "corrected_reads_r1"
      - "corrected_reads_r2"
      - "report_json"
    notes: "Error correction emits governed corrected read artifacts and the normalized correction report; reads_r2 and corrected_reads_r2 remain optional when the planner admits single-end inputs."
expected_artifacts: ["corrected_reads_r1", "corrected_reads_r2", "report_json"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "lighter --version"
help_cmd: "lighter --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

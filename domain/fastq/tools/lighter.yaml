schema_version: "bijux.tool.v1"
tool_id: "lighter"
stage_id: "fastq.correct"
role: "authoritative"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "PE"
  - "SE"
container:
  image: "bijuxdna/lighter"
  digest: "sha256:pending"
command_template:
  - "lighter"
  - "-r"
  - "{{reads_r1}}"
  - "-r"
  - "{{reads_r2}}"
  - "-o"
  - "{{corrected_reads_r1}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "lighter_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*.cor.fq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true


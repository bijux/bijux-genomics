schema_version: "bijux.tool.v1"
tool_id: "pear"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
container:
  image: "bijuxdna/pear"
  digest: "sha256:4e00e9ffabc5ed46115efab5b6bae946913f1713bb314fd4acb7c379c37efae6"
command_template:
  - "pear"
  - "-f"
  - "{{reads_r1}}"
  - "-r"
  - "{{reads_r2}}"
  - "-o"
  - "{{merged_reads}}"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_txt"
    data_type: "text"
    cardinality: "One"
metrics_parser: "pear_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "merged_reads"
    - "unmerged_reads_r1"
    - "unmerged_reads_r2"
    - "report_json"
    - "raw_backend_report_txt"
  forbidden_outputs: []
  forbid_unexpected_outputs: false
upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC3933873/"
stage_ids: ["fastq.merge_pairs"]
stage_contracts:
  fastq.merge_pairs:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    expected_artifacts:
      - "merged_reads"
      - "unmerged_reads_r1"
      - "unmerged_reads_r2"
      - "report_json"
      - "raw_backend_report_txt"
    notes: "PEAR merge mode emits governed merged and unmerged read artifacts, the canonical merge report, and the native PEAR log for provenance."
expected_artifacts: ["merged_reads", "unmerged_reads_r1", "unmerged_reads_r2", "report_json", "raw_backend_report_txt"]
metrics_schema_id: "bijux.fastq.merge_pairs.v1"
metrics_schema: "bijux.fastq.merge_pairs.v1"
version_cmd: "pear --version"
help_cmd: "pear --help"
comparability:
  comparable_with:
    - "bbmerge"
    - "flash2"
    - "leehom"
    - "vsearch"
  non_comparable_with: []
comparability_notes: "Comparable with governed paired-end merge backends when overlap policy, read layout, and retained unmerged mate artifacts are matched."

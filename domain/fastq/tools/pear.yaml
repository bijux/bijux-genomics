schema_version: "bijux.tool.v1"
tool_id: "pear"
stage_id: "fastq.merge"
role: "authoritative"
authoritative: false
strict_capable: false
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
container:
  image: "bijuxdna/pear"
  digest: "sha256:4e00e9ffabc5ed46115efab5b6bae946913f1713bb314fd4acb7c379c37efae6"
command_template:
  - "pear"
  - "-f"
  - "{{reads_r1}}"
  - "-r"
  - "{{reads_r2}}"
  - "-o"
  - "{{merged_reads}}"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "pear_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "pear.assembled.fastq"
    - "pear.unassembled.forward.fastq"
    - "pear.unassembled.reverse.fastq"
  forbidden_outputs: []
  forbid_unexpected_outputs: false
upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
stage_ids: ["fastq.merge"]
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
metrics_schema: "bijux.unknown.v1"
version_cmd: "pear --version"
help_cmd: "pear --help"
comparability:
  comparable_with: []
  non_comparable_with: []

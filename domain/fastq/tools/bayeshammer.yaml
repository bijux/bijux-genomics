schema_version: "bijux.tool.v1"
tool_id: "bayeshammer"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
  - "SE"
container:
  image: "bijuxdna/bayeshammer"
  digest: "sha256:pending"
command_template:
  - "spades.py"
  - "--only-error-correction"
  - "--careful"
  - "-1"
  - "{{reads_r1}}"
  - "-2"
  - "{{reads_r2}}"
  - "-o"
  - "{{corrected_reads_r1}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "bayeshammer_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*.cor.fq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/ablab/spades"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "4.2.0"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.correct_errors"]
stage_contracts:
  fastq.correct_errors:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    expected_artifacts:
      - "corrected_reads_r1"
      - "corrected_reads_r2"
    notes: "Error correction emits governed corrected read artifacts for both mates."
expected_artifacts: ["corrected_reads_r1", "corrected_reads_r2"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "bayeshammer --version"
help_cmd: "bayeshammer --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

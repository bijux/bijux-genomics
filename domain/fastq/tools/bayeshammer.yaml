schema_version: "bijux.tool.v1"
tool_id: "bayeshammer"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/bayeshammer"
  digest: "sha256:99849ca7576f392a125ce5836e915481ada762cbb4fa9b69593b81c4ca359cd7"
command_template:
  - "spades.py"
  - "--only-error-correction"
  - "-1"
  - "{{reads_r1}}"
  - "-2"
  - "{{reads_r2}}"
  - "-o"
  - "{{corrected_reads_dir}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "bayeshammer_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "corrected_reads_r1"
    - "report_json"
  optional_outputs:
    - "corrected_reads_r2"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/ablab/spades"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "4.2.0"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://link.springer.com/article/10.1186/1471-2164-14-S1-S7"
stage_ids: ["fastq.correct_errors"]
stage_contracts:
  fastq.correct_errors:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "corrected_reads_r1"
      - "corrected_reads_r2"
      - "report_json"
    notes: "Error correction emits governed corrected read artifacts and the normalized correction report; reads_r2 and corrected_reads_r2 remain optional when the planner admits single-end inputs."
expected_artifacts: ["corrected_reads_r1", "corrected_reads_r2", "report_json"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "bayeshammer --version"
help_cmd: "bayeshammer --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

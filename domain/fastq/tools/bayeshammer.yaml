schema_version: "bijux.tool.v1"
tool_id: "bayeshammer"
stage_id: "fastq.correct"
role: "authoritative"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "PE"
  - "SE"
container:
  image: "bijuxdna/bayeshammer"
  digest: "sha256:pending"
command_template:
  - "spades.py"
  - "--only-error-correction"
  - "--careful"
  - "-1"
  - "{{reads_r1}}"
  - "-2"
  - "{{reads_r2}}"
  - "-o"
  - "{{corrected_reads_r1}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "bayeshammer_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*.cor.fq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true


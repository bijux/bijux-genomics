schema_version: "bijux.tool.v1"
tool_id: "adapterremoval"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/adapterremoval"
  digest: "sha256:5b618834ce9fc6376c9605c3a69d738236b9be48fdf493c1bc0945568a50808d"
command_template:
  - "AdapterRemoval"
  - "--file1"
  - "{{reads}}"
  - "--output1"
  - "{{trimmed_reads}}"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "fastq_trim_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "adapterremoval.fastq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/MikkelSchubert/adapterremoval"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.3.3"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.trim_reads", "fastq.trim_terminal_damage"]
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "Trim execution emits governed trimmed-read artifacts together with the normalized stage report."
  fastq.trim_terminal_damage:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "AdapterRemoval terminal-damage trimming admits reads_r1 as the canonical required port, accepts an optional reads_r2 mate for paired layouts, and emits a governed damage-trim report without a backend-native raw report artifact."
expected_artifacts: ["trimmed_reads_r1", "trimmed_reads_r2", "report_json"]
metrics_schema_id: "bijux.fastq.trim_reads.v1"
metrics_schema: "bijux.fastq.trim_reads.v1"
version_cmd: "adapterremoval --version"
help_cmd: "adapterremoval --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

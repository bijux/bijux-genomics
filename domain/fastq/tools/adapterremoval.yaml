schema_version: "bijux.tool.v1"
tool_id: "adapterremoval"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/adapterremoval"
  digest: "sha256:5b618834ce9fc6376c9605c3a69d738236b9be48fdf493c1bc0945568a50808d"
command_template:
  - "AdapterRemoval"
  - "--file1"
  - "{{reads}}"
  - "--output1"
  - "{{trimmed_reads}}"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "trimmed_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_txt"
    data_type: "text"
    cardinality: "One"
metrics_parser: "fastq_trim_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "trimmed_reads_r1"
    - "trimmed_reads_r2"
    - "merged_reads"
    - "unmerged_reads_r1"
    - "unmerged_reads_r2"
    - "report_json"
    - "raw_backend_report_json"
    - "raw_backend_report_txt"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/MikkelSchubert/adapterremoval"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.3.3"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC4751634/"
stage_ids: ["fastq.trim_reads", "fastq.trim_terminal_damage", "fastq.merge_pairs"]
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "Trim execution emits governed trimmed-read artifacts together with the normalized stage report."
  fastq.trim_terminal_damage:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
      - "raw_backend_report_json"
    notes: "AdapterRemoval terminal-damage trimming admits reads_r1 as the canonical required port, accepts an optional reads_r2 mate for paired layouts, emits a governed damage-trim report, and preserves the backend-native JSON report."
  fastq.merge_pairs:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    expected_artifacts:
      - "merged_reads"
      - "unmerged_reads_r1"
      - "unmerged_reads_r2"
      - "report_json"
      - "raw_backend_report_txt"
    notes: "AdapterRemoval merge mode emits governed merged and unmerged read artifacts, the canonical merge report, and the native AdapterRemoval settings file for provenance."
expected_artifacts: ["trimmed_reads_r1", "trimmed_reads_r2", "merged_reads", "unmerged_reads_r1", "unmerged_reads_r2", "report_json", "raw_backend_report_json", "raw_backend_report_txt"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "adapterremoval --version"
help_cmd: "adapterremoval --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

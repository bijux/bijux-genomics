schema_version: "bijux.tool.v1"
tool_id: "metaphlan"
stage_id: "fastq.screen"
role: "diagnostic"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/metaphlan"
  digest: "sha256:pending"
command_template:
  - "metaphlan"
  - "{{reads_r1}}"
  - "--input_type"
  - "fastq"
  - "-o"
  - "{{screen_report_tsv}}"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
metrics_parser: "metaphlan_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
stage_ids: ["fastq.screen"]
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
version_cmd: "metaphlan --version"
help_cmd: "metaphlan --help"
comparability:
  comparable_with: []
  non_comparable_with: []

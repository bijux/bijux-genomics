schema_version: "bijux.tool.v1"
tool_id: "fastp"
stage_id: "fastq.trim"
role: "authoritative"
authoritative: false
strict_capable: false
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/fastp"
  digest: "sha256:603656aa361eee1cbd1370db9412e588da91708da5542173e5ae74aab71cbc10"
command_template:
  - "fastp"
  - "--in1"
  - "{{reads}}"
  - "--out1"
  - "{{trimmed_reads}}"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "fastp_v0"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "fastp.fastq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
stage_ids: ["fastq.trim"]
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
metrics_schema: "bijux.unknown.v1"
version_cmd: "fastp --version"
help_cmd: "fastp --help"
comparability:
  comparable_with: []
  non_comparable_with: []

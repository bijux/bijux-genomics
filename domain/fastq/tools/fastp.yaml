schema_version: "bijux.tool.v1"
tool_id: "fastp"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - adapter_detection
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/fastp"
  digest: "sha256:603656aa361eee1cbd1370db9412e588da91708da5542173e5ae74aab71cbc10"
command_template:
  - "fastp"
  - "--in1"
  - "{{reads_r1}}"
  - "--out1"
  - "{{trimmed_reads_r1}}"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "trimmed_reads_r2"
    data_type: "fastq"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "fastp_v0"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "trimmed_reads_r1"
    - "report_json"
  optional_outputs:
    - "trimmed_reads_r2"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids:
  - "fastq.trim_reads"
  - "fastq.filter_reads"
  - "fastq.profile_read_lengths"
  - "fastq.trim_polyg_tails"
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "fastp trim mode emits paired trimmed reads and a governed trim report."
  fastq.filter_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "filtered_reads_r1"
      - "filtered_reads_r2"
    notes: "fastp filter mode emits paired filtered reads without a separate stage report artifact."
  fastq.profile_read_lengths:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "length_distribution_tsv"
      - "length_distribution_json"
    notes: "fastp length profiling emits deterministic histogram summaries for governed read-length metrics."
  fastq.trim_polyg_tails:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "fastp polyG trimming admits reads_r1 as the canonical required port, accepts an optional reads_r2 mate for paired layouts, and emits a governed trim report under the polyG-tail stage contract."
expected_artifacts:
  - "trimmed_reads_r1"
  - "trimmed_reads_r2"
  - "report_json"
  - "filtered_reads_r1"
  - "filtered_reads_r2"
  - "length_distribution_tsv"
  - "length_distribution_json"
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "fastp --version"
help_cmd: "fastp --help"
comparability:
  comparable_with:
    - "adapterremoval"
    - "atropos"
    - "bbduk"
    - "cutadapt"
    - "prinseq"
    - "seqkit"
    - "trim_galore"
    - "trimmomatic"
  non_comparable_with: []
comparability_notes: "Comparable with other governed trimming and filtering backends only when stage contract, read layout, and retained report artifacts are matched."

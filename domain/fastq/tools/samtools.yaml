schema_version: "bijux.tool.v1"
tool_id: "samtools"
stage_id: "fastq.qc_post"
role: "diagnostic"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/samtools"
  digest: "sha256:pending"
command_template:
  - "samtools"
  - "stats"
  - "{{reads_r1}}"
outputs:
  - name: "qc_report_html"
    data_type: "html"
    cardinality: "Many"
  - name: "qc_report_json"
    data_type: "json"
    cardinality: "Many"
metrics_parser: "samtools_stats_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*"
  forbidden_outputs: []
  forbid_unexpected_outputs: true


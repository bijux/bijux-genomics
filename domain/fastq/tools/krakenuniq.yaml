schema_version: bijux.tool.v2
tool_id: krakenuniq
upstream: https://github.com/fbreitwieser/krakenuniq
versioning_strategy: pinned
pin_strategy: pinned
default_version: 1.0.4
install_kind: container
license: GPL-3.0
citation: paper:https://genomebiology.biomedcentral.com/articles/10.1186/s13059-018-1568-0
container:
  image: bijuxdna/krakenuniq
stage_ids:
- fastq.screen_taxonomy
stage_contracts:
  fastq.screen_taxonomy:
    required_inputs:
    - reads_r1
    optional_inputs:
    - reads_r2
    expected_artifacts:
    - screen_report_tsv
    - classification_report_json
    notes: Raw classifier summaries are preserved in screen_report_tsv while classification_report_json carries the governed taxonomy report contract.
status: supported
scope: pre_hpc_pre_vcf
expected_artifacts:
- classification_report_json
- screen_report_tsv
metrics_schema_id: bijux.fastq.classify.v1
metrics_schema: bijux.fastq.classify.v1
version_cmd: krakenuniq --version
help_cmd: krakenuniq --help
comparability:
  comparable_with:
  - kraken2
  non_comparable_with: []
comparability_notes: Comparable only within same stage contract and input constraints.
notes: Domain SSOT tool contract entry.
capabilities:
- SE
- PE
- taxonomic
outputs:
- name: screen_report_tsv
  data_type: tsv
  cardinality: Many
- name: classification_report_json
  data_type: json
  cardinality: One
execution_contract:
  required_inputs:
  - reads_r1
  optional_inputs:
  - reads_r2
  expected_outputs:
  - screen_report_tsv
  - classification_report_json
  forbidden_outputs: []
  forbid_unexpected_outputs: true

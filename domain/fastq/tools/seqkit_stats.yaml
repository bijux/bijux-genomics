schema_version: "bijux.tool.v1"
tool_id: "seqkit_stats"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/seqkit"
  digest: "sha256:ca3dc13e3fef5d34927c44b2d8cd2bc6708c2c256f42e51369d7b1203b0d2991"
command_template:
  - "seqkit_stats"
  - "-a"
  - "-T"
  - "-j"
  - "{{threads}}"
  - "{{reads_r1}}"
  - "{{reads_r2}}"
outputs:
  - name: "qc_json"
    data_type: "json"
    cardinality: "One"
  - name: "qc_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "qc_plots_dir"
    data_type: "dir"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "length_distribution_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "length_distribution_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "seqkit_stats_v1"
constraints:
  runtime: "local"
  mem_gb: 2
  tmp_gb: 2
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "qc_json"
    - "qc_tsv"
    - "qc_plots_dir"
    - "report_json"
    - "length_distribution_tsv"
    - "length_distribution_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC5051824/"
stage_ids:
  - "fastq.profile_reads"
  - "fastq.profile_read_lengths"
stage_contracts:
  fastq.profile_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "qc_json"
      - "qc_tsv"
      - "qc_plots_dir"
    notes: "Read profiling emits a governed qc_json report with normalized totals, mate summaries, and histogram provenance; qc_tsv preserves the seqkit tabular backend summary; qc_plots_dir carries normalized histogram artifacts derived from the governed report."
  fastq.profile_read_lengths:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "report_json"
      - "length_distribution_tsv"
      - "length_distribution_json"
    notes: "Length profiling emits a governed report_json contract plus deterministic histogram TSV/JSON artifacts for normalized read-length summaries."
expected_artifacts:
  - "qc_json"
  - "qc_tsv"
  - "qc_plots_dir"
  - "report_json"
  - "length_distribution_tsv"
  - "length_distribution_json"
metrics_schema_id: "bijux.fastq.stats.v1"
metrics_schema: "bijux.fastq.stats.v1"
version_cmd: "seqkit_stats --version"
help_cmd: "seqkit_stats --help"
comparability:
  comparable_with:
    - "fastq_scan"
    - "seqfu"
  non_comparable_with: []
comparability_notes: "Comparable with governed read-statistics backends when dataset class, read layout, and emitted QC tables are held constant."

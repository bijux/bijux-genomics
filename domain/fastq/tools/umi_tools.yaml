schema_version: "bijux.tool.v1"
tool_id: "umi_tools"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/umi_tools"
  digest: "sha256:pending"
command_template:
  - "umi_tools"
  - "extract"
  - "--stdin"
  - "{{reads_r1}}"
  - "--stdout"
  - "{{umi_reads_r1}}"
  - "--read2-in"
  - "{{reads_r2}}"
  - "--read2-out"
  - "{{umi_reads_r2}}"
  - "--bc-pattern"
  - "{{umi_pattern}}"
  - "--log"
  - "{{report_json}}"
outputs:
  - name: "umi_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "umi_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "umi_tools_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "umi_tools.r1.fastq.gz"
    - "umi_tools.r2.fastq.gz"
    - "umi_report.json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.extract_umis"]
expected_artifacts: ["umi_reads_r1", "umi_reads_r2"]
metrics_schema_id: "bijux.unknown.v1"
metrics_schema: "bijux.unknown.v1"
version_cmd: "umi_tools --version"
help_cmd: "umi_tools --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

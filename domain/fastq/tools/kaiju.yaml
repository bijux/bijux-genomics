schema_version: "bijux.tool.v1"
tool_id: "kaiju"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/kaiju"
  digest: "sha256:pending"
command_template:
  - "kaiju"
  - "-i"
  - "{{reads_r1}}"
  - "-o"
  - "{{screen_report_tsv}}"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
metrics_parser: "kaiju_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/bioinformatics-centre/kaiju"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.10.0"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.screen_taxonomy"]
expected_artifacts: ["classification_report_json", "screen_report_tsv"]
metrics_schema_id: "bijux.fastq.classify.v1"
metrics_schema: "bijux.fastq.classify.v1"
version_cmd: "kaiju --version"
help_cmd: "kaiju --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

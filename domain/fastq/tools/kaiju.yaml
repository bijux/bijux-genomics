schema_version: "bijux.tool.v1"
tool_id: "kaiju"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/kaiju"
  digest: "sha256:4f30fd9becc62e873bc223231c717bba5b42db8a4f993979bf26c7fc00979f9b"
command_template:
  - "kaiju"
  - "-i"
  - "{{reads_r1}}"
  - "-o"
  - "{{screen_report_tsv}}"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
  - name: "classification_report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "kaiju_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "classification_report_json"
    - "screen_report_tsv"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/bioinformatics-centre/kaiju"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.10.0"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://www.nature.com/articles/ncomms11257"
stage_ids: ["fastq.screen_taxonomy"]
stage_contracts:
  fastq.screen_taxonomy:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "screen_report_tsv"
      - "classification_report_json"
    notes: "Raw classifier summaries are preserved in screen_report_tsv while classification_report_json carries the governed taxonomy report contract."
expected_artifacts: ["classification_report_json", "screen_report_tsv"]
metrics_schema_id: "bijux.fastq.classify.v1"
metrics_schema: "bijux.fastq.classify.v1"
version_cmd: "kaiju --version"
help_cmd: "kaiju --help"
comparability:
  comparable_with:
    - "centrifuge"
    - "kraken2"
    - "krakenuniq"
  non_comparable_with: []
comparability_notes: "Comparable with governed taxonomy classifiers only when the benchmark uses the same database release and normalized taxonomy report contract."

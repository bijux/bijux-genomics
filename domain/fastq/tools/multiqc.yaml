schema_version: "bijux.tool.v1"
tool_id: "multiqc"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/multiqc"
  digest: "sha256:40af0025fcc5bc4ea15e5cd2a4fd7bcfc98ea06c9ca781e6268f3c81d12787ec"
command_template:
  - "multiqc"
  - "-o"
  - "{{multiqc_data}}"
  - "-n"
  - "multiqc_report.html"
  - "{{qc_input_paths}}"
outputs:
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "multiqc_report"
    data_type: "html"
    cardinality: "One"
  - name: "multiqc_data"
    data_type: "dir"
    cardinality: "One"
  - name: "governed_qc_inputs_manifest"
    data_type: "json"
    cardinality: "One"
metrics_parser: "multiqc_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "qc_input_paths"
  expected_outputs:
    - "report_json"
    - "multiqc_report"
    - "multiqc_data"
    - "governed_qc_inputs_manifest"
  forbidden_outputs: []
  forbid_unexpected_outputs: false
upstream: "https://github.com/multiqc/multiqc"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.24"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC5039924/"
stage_ids: ["fastq.report_qc"]
stage_contracts:
  fastq.report_qc:
    required_inputs:
      - "qc_artifacts"
    expected_artifacts:
      - "report_json"
      - "multiqc_report"
      - "multiqc_data"
      - "governed_qc_inputs_manifest"
    notes: "QC aggregation accepts governed stage-level qc_artifacts, the planner writes governed_qc_inputs_manifest before execution, and then lowers the contributor set into the sorted, deduplicated qc_input_paths shell invocation consumed by MultiQC. The canonical governed aggregation report is published as report_json alongside the backend-native MultiQC bundle."
expected_artifacts: ["report_json", "multiqc_report", "multiqc_data", "governed_qc_inputs_manifest"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "multiqc --version"
help_cmd: "multiqc --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only for governed QC aggregation runs that consume the same upstream artifact set and emit the canonical report_json plus the MultiQC report bundle."

schema_version: "bijux.tool.v1"
tool_id: "multiqc"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/multiqc"
  digest: "sha256:40af0025fcc5bc4ea15e5cd2a4fd7bcfc98ea06c9ca781e6268f3c81d12787ec"
command_template:
  - "multiqc"
  - "-o"
  - "{{multiqc_data}}"
  - "-n"
  - "multiqc_report.html"
  - "{{qc_input_paths}}"
outputs:
  - name: "multiqc_report"
    data_type: "html"
    cardinality: "One"
  - name: "multiqc_data"
    data_type: "dir"
    cardinality: "One"
  - name: "governed_qc_inputs_manifest"
    data_type: "json"
    cardinality: "One"
metrics_parser: "multiqc_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "qc_input_paths"
  expected_outputs:
    - "multiqc_report"
    - "multiqc_data"
    - "governed_qc_inputs_manifest"
  forbidden_outputs: []
  forbid_unexpected_outputs: false
upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.report_qc"]
stage_contracts:
  fastq.report_qc:
    required_inputs:
      - "qc_artifacts"
    expected_artifacts:
      - "multiqc_report"
      - "multiqc_data"
      - "governed_qc_inputs_manifest"
    notes: "QC aggregation accepts governed stage-level qc_artifacts, and the planner lowers that bundle into the sorted, deduplicated qc_input_paths execution input consumed by the MultiQC command template."
expected_artifacts: ["multiqc_report", "multiqc_data", "governed_qc_inputs_manifest"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "multiqc --version"
help_cmd: "multiqc --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only for governed QC aggregation runs that consume the same upstream artifact set and emit the canonical MultiQC report bundle."

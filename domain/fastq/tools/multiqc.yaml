schema_version: "bijux.tool.v1"
tool_id: "multiqc"
stage_id: "fastq.qc_post"
role: "diagnostic"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/multiqc"
  digest: "sha256:40af0025fcc5bc4ea15e5cd2a4fd7bcfc98ea06c9ca781e6268f3c81d12787ec"
command_template:
  - "multiqc"
  - "-o"
  - "{{qc_report_html}}"
  - "{{reads_r1}}"
outputs:
  - name: "qc_report_html"
    data_type: "html"
    cardinality: "Many"
  - name: "qc_report_json"
    data_type: "json"
    cardinality: "Many"
metrics_parser: "multiqc_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "multiqc_report.html"
    - "multiqc_data/*"
  forbidden_outputs: []
  forbid_unexpected_outputs: false

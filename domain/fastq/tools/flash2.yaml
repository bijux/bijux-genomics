schema_version: "bijux.tool.v1"
tool_id: "flash2"
stage_id: "fastq.merge"
role: "authoritative"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "PE"
container:
  image: "bijuxdna/flash2"
  digest: "sha256:e3dfc866d56d1ca6d62c58ade5981e0b00fc3c8bf8148ecbd196ab56293e1dd5"
command_template:
  - "flash2"
  - "-o"
  - "{{merged_reads}}"
  - "-d"
  - "{{work_dir}}"
  - "{{reads_r1}}"
  - "{{reads_r2}}"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "flash2_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "flash2.extendedFrags.fastq"
    - "flash2.notCombined_1.fastq"
    - "flash2.notCombined_2.fastq"
  forbidden_outputs: []
  forbid_unexpected_outputs: false
upstream: "unknown"
versioning_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
stage_ids: ["fastq.merge"]
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
version_cmd: "flash2 --version"
help_cmd: "flash2 --help"
comparability:
  comparable_with: []
  non_comparable_with: []

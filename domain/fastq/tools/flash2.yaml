schema_version: "bijux.tool.v1"
tool_id: "flash2"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
container:
  image: "bijuxdna/flash2"
  digest: "sha256:e3dfc866d56d1ca6d62c58ade5981e0b00fc3c8bf8148ecbd196ab56293e1dd5"
command_template:
  - "flash2"
  - "-o"
  - "{{merged_reads}}"
  - "-d"
  - "{{work_dir}}"
  - "{{reads_r1}}"
  - "{{reads_r2}}"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_txt"
    data_type: "text"
    cardinality: "One"
metrics_parser: "flash2_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "merged_reads"
    - "unmerged_reads_r1"
    - "unmerged_reads_r2"
    - "report_json"
    - "raw_backend_report_txt"
  forbidden_outputs: []
  forbid_unexpected_outputs: false
upstream: "https://github.com/dstreett/FLASH2"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.2.00"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC3198573/"
stage_ids: ["fastq.merge_pairs"]
stage_contracts:
  fastq.merge_pairs:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    expected_artifacts:
      - "merged_reads"
      - "unmerged_reads_r1"
      - "unmerged_reads_r2"
      - "report_json"
      - "raw_backend_report_txt"
    notes: "FLASH2 merge mode emits governed merged and unmerged read artifacts, the canonical merge report, and the native FLASH2 log for provenance."
expected_artifacts: ["merged_reads", "unmerged_reads_r1", "unmerged_reads_r2", "report_json", "raw_backend_report_txt"]
metrics_schema_id: "bijux.fastq.merge_pairs.v1"
metrics_schema: "bijux.fastq.merge_pairs.v1"
version_cmd: "flash2 --version"
help_cmd: "flash2 --help"
comparability:
  comparable_with:
    - "bbmerge"
    - "leehom"
    - "pear"
    - "vsearch"
  non_comparable_with: []
comparability_notes: "Comparable with other governed paired-end merge backends when overlap policy, retained unmerged mate policy, and input layout are matched."

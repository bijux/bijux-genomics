schema_version: "bijux.tool.v1"
tool_id: "clumpify"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/clumpify"
  digest: "sha256:fa8159777183edae8355363ba8cc5e8f8f069bee09cb6f2fb70a7ca4220a5c81"
command_template:
  - "bash"
  - "-lc"
  - "set -euo pipefail\nclumpify in='{{reads_r1}}' {{paired_io_args}} out='{{dedup_reads_r1}}' {{dedup_mode_args}} {{keep_order_args}} {{threads_args}} > '{{out_dir}}/clumpify.log' 2>&1\n"
outputs:
  - name: "dedup_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "dedup_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "duplicate_classes_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "duplicate_provenance_json"
    data_type: "json"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "deduplicate_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "dedup_reads_r1"
    - "duplicate_classes_tsv"
    - "duplicate_provenance_json"
    - "report_json"
  optional_outputs:
    - "dedup_reads_r2"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
upstream: "https://jgi.doe.gov/data-and-tools/software-tools/bbtools/"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "39.08"
install_kind: "container"
license: "GPL-3.0"
citation: "software:https://bbmap.org/tools/clumpify"
stage_ids: ["fastq.remove_duplicates"]
stage_contracts:
  fastq.remove_duplicates:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "dedup_reads_r1"
      - "dedup_reads_r2"
      - "duplicate_classes_tsv"
      - "duplicate_provenance_json"
      - "report_json"
    notes: "Clumpify duplicate removal admits reads_r1 as the canonical required port, accepts an optional reads_r2 mate for paired layouts, and emits dedup_reads_r2 only when paired input is present. report_json is the canonical governed deduplication report, while duplicate_classes_tsv and duplicate_provenance_json preserve duplicate-class and backend-lineage evidence."
expected_artifacts: ["dedup_reads_r1", "dedup_reads_r2", "duplicate_classes_tsv", "duplicate_provenance_json", "report_json"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "clumpify --version"
help_cmd: "clumpify --help"
comparability:
  comparable_with: ["fastuniq"]
  non_comparable_with: []
comparability_notes: "Comparable when duplicate model and optical-duplicate handling are harmonized and the governed report_json plus duplicate_provenance_json artifacts are compared together."

schema_version: "bijux.tool.v1"
tool_id: "prinseq"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/prinseq"
  digest: "sha256:7216ffecd7913edaea33ec76b3775ab0cb0d60064f31e96c63e043d578a3f971"
command_template:
  - "prinseq++"
  - "-fastq"
  - "{{reads}}"
  - "-out_good"
  - "{{filtered_reads_r1}}"
  - "-out_bad"
  - "{{filtered_reads_r1}}.bad"
outputs:
  - name: "filtered_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "prinseq_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "*"
  forbidden_outputs: []
  forbid_unexpected_outputs: false
upstream: "https://github.com/Adrian-Cantu/PRINSEQ-plus-plus"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.2.4"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC3051327/"
stage_ids:
  - "fastq.profile_read_lengths"
  - "fastq.trim_reads"
  - "fastq.filter_reads"
  - "fastq.filter_low_complexity"
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "PRINSEQ trim mode emits paired trimmed reads and a governed trim report."
  fastq.filter_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "filtered_reads_r1"
      - "filtered_reads_r2"
      - "report_json"
    notes: "PRINSEQ read filtering emits paired filtered reads and the governed filter report."
  fastq.filter_low_complexity:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "filtered_fastq_r1"
      - "filtered_fastq_r2"
      - "filter_report_json"
    notes: "PRINSEQ low-complexity filtering emits paired filtered reads and the canonical governed low-complexity report."
  fastq.profile_read_lengths:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "report_json"
      - "length_distribution_tsv"
      - "length_distribution_json"
    notes: "PRINSEQ length profiling emits deterministic length-distribution summaries and the governed summary report."
expected_artifacts:
  - "trimmed_reads_r1"
  - "trimmed_reads_r2"
  - "report_json"
  - "filtered_reads_r1"
  - "filtered_reads_r2"
  - "filtered_fastq_r1"
  - "filtered_fastq_r2"
  - "filter_report_json"
  - "length_distribution_tsv"
  - "length_distribution_json"
metrics_schema_id: "bijux.tool.metrics.v1"
metrics_schema: "bijux.tool.metrics.v1"
version_cmd: "prinseq++ --version"
help_cmd: "prinseq++ --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

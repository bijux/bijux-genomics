schema_version: "bijux.tool.v1"
tool_id: "atropos"
stage_id: "fastq.trim"
role: "authoritative"
authoritative: false
strict_capable: false
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:

schema_version: "bijux.tool.v1"
tool_id: "atropos"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/atropos"
  digest: "sha256:5a2fab22811303ced83475111a2427eaa894fcb39436618bb26be1da391f300d"
command_template:
  - "atropos"
  - "trim"
  - "-a"
  - "ADAPTER"
  - "-o"
  - "{{trimmed_reads_r1}}"
  - "{{reads}}"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "atropos_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 2
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "atropos.fastq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
upstream: "https://github.com/jdidion/atropos"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.1.31"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.trim_reads"]
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "Trim execution emits governed trimmed-read artifacts together with the normalized stage report."
expected_artifacts: ["trimmed_reads_r1", "trimmed_reads_r2", "report_json"]
metrics_schema_id: "bijux.fastq.trim_reads.v1"
metrics_schema: "bijux.fastq.trim_reads.v1"
version_cmd: "atropos --version"
help_cmd: "atropos trim --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

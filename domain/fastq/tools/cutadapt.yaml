schema_version: "bijux.tool.v1"
tool_id: "cutadapt"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
  - "adapters"
  - "primers"
container:
  image: "bijuxdna/cutadapt"
  digest: "sha256:4405f2effc1a195c93098408aa36268357c25b758348bfe6da8790bbe7e842ba"
command_template:
  - "cutadapt"
  - "-o"
  - "{{trimmed_reads_r1}}"
  - "{{reads}}"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "trimmed_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "normalized_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "normalized_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "primer_orientation_report"
    data_type: "tsv"
    cardinality: "One"
  - name: "primer_stats_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "fastq_trim_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "trimmed_reads_r1"
    - "trimmed_reads_r2"
    - "normalized_reads_r1"
    - "normalized_reads_r2"
    - "report_json"
    - "raw_backend_report_json"
    - "primer_orientation_report"
    - "primer_stats_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "4.9"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://journal.embnet.org/index.php/embnetjournal/article/view/200"
stage_ids:
  - "fastq.trim_reads"
  - "fastq.normalize_primers"
  - "fastq.trim_terminal_damage"
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
      - "raw_backend_report_json"
    notes: "cutadapt trim mode emits paired trimmed reads, a governed trim report, and preserves the native cutadapt JSON report."
  fastq.normalize_primers:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "normalized_reads_r1"
      - "normalized_reads_r2"
      - "report_json"
      - "primer_orientation_report"
      - "primer_stats_json"
    notes: "cutadapt primer normalization admits an optional reads_r2 mate for paired layouts, emits normalized reads, and writes a governed normalize-primers report alongside orientation and backend summary artifacts."
  fastq.trim_terminal_damage:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
      - "raw_backend_report_json"
    notes: "cutadapt damage-aware trimming admits reads_r1 as the canonical required port, accepts an optional reads_r2 mate for paired layouts, emits a governed damage-trim report, and preserves the native cutadapt JSON as raw_backend_report_json."
expected_artifacts:
  - "trimmed_reads_r1"
  - "trimmed_reads_r2"
  - "report_json"
  - "raw_backend_report_json"
  - "normalized_reads_r1"
  - "normalized_reads_r2"
  - "report_json"
  - "primer_orientation_report"
  - "primer_stats_json"
metrics_schema_id: "bijux.fastq.trim_reads.v1"
metrics_schema: "bijux.fastq.trim_reads.v1"
version_cmd: "cutadapt --version"
help_cmd: "cutadapt --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

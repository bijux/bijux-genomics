schema_version: "bijux.tool.v1"
tool_id: "trim_galore"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/trim_galore"
  digest: "sha256:f323405a5a0ba19bbdae765dd4269e9156c415993977996079b63c5eb5bb0a61"
command_template:
  - "trim_galore"
  - "--output_dir"
  - "{{trimmed_reads_dir}}"
  - "{{reads_r1}}"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "trimmed_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "fastq_trim_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "trimmed_reads_r1"
    - "report_json"
  optional_outputs:
    - "trimmed_reads_r2"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
upstream: "https://github.com/FelixKrueger/TrimGalore"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "0.6.10"
install_kind: "container"
license: "GPL-3.0"
citation: "software:https://doi.org/10.5281/zenodo.7598955"
stage_ids: ["fastq.trim_reads"]
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "Trim Galore stages backend output directories into governed trimmed-read artifacts and a normalized trim report."
expected_artifacts: ["trimmed_reads_r1", "trimmed_reads_r2", "report_json"]
metrics_schema_id: "bijux.fastq.trim_reads.v1"
metrics_schema: "bijux.fastq.trim_reads.v1"
version_cmd: "trim_galore --version"
help_cmd: "trim_galore --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

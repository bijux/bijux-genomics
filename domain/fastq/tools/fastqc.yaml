schema_version: "bijux.tool.v1"
tool_id: "fastqc"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/fastqc"
  digest: "sha256:e0b83c56262486cab51020e2bb809b391ad9b38ba7a898588ab15b73586ee789"
command_template:
  - "fastqc"
  - "{{reads_r1}}"
outputs:
  - name: "validation_report"
    data_type: "json"
    cardinality: "One"
  - name: "validated_reads_manifest"
    data_type: "json"
    cardinality: "One"
  - name: "adapter_report"
    data_type: "json"
    cardinality: "One"
  - name: "adapter_evidence_dir"
    data_type: "dir"
    cardinality: "One"
  - name: "overrepresented_sequences_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "overrepresented_sequences_json"
    data_type: "json"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "fastq_validate_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "validation_report"
    - "validated_reads_manifest"
    - "adapter_report"
    - "adapter_evidence_dir"
    - "overrepresented_sequences_tsv"
    - "overrepresented_sequences_json"
    - "report_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
upstream: "https://github.com/s-andrews/FastQC"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "software:https://www.bioinformatics.babraham.ac.uk/projects/fastqc/"
stage_ids:
  - "fastq.validate_reads"
  - "fastq.detect_adapters"
  - "fastq.profile_overrepresented_sequences"
stage_contracts:
  fastq.validate_reads:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "validation_report"
      - "validated_reads_manifest"
    notes: "Validation remains report-only; the governed adapter uses FastQC as a structural probe, accepts an optional reads_r2 mate for paired layouts, captures backend logs outside the native FastQC outputs, and emits the canonical validation report plus validated-read lineage manifest."
  fastq.detect_adapters:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "report_json"
      - "adapter_report"
      - "adapter_evidence_dir"
    notes: "Evidence-only adapter inspection emits the canonical governed report_json plus the governed evidence directory."
  fastq.profile_overrepresented_sequences:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "overrepresented_sequences_tsv"
      - "overrepresented_sequences_json"
      - "report_json"
    notes: "Sequence-content profiling emits normalized overrepresented-sequence tables plus the governed report artifact."
expected_artifacts:
  - "validation_report"
  - "validated_reads_manifest"
  - "adapter_report"
  - "adapter_evidence_dir"
  - "overrepresented_sequences_json"
  - "overrepresented_sequences_tsv"
  - "report_json"
metrics_schema_id: "bijux.fastq.qc.v1"
metrics_schema: "bijux.fastq.qc.v1"
version_cmd: "fastqc --version"
help_cmd: "fastqc --help"
comparability:
  comparable_with:
    - "seqkit"
  non_comparable_with: []
comparability_notes: "Comparable for governed validation, adapter detection, and overrepresented-sequence profiling when the same read layout and canonical summary artifacts are emitted."

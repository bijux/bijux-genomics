schema_version: "bijux.tool.v1"
tool_id: "fastqc"
stage_id: "fastq.detect_adapters"
role: "diagnostic"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/fastqc"
  digest: "sha256:e0b83c56262486cab51020e2bb809b391ad9b38ba7a898588ab15b73586ee789"
command_template:
  - "fastqc"
  - "{{reads}}"
outputs: []
metrics_parser: "fastq_validate_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*_fastqc/**"
  forbidden_outputs: []
  forbid_unexpected_outputs: false
upstream: "unknown"
versioning_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
stage_ids: ["fastq.detect_adapters"]
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
version_cmd: "fastqc --version"
help_cmd: "fastqc --help"
comparability:
  comparable_with: []
  non_comparable_with: []

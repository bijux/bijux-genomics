schema_version: "bijux.tool.v1"
tool_id: "qualimap"
stage_id: "fastq.qc_post"
role: "diagnostic"
authoritative: false
strict_capable: false
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/qualimap"
  digest: "sha256:pending"
command_template:
  - "qualimap"
  - "bamqc"
  - "-outdir"
  - "{{qc_report_html}}"
  - "-bam"
  - "{{reads_r1}}"
outputs:
  - name: "qc_report_html"
    data_type: "html"
    cardinality: "Many"
  - name: "qc_report_json"
    data_type: "json"
    cardinality: "Many"
metrics_parser: "qualimap_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids: ["fastq.qc_post"]
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
metrics_schema: "bijux.unknown.v1"
version_cmd: "qualimap --version"
help_cmd: "qualimap --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

schema_version: "bijux.tool.v1"
tool_id: "rcorrector"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/rcorrector"
  digest: "sha256:cfec0e32dc980f61681376e78961785c8f74804bd90ebabccb98f825e5fdb454"
command_template:
  - "run_rcorrector.pl"
  - "-od"
  - "{{corrected_reads_dir}}"
  - "-t"
  - "{{threads}}"
  - "-1"
  - "{{reads_r1}}"
  - "-2"
  - "{{reads_r2}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "rcorrector_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "corrected_reads_r1"
    - "corrected_reads_r2"
    - "report_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/mourisl/Rcorrector"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "1.0.7"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://gigascience.biomedcentral.com/articles/10.1186/s13742-015-0089-y"
stage_ids: ["fastq.correct_errors"]
stage_contracts:
  fastq.correct_errors:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "corrected_reads_r1"
      - "corrected_reads_r2"
      - "report_json"
    notes: "Error correction emits governed corrected read artifacts and the normalized correction report; reads_r2 and corrected_reads_r2 remain optional when the planner admits single-end inputs."
expected_artifacts: ["corrected_reads_r1", "corrected_reads_r2", "report_json"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "rcorrector --version"
help_cmd: "rcorrector --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

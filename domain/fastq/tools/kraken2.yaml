schema_version: "bijux.tool.v1"
tool_id: "kraken2"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/kraken2"
  digest: "sha256:e493061d26aeea71812ed8b587a0e65f67617b192e225d8d53eba896dfe7cb35"
command_template:
  - "kraken2"
  - "--report"
  - "{{screen_report_tsv}}"
  - "{{reads_r1}}"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
  - name: "unclassified_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unclassified_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "kraken2_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "classification_report_json"
    - "screen_report_tsv"
    - "unclassified_reads_r1"
    - "unclassified_reads_r2"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/DerrickWood/kraken2"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.1.3"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://genomebiology.biomedcentral.com/articles/10.1186/s13059-019-1891-0"
stage_ids: ["fastq.screen_taxonomy"]
stage_contracts:
  fastq.screen_taxonomy:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "screen_report_tsv"
      - "classification_report_json"
      - "unclassified_reads_r1"
      - "unclassified_reads_r2"
    notes: "Raw classifier summaries are preserved in screen_report_tsv while classification_report_json carries the governed taxonomy report contract. When emit_unclassified is enabled, Kraken2 can also preserve the unresolved reads in unclassified_reads_*."
expected_artifacts: ["classification_report_json", "screen_report_tsv", "unclassified_reads_r1", "unclassified_reads_r2"]
metrics_schema_id: "bijux.fastq.classify.v1"
metrics_schema: "bijux.fastq.classify.v1"
version_cmd: "kraken2 --version"
help_cmd: "kraken2 --help"
comparability:
  comparable_with:
    - "centrifuge"
    - "kaiju"
    - "krakenuniq"
  non_comparable_with: []
comparability_notes: "Comparable with governed taxonomy classifiers only when database lineage, rank collapsing, and normalized report artifacts are equivalent."

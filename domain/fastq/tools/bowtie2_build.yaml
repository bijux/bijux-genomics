schema_version: "bijux.tool.v2"
tool_id: "bowtie2_build"
upstream: "https://github.com/BenLangmead/bowtie2"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.5.4"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://www.nature.com/articles/nmeth.1923"
container:
  image: "bijuxdna/bowtie2_build"
outputs:
  - name: "reference_index"
    data_type: "dir"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
execution_contract:
  required_inputs:
    - "reference_fasta"
  expected_outputs:
    - "reference_index"
    - "report_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids:
  - "fastq.index_reference"
stage_contracts:
  fastq.index_reference:
    required_inputs:
      - "reference_fasta"
    expected_artifacts:
      - "reference_index"
      - "report_json"
    notes: "Reference indexing emits the governed mapper-ready reference index directory and canonical report."
status: "supported"
scope: "pre_hpc_pre_vcf"
expected_artifacts:
  - "reference_index"
  - "report_json"
metrics_schema_id: "bijux.fastq.index.v1"
metrics_schema: "bijux.fastq.index.v1"
version_cmd: "bowtie2-build --version"
help_cmd: "bowtie2-build --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."
capabilities:
  - "reference_index"
  - "reference_indexing"

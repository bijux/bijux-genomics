schema_version: "bijux.tool.v1"
tool_id: "seqpurge"
status: "planned"
scope: "pre_hpc_pre_vcf"
stage_ids:
  - "fastq.trim_reads"
capabilities:
  - "PE"
container:
  image: "bijuxdna/seqpurge"
  digest: "sha256:65c1249b64696ad0783c6409126e45f8025851fd4eaf7f651b2df9bda2a0a662"
command_template:
  - "seqpurge"
  - "-in1"
  - "{{reads_r1}}"
  - "-in2"
  - "{{reads_r2}}"
  - "-out1"
  - "{{trimmed_reads_r1}}"
  - "-out2"
  - "{{trimmed_reads_r2}}"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "trimmed_reads_r2"
    data_type: "fastq"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "seqpurge_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "trimmed_reads_r1"
    - "trimmed_reads_r2"
    - "report_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    execution_contract:
      expected_outputs:
        - "trimmed_reads_r1"
        - "report_json"
      optional_outputs:
        - "trimmed_reads_r2"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "Retained non-governed paired-end trim backend keeps its explicit paired-input contract until it earns governed admission."

upstream: "https://github.com/imgag/ngs-bits"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC4862148/"
expected_artifacts: ["trimmed_reads_r1", "trimmed_reads_r2", "report_json"]
metrics_schema_id: "bijux.fastq.trim_reads.v1"
metrics_schema: "bijux.fastq.trim_reads.v1"
version_cmd: "seqpurge --version"
help_cmd: "seqpurge --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Current container exposes a compatibility wrapper rather than a governed trimming runtime, so no governed benchmark binding is admitted."

schema_version: "bijux.tool.v1"
tool_id: "vsearch"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
  - "chimera"
  - "otu"
container:
  image: "bijuxdna/vsearch"
  digest: "sha256:c16ef98d6fd67ac0b8eea3ebb4f3dc6df9c582d6f838317d5f6ccc7a09e60bb3"
command_template:
  - "vsearch"
  - "--fastq_mergepairs"
  - "{{reads_r1}}"
  - "--reverse"
  - "{{reads_r2}}"
  - "--fastqout"
  - "{{merged_reads}}"
  - "--fastqout_notmerged_fwd"
  - "{{unmerged_reads_r1}}"
  - "--fastqout_notmerged_rev"
  - "{{unmerged_reads_r2}}"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_txt"
    data_type: "text"
    cardinality: "One"
  - name: "chimera_filtered_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "chimera_metrics_json"
    data_type: "json"
    cardinality: "One"
  - name: "chimeras_fasta"
    data_type: "fasta"
    cardinality: "One"
  - name: "uchime_report_tsv"
    data_type: "tsv"
    cardinality: "One"
  - name: "otu_table"
    data_type: "tsv"
    cardinality: "One"
  - name: "otu_representatives"
    data_type: "fasta"
    cardinality: "One"
  - name: "taxonomy_ready_fasta"
    data_type: "fasta"
    cardinality: "One"
  - name: "taxonomy_ready_fastq"
    data_type: "fastq"
    cardinality: "One"
metrics_parser: "vsearch_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "merged_reads"
    - "unmerged_reads_r1"
    - "unmerged_reads_r2"
    - "report_json"
    - "raw_backend_report_txt"
    - "chimera_filtered_reads"
    - "chimera_metrics_json"
    - "chimeras_fasta"
    - "uchime_report_tsv"
    - "otu_table"
    - "otu_representatives"
    - "taxonomy_ready_fasta"
    - "taxonomy_ready_fastq"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC5075697/"
stage_ids:
  - "fastq.merge_pairs"
  - "fastq.remove_chimeras"
  - "fastq.cluster_otus"
stage_contracts:
  fastq.merge_pairs:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    expected_artifacts:
      - "merged_reads"
      - "unmerged_reads_r1"
      - "unmerged_reads_r2"
      - "report_json"
      - "raw_backend_report_txt"
    notes: "vsearch merge mode emits governed merged reads, retained unmerged mates, the canonical merge report, and the native vsearch merge log."
  fastq.remove_chimeras:
    required_inputs:
      - "reads"
    expected_artifacts:
      - "chimera_filtered_reads"
      - "report_json"
      - "chimera_metrics_json"
      - "chimeras_fasta"
      - "uchime_report_tsv"
    notes: "vsearch chimera removal emits filtered reads, a canonical governed report, a compatibility metrics JSON, optional chimera FASTA output, and the native UCHIME TSV evidence."
  fastq.cluster_otus:
    required_inputs:
      - "reads"
    expected_artifacts:
      - "report_json"
      - "otu_table"
      - "otu_representatives"
      - "taxonomy_ready_fasta"
      - "taxonomy_ready_fastq"
    notes: "vsearch OTU clustering emits a canonical governed report, the OTU table, representative sequences, and taxonomy-ready sequence artifacts."
expected_artifacts:
  - "merged_reads"
  - "unmerged_reads_r1"
  - "unmerged_reads_r2"
  - "report_json"
  - "raw_backend_report_txt"
  - "chimera_filtered_reads"
  - "chimera_metrics_json"
  - "chimeras_fasta"
  - "uchime_report_tsv"
  - "otu_table"
  - "otu_representatives"
  - "taxonomy_ready_fasta"
  - "taxonomy_ready_fastq"
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "vsearch --version"
help_cmd: "vsearch --help"
comparability:
  comparable_with:
    - "bbmerge"
    - "flash2"
    - "leehom"
    - "pear"
  non_comparable_with: []
comparability_notes: "Comparable across merge, chimera-removal, and OTU-clustering experiments only within the same governed stage contract and lineage branch."

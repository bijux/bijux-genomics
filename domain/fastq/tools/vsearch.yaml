schema_version: "bijux.tool.v1"
tool_id: "vsearch"
stage_id: "fastq.merge"
role: "authoritative"
authoritative: false
strict_capable: false
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
  - "chimera"
  - "otu"
container:
  image: "bijuxdna/vsearch"
  digest: "sha256:c16ef98d6fd67ac0b8eea3ebb4f3dc6df9c582d6f838317d5f6ccc7a09e60bb3"
command_template:
  - "vsearch"
  - "--fastq_mergepairs"
  - "{{reads_r1}}"
  - "--reverse"
  - "{{reads_r2}}"
  - "--fastqout"
  - "{{merged_reads}}"
  - "--fastqout_notmerged_fwd"
  - "{{unmerged_reads_r1}}"
  - "--fastqout_notmerged_rev"
  - "{{unmerged_reads_r2}}"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "vsearch_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "vsearch.merged.fastq"
    - "vsearch.unmerged_r1.fastq"
    - "vsearch.unmerged_r2.fastq"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids:
  - "fastq.merge"
  - "fastq.chimera_detection"
  - "fastq.otu_clustering"
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
metrics_schema: "bijux.unknown.v1"
version_cmd: "vsearch --version"
help_cmd: "vsearch --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

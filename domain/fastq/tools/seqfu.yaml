schema_version: bijux.tool.v2
tool_id: seqfu
upstream: https://github.com/telatin/seqfu2
versioning_strategy: pinned
pin_strategy: pinned
default_version: 2.4.0
install_kind: container
container:
  image: bijuxdna/seqfu:2.4.0
license: GPL-3.0
citation: paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC8148589/
stage_ids:
- fastq.profile_read_lengths
- fastq.profile_reads
planned_stage_ids:
- fastq.normalize_abundance
stage_contracts:
  fastq.profile_read_lengths:
    required_inputs:
    - reads_r1
    expected_artifacts:
    - report_json
    - length_distribution_tsv
    - length_distribution_json
    notes: SeqFu read-length profiling emits the governed summary report plus deterministic histogram artifacts.
  fastq.normalize_abundance:
    required_inputs:
    - abundance_table
    expected_artifacts:
    - normalized_abundance_tsv
    - report_json
    notes: Planned abundance normalization would emit the governed normalized abundance table and canonical report artifacts.
  fastq.profile_reads:
    required_inputs:
    - reads_r1
    optional_inputs:
    - reads_r2
    expected_artifacts:
    - qc_json
    - qc_tsv
    notes: SeqFu read profiling retains the governed qc_json and qc_tsv profile artifacts while using the current seqfu compatibility wrapper as the backend stats entrypoint.
status: supported
scope: pre_hpc_pre_vcf
expected_artifacts:
- length_distribution_tsv
- length_distribution_json
- normalized_abundance_tsv
- report_json
- qc_json
- qc_tsv
metrics_schema_id: bijux.fastq.stats.v1
metrics_schema: bijux.fastq.stats.v1
version_cmd: seqfu --version
help_cmd: seqfu --help
comparability:
  comparable_with:
  - seqkit_stats
  - seqkit
  non_comparable_with: []
comparability_notes: Comparable only within same stage contract and input constraints.
notes: Domain SSOT tool contract entry.
capabilities:
- SE
- PE
- qc
outputs:
- name: report_json
  data_type: json
  cardinality: One
- name: length_distribution_tsv
  data_type: tsv
  cardinality: One
- name: length_distribution_json
  data_type: json
  cardinality: One
- name: normalized_abundance_tsv
  data_type: tsv
  cardinality: One
- name: qc_json
  data_type: json
  cardinality: One
- name: qc_tsv
  data_type: tsv
  cardinality: One
execution_contract:
  required_inputs:
  - reads_r1
  expected_outputs:
  - report_json
  - length_distribution_tsv
  - length_distribution_json
  - normalized_abundance_tsv
  - qc_json
  - qc_tsv
  forbidden_outputs: []
  forbid_unexpected_outputs: true

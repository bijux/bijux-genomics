schema_version: bijux.tool.v2
tool_id: seqfu
upstream: https://github.com/telatin/seqfu2
versioning_strategy: pinned
pin_strategy: pinned
default_version: planned
install_kind: container
license: GPL-3.0
citation: paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC8148589/
planned_stage_ids:
- fastq.profile_read_lengths
- fastq.normalize_abundance
stage_ids:
- fastq.profile_reads
stage_contracts:
  fastq.profile_read_lengths:
    required_inputs:
    - reads_r1
    expected_artifacts:
    - report_json
    - length_distribution_tsv
    - length_distribution_json
    notes: Planned read-length profiling would emit governed histogram artifacts.
  fastq.normalize_abundance:
    required_inputs:
    - abundance_table
    expected_artifacts:
    - normalized_abundance_tsv
    - report_json
    notes: Planned abundance normalization would emit the governed normalized abundance table and canonical report artifacts.
  fastq.profile_reads:
    required_inputs:
    - reads_r1
    optional_inputs:
    - reads_r2
    expected_artifacts:
    - qc_json
    - qc_tsv
    notes: SeqFu read profiling emits governed qc_json and qc_tsv profile artifacts while retaining SeqFu-native statistics as the backend evidence source.
status: supported
scope: pre_hpc_pre_vcf
expected_artifacts:
- length_distribution_tsv
- length_distribution_json
- normalized_abundance_tsv
- report_json
- qc_json
- qc_tsv
metrics_schema_id: bijux.fastq.stats.v1
metrics_schema: bijux.fastq.stats.v1
version_cmd: seqfu --version
help_cmd: seqfu --help
comparability:
  comparable_with:
  - seqkit_stats
  - seqkit
  non_comparable_with: []
comparability_notes: Comparable only within same stage contract and input constraints.
notes: Domain SSOT tool contract entry.
capabilities:
- SE
- PE
- qc

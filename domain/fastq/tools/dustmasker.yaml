schema_version: "bijux.tool.v2"
tool_id: "dustmasker"
upstream: "https://www.ncbi.nlm.nih.gov/IEB/ToolBox/CPP_DOC/lxr/source/src/app/dustmasker/"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.15.0"
install_kind: "container"
license: "Public-Domain"
citation: "paper:https://journals.sagepub.com/doi/abs/10.1089/cmb.2006.13.1028"
planned_stage_ids: ["fastq.filter_low_complexity"]
stage_ids: ["fastq.filter_low_complexity"]
stage_contracts:
  fastq.filter_low_complexity:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "filtered_fastq_r1"
      - "filtered_fastq_r2"
      - "filter_report_json"
    notes: "Planned low-complexity filtering would emit governed filtered-read artifacts together with the normalized filter report."
status: "planned"
scope: "pre_hpc_pre_vcf"
expected_artifacts: ["filtered_fastq_r1", "filtered_fastq_r2", "filter_report_json"]
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "dustmasker -version"
help_cmd: "dustmasker -help"
comparability:
  comparable_with: ["prinseq", "bbduk"]
  non_comparable_with: []
comparability_notes: "Comparable when complexity thresholds and masking-to-filter conversion policy are matched."
capabilities:
  - SE
  - PE

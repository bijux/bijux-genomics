schema_version: "bijux.tool.v2"
tool_id: "dustmasker"
upstream: "https://www.ncbi.nlm.nih.gov/IEB/ToolBox/CPP_DOC/lxr/source/src/app/dustmasker/"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "2.15.0"
install_kind: "container"
license: "Public-Domain"
citation: "paper:https://journals.sagepub.com/doi/abs/10.1089/cmb.2006.13.1028"
status: "planned"
scope: "pre_hpc_pre_vcf"
stage_ids:
  - "fastq.filter_low_complexity"
expected_artifacts: ["filtered_fastq_r1", "filtered_fastq_r2", "filter_report_json"]
stage_contracts:
  fastq.filter_low_complexity:
    required_inputs:
      - "reads_r1"
    execution_contract:
      expected_outputs:
        - "filtered_fastq_r1"
        - "filter_report_json"
      optional_outputs:
        - "filtered_fastq_r2"
    expected_artifacts:
      - "filtered_fastq_r1"
      - "filtered_fastq_r2"
      - "filter_report_json"
    notes: "Retained non-governed low-complexity backend keeps its read-layout and artifact contract explicit until full runtime admission."
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "dustmasker -version"
help_cmd: "dustmasker -help"
comparability:
  comparable_with: ["prinseq", "bbduk"]
  non_comparable_with: []
comparability_notes: "No governed benchmark binding is admitted until the tool owns a full execution contract, normalized output contract, and reviewer-stable local smoke proof."
capabilities:
  - SE
  - PE

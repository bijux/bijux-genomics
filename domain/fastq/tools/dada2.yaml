schema_version: bijux.tool.v2
tool_id: dada2
upstream: https://benjjneb.github.io/dada2/
versioning_strategy: pinned
pin_strategy: pinned
default_version: planned
install_kind: external
license: GPL-3.0
citation: pending:tool-publication
stage_ids:
  - fastq.infer_asvs
stage_contracts:
  fastq.infer_asvs:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "asv_table_tsv"
      - "asv_sequences_fasta"
      - "taxonomy_ready_fasta"
      - "taxonomy_ready_fastq"
    notes: "Planned ASV inference would emit governed feature-table and taxonomy-ready representative-sequence artifacts."
status: out_of_scope
scope: pre_hpc_pre_vcf
expected_artifacts:
  - asv_table_tsv
  - asv_sequences_fasta
  - taxonomy_ready_fasta
  - taxonomy_ready_fastq
metrics_schema_id: bijux.fastq.asv.v1
metrics_schema: bijux.fastq.asv.v1
version_cmd: Rscript -e "packageVersion('dada2')"
help_cmd: Rscript -e "library(dada2); cat('dada2 help via R docs\n')"
comparability:
  comparable_with: []
  non_comparable_with:
    - vsearch
comparability_notes: ASV outputs are not directly comparable with OTU centroid outputs.
notes: ASV path is currently out-of-scope; OTU remains primary until deterministic containerized ASV admission.
capabilities:
  - SE
  - PE
  - asv

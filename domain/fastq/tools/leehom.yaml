schema_version: bijux.tool.v2
tool_id: leehom
upstream: https://github.com/grenaud/leeHom
versioning_strategy: pinned
pin_strategy: pinned
default_version: bbddce1542ce
install_kind: container
license: GPL-3.0
citation: pending:tool-publication
stage_ids:
- fastq.trim_reads
- fastq.merge_pairs
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - reads_r1
    expected_artifacts:
      - trimmed_reads_r1
      - trimmed_reads_r2
      - report_json
    notes: LeeHom trim mode emits paired trimmed reads plus a trim report.
  fastq.merge_pairs:
    required_inputs:
      - reads_r1
      - reads_r2
    expected_artifacts:
      - merged_reads
      - report_json
    notes: LeeHom merge mode emits merged reads and a merge report; governed unmerged mate artifacts remain optional because the backend does not natively persist them.
status: supported
scope: pre_hpc_pre_vcf
expected_artifacts:
- trimmed_reads_r1
- trimmed_reads_r2
- merged_reads
- report_json
metrics_schema_id: bijux.fastq.merge_pairs.v1
metrics_schema: bijux.fastq.merge_pairs.v1
version_cmd: leehom --version
help_cmd: leehom --help
comparability:
  comparable_with:
  - pear
  - flash2
  - bbmerge
  non_comparable_with: []
comparability_notes: Comparable only within same stage contract and input constraints.
notes: Domain SSOT tool contract entry.
capabilities:
- SE
- PE
- adapters

schema_version: "bijux.tool.v1"
tool_id: "spades"
stage_id: "fastq.correct"
role: "authoritative"
authoritative: false
strict_capable: false
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
  - "SE"
container:
  image: "bijuxdna/spades"
  digest: "sha256:pending"
command_template:
  - "spades.py"
  - "--only-error-correction"
  - "-1"
  - "{{reads_r1}}"
  - "-2"
  - "{{reads_r2}}"
  - "-o"
  - "{{corrected_reads_r1}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "spades_correct_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*.cor.fq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
stage_ids: ["fastq.correct"]
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
metrics_schema: "bijux.unknown.v1"
version_cmd: "spades --version"
help_cmd: "spades --help"
comparability:
  comparable_with: []
  non_comparable_with: []

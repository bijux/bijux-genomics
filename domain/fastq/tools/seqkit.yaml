schema_version: "bijux.tool.v1"
tool_id: "seqkit"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "PE"
  - "abundance"
  - "normalization"
container:
  image: "bijuxdna/seqkit"
  digest: "sha256:ca3dc13e3fef5d34927c44b2d8cd2bc6708c2c256f42e51369d7b1203b0d2991"
command_template:
  - "seqkit"
  - "seq"
  - "-m"
  - "1"
  - "-o"
  - "{{filtered_reads_r1}}"
  - "{{reads_r1}}"
outputs:
  - name: "filtered_reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "filtered_reads_r2"
    data_type: "fastq"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "seqkit_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 2
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "filtered_reads_r1"
    - "filtered_reads_r2"
    - "report_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://github.com/shenwei356/seqkit"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://pmc.ncbi.nlm.nih.gov/articles/PMC5051824/"
stage_ids:
  - "fastq.trim_reads"
  - "fastq.filter_reads"
  - "fastq.normalize_abundance"
  - "fastq.trim_terminal_damage"
  - "fastq.profile_overrepresented_sequences"
  - "fastq.profile_reads"
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "seqkit trim mode emits paired trimmed reads and a governed trim report."
  fastq.filter_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "filtered_reads_r1"
      - "filtered_reads_r2"
      - "report_json"
    notes: "seqkit read filtering emits paired filtered reads and the governed filter report."
  fastq.normalize_abundance:
    required_inputs:
      - "abundance_table"
    expected_artifacts:
      - "normalized_abundance_tsv"
      - "report_json"
    notes: "seqkit abundance normalization emits the governed normalized abundance table and a canonical normalize-abundance report."
  fastq.trim_terminal_damage:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "seqkit damage-aware trimming admits reads_r1 as the canonical required port, accepts an optional reads_r2 mate for paired layouts, and emits a governed damage-trim report; no backend-native raw report is emitted for this backend."
  fastq.profile_overrepresented_sequences:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "overrepresented_sequences_tsv"
      - "overrepresented_sequences_json"
      - "report_json"
    notes: "seqkit sequence-content profiling emits normalized overrepresented-sequence tables plus the governed report artifact."
  fastq.profile_reads:
    required_inputs:
      - "reads_r1"
    optional_inputs:
      - "reads_r2"
    expected_artifacts:
      - "qc_json"
      - "qc_tsv"
    notes: "seqkit read profiling retains the backend stats invocation while publishing the governed qc_json and qc_tsv profile artifacts without mutating reads."
expected_artifacts:
  - "trimmed_reads_r1"
  - "trimmed_reads_r2"
  - "report_json"
  - "filtered_reads_r1"
  - "filtered_reads_r2"
  - "normalized_abundance_tsv"
  - "report_json"
  - "overrepresented_sequences_tsv"
  - "overrepresented_sequences_json"
  - "report_json"
  - "qc_json"
  - "qc_tsv"
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "seqkit --version"
help_cmd: "seqkit --help"
comparability:
  comparable_with:
    - "bbduk"
    - "cutadapt"
    - "fastp"
    - "prinseq"
    - "seqfu"
    - "trimmomatic"
  non_comparable_with: []
comparability_notes: "Comparable with governed read filtering, trimming, and abundance-normalization backends only inside the same stage contract and lineage."

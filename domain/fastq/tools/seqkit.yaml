schema_version: "bijux.tool.v1"
tool_id: "seqkit"
stage_id: "fastq.filter"
role: "transform"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
container:
  image: "bijuxdna/seqkit"
  digest: "sha256:ca3dc13e3fef5d34927c44b2d8cd2bc6708c2c256f42e51369d7b1203b0d2991"
command_template:
  - "seqkit"
  - "seq"
  - "-m"
  - "1"
  - "-o"
  - "{{filtered_reads}}"
  - "{{reads}}"
outputs:
  - name: "filtered_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "seqkit_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 2
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "seqkit.fastq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true


schema_version: "bijux.tool.v1"
tool_id: "seqkit"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "SE"
  - "abundance"
  - "normalization"
container:
  image: "bijuxdna/seqkit"
  digest: "sha256:ca3dc13e3fef5d34927c44b2d8cd2bc6708c2c256f42e51369d7b1203b0d2991"
command_template:
  - "seqkit"
  - "seq"
  - "-m"
  - "1"
  - "-o"
  - "{{filtered_reads_r1}}"
  - "{{reads_r1}}"
outputs:
  - name: "filtered_reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "filtered_reads_r2"
    data_type: "fastq"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
metrics_parser: "seqkit_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 2
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "filtered_reads_r1"
    - "filtered_reads_r2"
    - "report_json"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "pending:tool-publication"
stage_ids:
  - "fastq.trim_reads"
  - "fastq.filter_reads"
  - "fastq.normalize_abundance"
  - "fastq.normalize_primers"
  - "fastq.trim_terminal_damage"
  - "fastq.profile_overrepresented_sequences"
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "seqkit trim mode emits paired trimmed reads and a governed trim report."
  fastq.filter_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "filtered_reads_r1"
      - "filtered_reads_r2"
    notes: "seqkit read filtering emits paired filtered reads under the generic filter contract."
  fastq.normalize_abundance:
    required_inputs:
      - "abundance_table"
    expected_artifacts:
      - "normalized_abundance_tsv"
    notes: "seqkit abundance normalization emits the normalized abundance table."
  fastq.normalize_primers:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "normalized_reads_r1"
      - "normalized_reads_r2"
      - "primer_orientation_report"
      - "primer_stats_json"
    notes: "seqkit primer normalization emits normalized reads plus primer orientation and summary reports."
  fastq.trim_terminal_damage:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
    notes: "seqkit damage-aware trimming emits paired trimmed reads and a governed damage-trim report."
  fastq.profile_overrepresented_sequences:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "overrepresented_sequences_tsv"
      - "overrepresented_sequences_json"
    notes: "seqkit sequence-content profiling emits normalized overrepresented-sequence tables."
expected_artifacts:
  - "trimmed_reads_r1"
  - "trimmed_reads_r2"
  - "report_json"
  - "filtered_reads_r1"
  - "filtered_reads_r2"
  - "normalized_abundance_tsv"
  - "normalized_reads_r1"
  - "normalized_reads_r2"
  - "primer_orientation_report"
  - "primer_stats_json"
  - "overrepresented_sequences_tsv"
  - "overrepresented_sequences_json"
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "seqkit --version"
help_cmd: "seqkit --help"
comparability:
  comparable_with:
    - "bbduk"
    - "cutadapt"
    - "fastp"
    - "prinseq"
    - "seqfu"
    - "trimmomatic"
  non_comparable_with: []
comparability_notes: "Comparable with governed read filtering, primer normalization, and abundance normalization backends only inside the same stage contract and lineage."

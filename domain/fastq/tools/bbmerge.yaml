schema_version: "bijux.tool.v1"
tool_id: "bbmerge"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - "PE"
container:
  image: "bijuxdna/bbmerge"
  digest: "sha256:6182848b989c8dbf094e06c486190b5d54243ac8eea542daa2c5c059a11bba54"
command_template:
  - "bbmerge"
  - "in1={{reads_r1}}"
  - "in2={{reads_r2}}"
  - "out={{merged_reads}}"
  - "outu1={{unmerged_reads_r1}}"
  - "outu2={{unmerged_reads_r2}}"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_txt"
    data_type: "text"
    cardinality: "One"
metrics_parser: "bbmerge_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
    - "reads_r2"
  expected_outputs:
    - "merged_reads"
    - "unmerged_reads_r1"
    - "unmerged_reads_r2"
    - "report_json"
    - "raw_backend_report_txt"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "https://sourceforge.net/projects/bbmap/"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "39.01"
install_kind: "container"
license: "GPL-3.0"
citation: "paper:https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0185056"
stage_ids: ["fastq.merge_pairs"]
stage_contracts:
  fastq.merge_pairs:
    required_inputs:
      - "reads_r1"
      - "reads_r2"
    expected_artifacts:
      - "merged_reads"
      - "unmerged_reads_r1"
      - "unmerged_reads_r2"
      - "report_json"
      - "raw_backend_report_txt"
    notes: "BBMerge merge mode emits governed merged and unmerged read artifacts, the canonical merge report, and the native BBMerge log for provenance."
expected_artifacts: ["merged_reads", "unmerged_reads_r1", "unmerged_reads_r2", "report_json", "raw_backend_report_txt"]
metrics_schema_id: "bijux.fastq.merge_pairs.v1"
metrics_schema: "bijux.fastq.merge_pairs.v1"
version_cmd: "bbmerge --version"
help_cmd: "bbmerge --help"
comparability:
  comparable_with:
    - "flash2"
    - "leehom"
    - "pear"
    - "vsearch"
  non_comparable_with: []
comparability_notes: "Comparable with other governed paired-end merge backends when overlap policy, retained unmerged mate policy, and input layout are matched."

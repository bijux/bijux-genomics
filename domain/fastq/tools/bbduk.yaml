citation: "pending:tool-publication"
stage_ids:
  - "fastq.trim_reads"
  - "fastq.filter_reads"
  - "fastq.filter_low_complexity"
  - "fastq.deplete_reference_contaminants"
  - "fastq.trim_polyg_tails"
expected_artifacts: ["report_json"]
metrics_schema_id: "bijux.unknown.v1"
metrics_schema: "bijux.unknown.v1"
version_cmd: "bbduk --version"
help_cmd: "bbduk --help"
comparability:
  comparable_with: []
  non_comparable_with: []
comparability_notes: "Comparable only within same stage contract and input constraints."

schema_version: "bijux.tool.v1"
tool_id: "bbduk"
stage_id: "fastq.trim"
role: "authoritative"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/bbduk"
  digest: "sha256:da5764715915a5edeb0e40e2c18a5ce7142f31dac8e4844bd2dcb463403b8bd4"
command_template:
  - "bbduk.sh"
  - "in={{reads}}"
  - "out={{trimmed_reads}}"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "fastq_trim_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "bbduk.fastq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true


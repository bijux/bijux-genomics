schema_version: "bijux.tool.v1"
tool_id: "bbduk"
status: "supported"
scope: "pre_hpc_pre_vcf"
capabilities:
  - polyx_trim
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/bbduk"
  digest: "sha256:da5764715915a5edeb0e40e2c18a5ce7142f31dac8e4844bd2dcb463403b8bd4"
command_template:
  - "bbduk"
  - "in={{reads_r1}}"
  - "out={{filtered_reads_r1}}"
outputs:
  - name: "trimmed_reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "trimmed_reads_r2"
    data_type: "fastq"
    cardinality: "One"
  - name: "filtered_reads_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "filtered_reads_r2"
    data_type: "fastq"
    cardinality: "One"
  - name: "filtered_fastq_r1"
    data_type: "fastq"
    cardinality: "One"
  - name: "filtered_fastq_r2"
    data_type: "fastq"
    cardinality: "One"
  - name: "report_json"
    data_type: "json"
    cardinality: "One"
  - name: "filter_report_json"
    data_type: "json"
    cardinality: "One"
  - name: "raw_backend_report_txt"
    data_type: "text"
    cardinality: "One"
metrics_parser: "fastq_trim_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  optional_inputs:
    - "reads_r2"
  expected_outputs:
    - "trimmed_reads_r1"
    - "trimmed_reads_r2"
    - "filtered_reads_r1"
    - "filtered_reads_r2"
    - "filtered_fastq_r1"
    - "filtered_fastq_r2"
    - "report_json"
    - "filter_report_json"
    - "raw_backend_report_txt"
  forbidden_outputs: []
  forbid_unexpected_outputs: true

upstream: "unknown"
versioning_strategy: "pinned"
pin_strategy: "pinned"
default_version: "latest-pinned"
install_kind: "container"
license: "GPL-3.0"
citation: "software:https://bbmap.org/tools/bbduk"
stage_ids:
  - "fastq.trim_reads"
  - "fastq.filter_reads"
  - "fastq.filter_low_complexity"
  - "fastq.trim_polyg_tails"
stage_contracts:
  fastq.trim_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
      - "raw_backend_report_txt"
    notes: "BBDuk trim mode emits paired trimmed reads, a governed trim report, and preserves the native BBDuk stats report."
  fastq.filter_reads:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "filtered_reads_r1"
      - "filtered_reads_r2"
      - "report_json"
    notes: "BBDuk read filtering emits paired filtered reads, a canonical governed filter report, and preserves native BBDuk stats provenance."
  fastq.filter_low_complexity:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "filtered_fastq_r1"
      - "filtered_fastq_r2"
      - "filter_report_json"
    notes: "BBDuk low-complexity filtering emits paired filtered reads, a canonical governed low-complexity report, and preserves native BBDuk stats provenance for downstream comparison."
  fastq.trim_polyg_tails:
    required_inputs:
      - "reads_r1"
    expected_artifacts:
      - "trimmed_reads_r1"
      - "trimmed_reads_r2"
      - "report_json"
      - "raw_backend_report_txt"
    notes: "BBDuk polyG trimming admits reads_r1 as the canonical required port, accepts an optional reads_r2 mate for paired layouts, emits a governed trim report, and preserves the native BBDuk stats report."
expected_artifacts:
  - "trimmed_reads_r1"
  - "trimmed_reads_r2"
  - "report_json"
  - "raw_backend_report_txt"
  - "filtered_reads_r1"
  - "filtered_reads_r2"
  - "filtered_fastq_r1"
  - "filtered_fastq_r2"
  - "filter_report_json"
metrics_schema_id: "bijux.stage.metrics.v1"
metrics_schema: "bijux.stage.metrics.v1"
version_cmd: "bbduk --version"
help_cmd: "bbduk --help"
comparability:
  comparable_with:
    - "fastp"
    - "cutadapt"
    - "prinseq"
    - "seqkit"
    - "trimmomatic"
  non_comparable_with: []
comparability_notes: "Comparable with governed trimming and filtering backends when the same stage contract, read layout, and retained summary artifacts are used."

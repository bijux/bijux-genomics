schema_version: bijux.tool.v2
tool_id: alientrimmer
upstream: https://gitlab.pasteur.fr/GIPhy/AlienTrimmer
versioning_strategy: pinned
pin_strategy: pinned
default_version: 3.2
install_kind: container
license: GPL-3.0
citation: paper:https://pubmed.ncbi.nlm.nih.gov/23912058/
container:
  image: bijuxdna/alientrimmer
outputs:
- name: trimmed_reads_r1
  data_type: fastq
  cardinality: Many
- name: trimmed_reads_r2
  data_type: fastq
  cardinality: Many
- name: report_json
  data_type: json
  cardinality: One
execution_contract:
  required_inputs:
  - reads_r1
  optional_inputs:
  - reads_r2
  expected_outputs:
  - trimmed_reads_r1
  - trimmed_reads_r2
  - report_json
  forbidden_outputs: []
  forbid_unexpected_outputs: true
stage_ids:
- fastq.trim_reads
stage_contracts:
  fastq.trim_reads:
    required_inputs:
    - reads_r1
    expected_artifacts:
    - trimmed_reads_r1
    - trimmed_reads_r2
    - report_json
    notes: Trim execution emits governed trimmed-read artifacts together with the normalized stage report.
status: supported
scope: pre_hpc_pre_vcf
expected_artifacts:
- trimmed_reads_r1
- trimmed_reads_r2
- report_json
metrics_schema_id: bijux.fastq.trim_reads.v1
metrics_schema: bijux.fastq.trim_reads.v1
version_cmd: alientrimmer --version
help_cmd: alientrimmer --help
comparability:
  comparable_with:
  - cutadapt
  - trimmomatic
  non_comparable_with: []
comparability_notes: Comparable only within same stage contract and input constraints.
notes: Domain SSOT tool contract entry.
capabilities:
- SE
- PE
- adapters

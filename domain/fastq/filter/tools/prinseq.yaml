schema_version: "bijux.tool.v1"
tool_id: "prinseq"
stage_id: "fastq.filter"
role: "transform"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
container:
  image: "bijuxdna/prinseq"
  digest: "sha256:7216ffecd7913edaea33ec76b3775ab0cb0d60064f31e96c63e043d578a3f971"
command_template:
  - "prinseq++"
  - "-fastq"
  - "{{reads}}"
  - "-out_good"
  - "{{filtered_reads}}"
  - "-out_bad"
  - "{{filtered_reads}}.bad"
outputs:
  - name: "filtered_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "prinseq_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*"
  forbidden_outputs: []
  forbid_unexpected_outputs: false

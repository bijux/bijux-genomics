stage_failure_diagnosis_hints:
  fastq.cluster_otus:
  - inspect clustering identity thresholds and representative-sequence export paths
  fastq.infer_asvs:
  - verify DADA2 runtime availability, sample-wise denoising inputs, and representative-sequence export paths
  fastq.index_reference:
  - verify reference fasta path and index write permissions
  fastq.detect_adapters:
  - check input read quality and adapter bank selection
  fastq.detect_duplicates_premerge:
  - verify paired FASTQ coherence and gzip integrity before duplicate-signature comparison
  - inspect repeated sequence signatures and sample duplication policy expectations
  fastq.estimate_library_complexity_prealign:
  - verify paired FASTQ coherence and gzip integrity before advisory complexity estimation
  - inspect low-depth inputs and repeated leading k-mer signatures before interpreting advisory complexity estimates
  fastq.trim_reads:
  - inspect adapter parameters and minimum length thresholds
  fastq.filter_reads:
  - review quality/complexity thresholds for over-filtering
  fastq.validate_reads:
  - inspect malformed FASTQ records and line wrapping
  fastq.profile_reads:
  - verify parser input paths and gzip integrity
  fastq.deplete_rrna:
  - check rRNA database path and memory allocation
  fastq.report_qc:
  - inspect upstream qc tool outputs required by aggregator
  fastq.screen_taxonomy:
  - check classifier DB path/version/hash and kmer DB integrity
  fastq.merge_pairs:
  - review overlap thresholds and paired-end orientation
  fastq.remove_duplicates:
  - inspect duplicate criteria and pair-preservation settings
  fastq.filter_low_complexity:
  - review entropy/polyX thresholds for over-filtering
  fastq.deplete_host:
  - verify host reference index and unmapped extraction flags
  fastq.correct_errors:
  - verify kmer/cov parameters and read depth assumptions
  fastq.extract_umis:
  - confirm UMI pattern configuration and read naming conventions
  fastq.profile_read_lengths:
  - inspect FASTQ parsing and gzip integrity for histogram generation
  fastq.trim_polyg_tails:
  - review polyG/polyX thresholds and platform-specific tailing patterns
  fastq.deplete_reference_contaminants:
  - check contaminant bank/decoy reference selection and k-mer thresholds
  fastq.trim_terminal_damage:
  - review terminal trim/mask parameters and UDG classification inputs
  fastq.normalize_abundance:
  - verify feature-table schema and per-sample abundance normalization method
  fastq.normalize_primers:
  - confirm primer set selection, orientation policy, and mismatch allowances
  fastq.profile_overrepresented_sequences:
  - inspect overrepresented table and adapter/contaminant sequence banks
  fastq.remove_chimeras:
  - inspect chimera mode selection and representative-read compatibility assumptions

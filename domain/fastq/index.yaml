  fastq.detect_adapters: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.trim: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.filter: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.validate_pre: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.stats_neutral: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.rrna: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.qc_post: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.screen: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.merge: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.correct: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
  fastq.umi: ["inputs_defined", "outputs_defined", "metrics_defined", "fixtures_present", "compatible_tools_declared"]
stage_default_settings:
  fastq.prepare_reference:
    star: { profile: "adna_sane_default", notes: "high-specificity reference indexing preset" }
    samtools: { profile: "adna_sane_default", notes: "deterministic reference helper preset" }
  fastq.detect_adapters:
    fastp: { profile: "adna_sane_default", notes: "adapter detection without irreversible filtering" }
  fastq.trim:
    fastp: { profile: "adna_sane_default", notes: "balanced trim preset" }
    cutadapt: { profile: "adna_sane_default", notes: "explicit adapter matching preset" }
    atropos: { profile: "adna_sane_default", notes: "quality-aware adapter trimming preset" }
    bbduk: { profile: "adna_sane_default", notes: "kmer trimming preset" }
    adapterremoval: { profile: "adna_sane_default", notes: "aDNA trim/merge compatible preset" }
    trimmomatic: { profile: "adna_sane_default", notes: "legacy deterministic trimming preset" }
    trim_galore: { profile: "adna_sane_default", notes: "wrapper-based trim preset" }
    seqpurge: { profile: "adna_sane_default", notes: "paired-end purge preset" }
    prinseq: { profile: "adna_sane_default", notes: "read quality trimming preset" }
    seqkit: { profile: "adna_sane_default", notes: "stream-friendly trim preset" }
    skewer: { profile: "adna_sane_default", notes: "adapter trimming benchmark preset" }
    leehom: { profile: "adna_sane_default", notes: "aDNA overlap/collapse trimming preset" }
    alientrimmer: { profile: "adna_sane_default", notes: "seed-based adapter trim preset" }
    fastx_clipper: { profile: "adna_sane_default", notes: "legacy clipping preset" }

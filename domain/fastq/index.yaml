    seqkit: { profile: "adna_sane_default", notes: "streamed stats preset" }
    seqfu: { profile: "adna_sane_default", notes: "supplementary neutral stats preset" }
  fastq.rrna:
    sortmerna: { profile: "adna_sane_default", notes: "rRNA depletion screening preset" }
  fastq.qc_post:
    multiqc: { profile: "adna_sane_default", notes: "operator-facing aggregation preset" }
    fastqc: { profile: "adna_sane_default", notes: "per-sample qc preset" }
    qualimap: { profile: "adna_sane_default", notes: "alignment-aware qc preset" }
    samtools: { profile: "adna_sane_default", notes: "basic qc metrics preset" }

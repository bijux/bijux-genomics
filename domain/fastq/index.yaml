active_default_rationale:
  fastq.cluster_otus: Stable OTU cluster policy with reproducible identifiers.
  fastq.index_reference: Default FASTQ reference preparation must emit the mapper
    index consumed by governed host and reference-contaminant depletion.
  fastq.detect_adapters: Default adapter detector remains report-only and avoids mutating reads.
  fastq.detect_duplicates_premerge: Governed internal contract harness records report-only
    duplicate-signal expectations from the owned paired-end corpus without treating
    the result as scientific duplicate removal.
  fastq.estimate_library_complexity_prealign: Governed internal contract harness records
    prealignment library-complexity report expectations without substituting for
    alignment-derived metrics.
  fastq.trim_reads: Baseline trimmer for deterministic quality/throughput tradeoff.
  fastq.filter_reads: Default filter preserves compatibility with downstream metrics.
  fastq.validate_reads: Validation default has broad FASTQ format coverage.
  fastq.profile_reads: Neutral stats baseline is lightweight and deterministic.
  fastq.deplete_rrna: Default rRNA filter is established for pre-HPC screening.
  fastq.report_qc: QC aggregation default provides operator-first summary output.
  fastq.screen_taxonomy: Default classifier maximizes comparability with existing reports.
  fastq.merge_pairs: Default merger is stable for paired-end overlap handling.
  fastq.remove_duplicates: Default deduplication uses pair-aware duplicate removal with
    deterministic mate preservation.
  fastq.filter_low_complexity: Default complexity filtering uses deterministic entropy/polyX
    thresholds.
  fastq.deplete_host: Default host depletion uses deterministic mapping and unmapped
    extraction.
  fastq.correct_errors: Default corrector chosen for robust error-correction baseline.
  fastq.infer_asvs: Governed ASV inference now uses the admitted containerized dada2
    backend and publishes the canonical infer-asvs report plus taxonomy-ready
    representative sequences.
  fastq.extract_umis: Default UMI handler extracts barcodes without dropping reads.
  fastq.profile_read_lengths: Default length histogram baseline provides deterministic
    pre-trim size distribution.
  fastq.trim_polyg_tails: Default polyG trimmer uses fastp polyG-tail handling for common
    sequencer artifacts.
  fastq.deplete_reference_contaminants: Default contaminant screen uses reference-guided
    depletion against governed decoy references.
  fastq.trim_terminal_damage: Damage-aware pretrim default uses deterministic terminal mask/trim
    policy for aDNA damage-aware pretrim.
  fastq.normalize_abundance: Abundance-table normalization stays within the admitted
    amplicon table tooling set.
  fastq.normalize_primers: Deterministic primer trimming with explicit mismatch/orientation
    controls.
  fastq.profile_overrepresented_sequences: Default overrepresented-sequence detector uses
    FastQC module output.
  fastq.remove_chimeras: Deterministic UCHIME-based chimera screening remains the
    baseline before broader ensemble admission.

active_default_rationale:
  fastq.prepare_reference: Stable index generation baseline for pre-HPC runs.
  fastq.detect_adapters: Default adapter detector aligned with trim defaults.
  fastq.trim: Baseline trimmer for deterministic quality/throughput tradeoff.
  fastq.filter: Default filter preserves compatibility with downstream metrics.
  fastq.validate_pre: Validation default has broad FASTQ format coverage.
  fastq.stats_neutral: Neutral stats baseline is lightweight and deterministic.
  fastq.rrna: Default rRNA filter is established for pre-HPC screening.
  fastq.qc_post: QC aggregation default provides operator-first summary output.
  fastq.screen: Default classifier maximizes comparability with existing reports.
  fastq.merge: Default merger is stable for paired-end overlap handling.
  fastq.deduplicate: Default deduplication uses pair-aware duplicate removal with stable
    ordering.
  fastq.low_complexity: Default complexity filtering uses deterministic entropy/polyX
    thresholds.
  fastq.host_depletion: Default host depletion uses deterministic mapping and unmapped
    extraction.
  fastq.correct: Default corrector chosen for robust error-correction baseline.
  fastq.umi: Default UMI handler preserves compatibility with stage contract.
  fastq.length_distribution_pre: Default length histogram baseline provides deterministic
    pre-trim size distribution.
  fastq.polyg_tailing: Default polyG trimmer uses fastp polyG-tail handling for common
    sequencer artifacts.
  fastq.contaminant_screen: Default contaminant screen uses k-mer depletion against
    configured decoy references.
  fastq.overrepresented_sequences: Default overrepresented-sequence detector uses
    FastQC module output.

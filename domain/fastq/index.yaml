    seqkit: { profile: "adna_sane_default", notes: "stream-safe filter preset" }
    prinseq: { profile: "adna_sane_default", notes: "complexity filtering preset" }
    bbduk: { profile: "adna_sane_default", notes: "kmer filter preset" }
  fastq.validate_pre:
    fastqvalidator: { profile: "adna_sane_default", notes: "strict fastq validation preset" }
    fastqvalidator_official: { profile: "adna_sane_default", notes: "official validator baseline preset" }
    fastq-scan: { profile: "adna_sane_default", notes: "fast validation summary preset" }
    seqtk: { profile: "adna_sane_default", notes: "lightweight validation preset" }
    fqtools: { profile: "adna_sane_default", notes: "format sanity preset" }
    fastqc: { profile: "adna_sane_default", notes: "qc probe preset for validation stage" }

  trim_fairness:
    stage_id: fastq.trim_reads
    description: Compare trim tools on identical raw FASTQ pairs and identical adapter
      bank.
    fairness_rules:
    - same_input_hash
    - same_previous_stage_defaults
    - same_dataset_class
  screen_fairness:
    stage_id: fastq.screen_taxonomy
    description: Compare classifiers on identical filtered inputs and fixed DB metadata.
    fairness_rules:
    - same_input_hash
    - same_previous_stage_defaults
    - same_contamination_db_hash

domain: "fastq"
stage_ids:
  - fastq.preprocess
  - fastq.prepare_reference
  - fastq.validate_pre
  - fastq.detect_adapters
  - fastq.trim
  - fastq.filter
  - fastq.stats_neutral
  - fastq.qc_post

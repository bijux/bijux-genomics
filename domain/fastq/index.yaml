stage_tool_compatibility:
  fastq.prepare_reference: [star, samtools]
  fastq.detect_adapters: [fastp]
  fastq.trim: [fastp, cutadapt, atropos, bbduk, adapterremoval, trimmomatic, trim_galore, seqpurge, prinseq, seqkit, skewer, leehom, alientrimmer, fastx_clipper]
  fastq.filter: [fastp, seqkit, prinseq, bbduk]
  fastq.validate_pre: [fastqvalidator, fastqvalidator_official, fastq-scan, seqtk, fqtools, fastqc]
  fastq.stats_neutral: [seqkit_stats, seqkit, seqfu]
  fastq.rrna: [sortmerna]
  fastq.qc_post: [multiqc, fastqc, qualimap, samtools]
  fastq.screen: [kraken2, krakenuniq, bracken, centrifuge, metaphlan, kaiju, fastq_screen]
  fastq.merge: [pear, vsearch, bbmerge, flash2, leehom]
  fastq.correct: [rcorrector, lighter, musket, bayeshammer, spades]
  fastq.umi: [umi_tools]
active_defaults:
  fastq.prepare_reference: star
  fastq.detect_adapters: fastp
  fastq.trim: fastp
  fastq.filter: fastp
  fastq.validate_pre: fastqvalidator_official
  fastq.stats_neutral: seqkit_stats
  fastq.rrna: sortmerna
  fastq.qc_post: multiqc
  fastq.screen: kraken2
  fastq.merge: pear
  fastq.correct: rcorrector
  fastq.umi: umi_tools
active_default_rationale:
  fastq.prepare_reference: "Stable index generation baseline for pre-HPC runs."
  fastq.detect_adapters: "Default adapter detector aligned with trim defaults."
  fastq.trim: "Baseline trimmer for deterministic quality/throughput tradeoff."
  fastq.filter: "Default filter preserves compatibility with downstream metrics."
  fastq.validate_pre: "Validation default has broad FASTQ format coverage."
  fastq.stats_neutral: "Neutral stats baseline is lightweight and deterministic."
  fastq.rrna: "Default rRNA filter is established for pre-HPC screening."
  fastq.qc_post: "QC aggregation default provides operator-first summary output."
  fastq.screen: "Default classifier maximizes comparability with existing reports."
  fastq.merge: "Default merger is stable for paired-end overlap handling."
  fastq.correct: "Default corrector chosen for robust error-correction baseline."
  fastq.umi: "Default UMI handler preserves compatibility with stage contract."
stage_completeness_checklist:

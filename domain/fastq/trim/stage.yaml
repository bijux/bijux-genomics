schema_version: "bijux.stage.v1"
stage_id: "fastq.trim"
domain: "fastq"
inputs:
  - name: "reads"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
parameters:
  - name: "min_length"
    param_type: "int"
    default: "30"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "reads_out"
    meaning: "Number of output reads"
description: "FASTQ stage for trimming and preprocessing reads."

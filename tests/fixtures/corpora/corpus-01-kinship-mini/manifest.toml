schema_version = "bijux.bench.bam_corpus_fixture.v1"
corpus_id = "corpus-01-kinship-mini"
species = "Homo sapiens"
description = "Tiny BAM kinship corpus with governed low-overlap and related-pair samples plus the shared relatedness panel used for local benchmark checks."
reference_fasta = "../corpus-01-bam-mini/reference/corpus_01_bam_reference.fasta"

[kinship_contract]
reference_panel = "human_like_relatedness_panel"
reference_panel_path = "../corpus-01-bam-mini/reference/human_like_relatedness_panel.tsv"
reference_build = "grch38"
population_scope = "human_diploid_panel"
expected_outputs = [
  "kinship_report",
  "summary",
  "kinship_segments",
  "stage_metrics",
]

[[kinship_contract.cases]]
sample_id = "human_like_kinship_low_overlap_pair"
min_overlap_snps = 5
expected_status = "insufficient"
expected_observed_max_overlap_snps = 4
skip_behavior = "stop_without_pairwise_results"

[[kinship_contract.cases]]
sample_id = "human_like_kinship_related_pair"
min_overlap_snps = 6
expected_status = "ok"
expected_observed_max_overlap_snps = 6
expected_relationship_labels = ["first_degree"]
skip_behavior = "emit_pairwise_results"

[[samples]]
sample_id = "human_like_kinship_low_overlap_pair"
cohort = "human_like"
alignment_path = "../corpus-01-bam-mini/aligned/human_like_kinship_low_overlap_pair.sam"
index_path = "../corpus-01-bam-mini/aligned/human_like_kinship_low_overlap_pair.sam.bai"
expected_contigs = ["chr1"]
expected_header_sample_ids = ["sample_a", "sample_b"]
expected_read_group_ids = ["rg-kinship-low-overlap-a", "rg-kinship-low-overlap-b"]
expected_record_count = 2
source_paths = [
  "tests/fixtures/corpora/corpus-01-bam-mini/aligned/human_like_kinship_low_overlap_pair.sam",
  "tests/fixtures/corpora/corpus-01-bam-mini/reference/human_like_relatedness_panel.tsv",
]

[[samples]]
sample_id = "human_like_kinship_related_pair"
cohort = "human_like"
alignment_path = "../corpus-01-bam-mini/aligned/human_like_kinship_related_pair.sam"
index_path = "../corpus-01-bam-mini/aligned/human_like_kinship_related_pair.sam.bai"
expected_contigs = ["chr1"]
expected_header_sample_ids = ["sample_a", "sample_b"]
expected_read_group_ids = ["rg-kinship-related-a", "rg-kinship-related-b"]
expected_record_count = 2
source_paths = [
  "tests/fixtures/corpora/corpus-01-bam-mini/aligned/human_like_kinship_related_pair.sam",
  "tests/fixtures/corpora/corpus-01-bam-mini/reference/human_like_relatedness_panel.tsv",
]

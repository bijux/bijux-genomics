schema_version = "bijux.bench.bam_corpus_fixture.v1"
corpus_id = "corpus-01-kinship-mini"
species = "Homo sapiens"
description = "Tiny BAM kinship corpus with governed low-overlap and related-pair samples plus the shared relatedness panel used for local benchmark checks."
reference_fasta = "../corpus-01-bam-mini/reference/corpus_01_bam_reference.fasta"

[[samples]]
sample_id = "human_like_kinship_low_overlap_pair"
cohort = "human_like"
alignment_path = "../corpus-01-bam-mini/aligned/human_like_kinship_low_overlap_pair.sam"
index_path = "../corpus-01-bam-mini/aligned/human_like_kinship_low_overlap_pair.sam.bai"
expected_contigs = ["chr1"]
expected_header_sample_ids = ["sample_a", "sample_b"]
expected_read_group_ids = ["rg-kinship-low-overlap-a", "rg-kinship-low-overlap-b"]
expected_record_count = 2
source_paths = [
  "tests/fixtures/corpora/corpus-01-bam-mini/aligned/human_like_kinship_low_overlap_pair.sam",
  "tests/fixtures/corpora/corpus-01-bam-mini/reference/human_like_relatedness_panel.tsv",
]


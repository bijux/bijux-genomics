[profile.default]
retries = { count = 1 }

[profile.ci]
retries = { count = 1 }
default-filter = "not test-group(slow) and not test-group(e2e) and not test-group(science) and not package(bijux-environment)"

[profile.slow]
retries = { count = 1 }

[profile.e2e]
retries = { count = 0 }

[profile.science]
retries = { count = 1 }

[test-groups]
slow = { regex = "_slow_" }
e2e = { regex = "_e2e_" }
science = { regex = "_science_" }

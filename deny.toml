[advisories]
unmaintained = "workspace"
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "warn"

[[bans.skip]]
name = "hashbrown"
# why = "Transitive across serde_json/indexmap paths; tracked for consolidation."

[[bans.skip]]
name = "linux-raw-sys"
# why = "Required by rustix stack on Unix targets."

[[bans.skip]]
name = "rustix"
# why = "System-call abstraction used by dependencies in test/runtime tooling."

[[bans.skip]]
name = "windows-sys"
# why = "Target-specific dependency for cross-platform crates."

[licenses]
allow = [
  "Apache-2.0",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

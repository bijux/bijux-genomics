[package]
name = "bijux-planner-bam"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = { workspace = true }
bijux-core = { path = "../bijux-core" }
bijux-stage-contract = { path = "../bijux-stage-contract" }
bijux-domain-bam = { path = "../bijux-domain-bam" }
bijux-stages-bam = { path = "../bijux-stages-bam", features = ["bam_downstream"] }
bijux-pipelines = { path = "../bijux-pipelines" }
serde_json = { workspace = true }

[dev-dependencies]
bijux-policies = { path = "../bijux-policies" }
bijux-infra = { path = "../bijux-infra" }
insta = { version = "1", features = ["json", "filters"] }
serde_json.workspace = true

[features]
bam_downstream = ["bijux-stages-bam/bam_downstream"]

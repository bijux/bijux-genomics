[package]
name = "bijux-pipelines"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version.workspace = true

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
bijux-core = { path = "../bijux-core" }
bijux-domain-bam = { path = "../bijux-domain-bam" }
bijux-domain-fastq = { path = "../bijux-domain-fastq" }

[features]
bam_downstream = []

[dev-dependencies]
insta = { version = "1", features = ["json"] }
bijux-policies = { path = "../bijux-policies" }
walkdir.workspace = true
bijux-testkit = { path = "../bijux-testkit" }
[package]
name = "bijux-runner-docker"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
uuid.workspace = true
chrono.workspace = true
bijux-core = { path = "../bijux-core" }
bijux-engine = { path = "../bijux-engine" }
bijux-env-runtime = { path = "../bijux-env-runtime" }
bijux-env-builder = { path = "../bijux-env-builder" }

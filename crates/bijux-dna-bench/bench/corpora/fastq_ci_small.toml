schema_version = "bijux.bench.corpus.v1"
corpus_id = "fastq_ci_small"
domain = "fastq"
scale = "ci-small"
scientific_caveats = [
  "small synthetic fixtures exercise control-plane behavior and guardrails, not biological prevalence",
]

[[datasets]]
dataset_id = "fastq_valid_paired"
fixture = "fixtures/fastq/valid_paired"
read_layout = "paired"
class_label = "valid"
case_tags = ["valid", "paired"]
[datasets.truth_set]
status = "available"
truth_set_id = "truth.fastq.synthetic.valid-paired.v1"
note = "synthetic paired read truth anchors parser and count checks"


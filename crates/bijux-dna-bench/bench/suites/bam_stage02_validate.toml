schema_version = "bijux.bench.suite.v1"
suite_id = "bam_stage02_validate"

[[datasets]]
id = "synthetic_bam_validate_01"
hash = "fixture-bam-validate-01"
size = 1
origin = "synthetic"
class_label = "ancient"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [411, 412]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["ancient"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "bam.validate"
stage_instance_id = "bam.validate.validation"
tools = ["samtools"]

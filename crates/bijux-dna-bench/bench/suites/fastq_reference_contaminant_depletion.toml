schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_reference_contaminant_depletion"

[[datasets]]
id = "synthetic_fastq_reference_contaminant_01"
hash = "fixture-fastq-reference-contaminant-01"
size = 1
origin = "synthetic"
class_label = "contaminant_background"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [491, 492]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["contaminant_background"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.validation"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.index_reference"
stage_instance_id = "fastq.index_reference.contaminant_index"
tools = ["bowtie2_build"]

[[stages]]
stage = "fastq.deplete_reference_contaminants"
stage_instance_id = "fastq.deplete_reference_contaminants.reference_screen"
tools = ["bowtie2"]
upstream_stage_instance_ids = [
  "fastq.validate_reads.validation",
  "fastq.index_reference.contaminant_index",
]

[[edges]]
from = "fastq.validate_reads.validation"
to = "fastq.deplete_reference_contaminants.reference_screen"

[[edges]]
from = "fastq.index_reference.contaminant_index"
to = "fastq.deplete_reference_contaminants.reference_screen"
from_output_id = "reference_index"
to_input_id = "reference_index"

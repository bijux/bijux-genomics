schema_version = "bijux.bench.suite.v1"
suite_id = "bench-suite-01-fastq-5stages"
corpus = "corpus-01"
repetitions = 3

[resource_hints]
threads = 16
mem_gb = 64

[[stages]]
stage = "fastq.validate_reads"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.trim_reads"
tools = ["bbduk", "fastp", "fastx_clipper", "seqkit"]

[[stages]]
stage = "fastq.filter_reads"
tools = ["fastp", "seqkit"]

[[stages]]
stage = "fastq.profile_reads"
tools = ["seqkit_stats"]

[[stages]]
stage = "fastq.report_qc"
tools = ["multiqc"]

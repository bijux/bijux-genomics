schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_filter_low_complexity_surface"

[[datasets]]
id = "synthetic_fastq_filter_low_complexity_surface_01"
hash = "fixture-fastq-filter-low-complexity-surface-01"
size = 1
origin = "synthetic"
class_label = "complexity_filter"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [741, 742]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["complexity_filter"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.low_complexity_surface"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.filter_low_complexity"
stage_instance_id = "fastq.filter_low_complexity.low_complexity_surface"
tools = ["prinseq", "bbduk"]
upstream_stage_instance_ids = ["fastq.validate_reads.low_complexity_surface"]

[[stages.param_bindings]]
stage_instance_id = "fastq.filter_low_complexity.low_complexity_surface"
[stages.param_bindings.values]
entropy_threshold = 0.55
polyx_threshold = 20

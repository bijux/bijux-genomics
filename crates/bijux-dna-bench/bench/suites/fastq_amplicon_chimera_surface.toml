schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_amplicon_chimera_surface"

[[datasets]]
id = "synthetic_fastq_amplicon_chimera_surface_01"
hash = "fixture-fastq-amplicon-chimera-surface-01"
size = 1
origin = "synthetic"
class_label = "amplicon"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [681, 682]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["amplicon"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.trim_reads"
stage_instance_id = "fastq.trim_reads.amplicon_trim"
tools = ["fastp"]

[[stages]]
stage = "fastq.normalize_primers"
stage_instance_id = "fastq.normalize_primers.primer_normalization"
tools = ["cutadapt"]
upstream_stage_instance_ids = ["fastq.trim_reads.amplicon_trim"]

[[stages]]
stage = "fastq.merge_pairs"
stage_instance_id = "fastq.merge_pairs.overlap_merge"
tools = ["pear"]
upstream_stage_instance_ids = ["fastq.normalize_primers.primer_normalization"]

[[stages]]
stage = "fastq.remove_chimeras"
stage_instance_id = "fastq.remove_chimeras.chimera_screen"
tools = ["vsearch"]
upstream_stage_instance_ids = ["fastq.merge_pairs.overlap_merge"]

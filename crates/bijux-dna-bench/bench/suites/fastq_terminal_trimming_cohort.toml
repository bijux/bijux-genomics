schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_terminal_trimming_cohort"

[[datasets]]
id = "synthetic_fastq_terminal_trim_01"
hash = "fixture-fastq-terminal-trim-01"
size = 1
origin = "synthetic"
class_label = "ancient_damage"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [541, 542]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["ancient_damage"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.validation"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.trim_terminal_damage"
stage_instance_id = "fastq.trim_terminal_damage.damage_trimming"
tools = ["cutadapt", "seqkit"]
upstream_stage_instance_ids = ["fastq.validate_reads.validation"]

[[stages.param_bindings]]
stage_instance_id = "fastq.trim_terminal_damage.damage_trimming"
[stages.param_bindings.values]
damage_mode = "ancient"
trim_5p_bases = 2
trim_3p_bases = 2

[[stages]]
stage = "fastq.trim_polyg_tails"
stage_instance_id = "fastq.trim_polyg_tails.polyg_cleanup"
tools = ["fastp", "bbduk"]
upstream_stage_instance_ids = ["fastq.validate_reads.validation"]

[[stages.param_bindings]]
stage_instance_id = "fastq.trim_polyg_tails.polyg_cleanup"
[stages.param_bindings.values]
trim_polyg = true
min_polyg_run = 12

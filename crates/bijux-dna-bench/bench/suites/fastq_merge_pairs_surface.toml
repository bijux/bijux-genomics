schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_merge_pairs_surface"

[[datasets]]
id = "synthetic_fastq_overlap_merge_surface_01"
hash = "fixture-fastq-overlap-merge-surface-01"
size = 1
origin = "synthetic"
class_label = "overlap_pairs"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [821, 822]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["overlap_pairs"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.surface"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.merge_pairs"
stage_instance_id = "fastq.merge_pairs.surface"
tools = ["pear", "vsearch", "bbmerge", "flash2"]
upstream_stage_instance_ids = ["fastq.validate_reads.surface"]

[[stages.param_bindings]]
stage_instance_id = "fastq.merge_pairs.surface"
[stages.param_bindings.values]
merge_overlap = 20
min_len = 120
unmerged_read_policy = "omit_unmerged_pairs"

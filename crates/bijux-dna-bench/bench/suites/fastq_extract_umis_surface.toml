schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_extract_umis_surface"

[[datasets]]
id = "synthetic_fastq_extract_umis_surface_01"
hash = "fixture-fastq-extract-umis-surface-01"
size = 1
origin = "synthetic"
class_label = "umi_tagged"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [571, 572]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["umi_tagged"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.umi_surface"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.extract_umis"
stage_instance_id = "fastq.extract_umis.umi_surface"
tools = ["umi_tools"]
upstream_stage_instance_ids = ["fastq.validate_reads.umi_surface"]

[[stages.param_bindings]]
stage_instance_id = "fastq.extract_umis.umi_surface"
[stages.param_bindings.values]
umi_pattern = "NNNNNNNN"

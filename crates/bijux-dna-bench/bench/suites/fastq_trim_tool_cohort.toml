schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_trim_tool_cohort"

[[datasets]]
id = "synthetic_fastq_trim_tool_cohort_01"
hash = "fixture-fastq-trim-tool-cohort-01"
size = 1
origin = "synthetic"
class_label = "adapter_rich"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [611, 612]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["adapter_rich"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.trim_reads"
stage_instance_id = "fastq.trim_reads.tool_cohort"
tools = [
  "fastp",
  "cutadapt",
  "atropos",
  "bbduk",
  "adapterremoval",
  "alientrimmer",
  "fastx_clipper",
  "leehom",
  "skewer",
  "trimmomatic",
  "trim_galore",
  "prinseq",
  "seqkit",
]

[[stages.param_bindings]]
stage_instance_id = "fastq.trim_reads.tool_cohort"
[stages.param_bindings.values]
min_length = 30
quality_cutoff = 20
adapter_policy = "auto"
polyx_policy = "none"
n_policy = "retain"
contaminant_policy = "none"

schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_hpc_01"
corpus = "corpus-01"
repetitions = 3

[fairness]
threads = 16
mem_gb = 64
tmp_policy = "unique-per-run-id"
cold_runs = 1
warm_runs = 3

[[stages]]
stage = "fastq.validate_reads"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.trim_reads"
tools = ["fastp", "bbduk", "seqkit"]

[[stages]]
stage = "fastq.filter_reads"
tools = ["fastp", "seqkit"]

[[stages]]
stage = "fastq.profile_reads"
tools = ["seqkit_stats"]

[[stages]]
stage = "fastq.report_qc"
tools = ["multiqc"]

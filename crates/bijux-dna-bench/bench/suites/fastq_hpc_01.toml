schema_version = "bijux.bench-suite.fastq.v1"
suite_id = "fastq_hpc_01"
corpus = "corpus-01"
repetitions = 3

[fairness]
threads = 16
mem_gb = 64
tmp_policy = "unique-per-run-id"
cold_runs = 1
warm_runs = 3

[[stages]]
stage = "validate_pre"
tools = ["fastqvalidator"]

[[stages]]
stage = "trim"
tools = ["fastp", "bbduk", "seqkit"]

[[stages]]
stage = "filter"
tools = ["fastp", "seqkit"]

[[stages]]
stage = "stats"
tools = ["seqkit_stats"]

[[stages]]
stage = "qc_post"
tools = ["multiqc", "samtools"]

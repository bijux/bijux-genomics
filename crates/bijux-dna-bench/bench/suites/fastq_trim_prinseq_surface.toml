schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_trim_prinseq_surface"

[[datasets]]
id = "synthetic_fastq_trim_prinseq_surface_01"
hash = "fixture-fastq-trim-prinseq-surface-01"
size = 1
origin = "synthetic"
class_label = "paired_adapter_noise"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [651, 652]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["paired_adapter_noise"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.validation"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.trim_reads"
stage_instance_id = "fastq.trim_reads.prinseq_surface"
tools = ["prinseq"]
upstream_stage_instance_ids = ["fastq.validate_reads.validation"]

[[stages.param_bindings]]
stage_instance_id = "fastq.trim_reads.prinseq_surface"
[stages.param_bindings.values]
min_length = 55
quality_cutoff = 24
n_policy = "drop"
adapter_policy = "none"
polyx_policy = "none"
contaminant_policy = "none"

schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_detect_adapters_surface"

[[datasets]]
id = "synthetic_fastq_detect_adapters_surface_01"
hash = "fixture-fastq-detect-adapters-surface-01"
size = 1
origin = "synthetic"
class_label = "adapter_signal"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [601, 602]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["adapter_signal"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.detect_adapters_surface"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.detect_adapters"
stage_instance_id = "fastq.detect_adapters.detect_adapters_surface"
tools = ["fastqc"]
upstream_stage_instance_ids = ["fastq.validate_reads.detect_adapters_surface"]

[[stages.param_bindings]]
stage_instance_id = "fastq.detect_adapters.detect_adapters_surface"
[stages.param_bindings.values]
threads = 4

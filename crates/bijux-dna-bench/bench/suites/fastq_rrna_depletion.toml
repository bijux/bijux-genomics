schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_rrna_depletion"

[[datasets]]
id = "synthetic_fastq_rrna_01"
hash = "fixture-fastq-rrna-01"
size = 1
origin = "synthetic"
class_label = "rrna_rich"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [501, 502]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["rrna_rich"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.validation"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.deplete_rrna"
stage_instance_id = "fastq.deplete_rrna.sortmerna_screen"
tools = ["sortmerna"]
upstream_stage_instance_ids = ["fastq.validate_reads.validation"]

[[edges]]
from = "fastq.validate_reads.validation"
to = "fastq.deplete_rrna.sortmerna_screen"

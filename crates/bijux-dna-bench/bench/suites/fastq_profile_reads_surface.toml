schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_profile_reads_surface"

[[datasets]]
id = "synthetic_fastq_profile_reads_surface_01"
hash = "fixture-fastq-profile-reads-surface-01"
size = 1
origin = "synthetic"
class_label = "neutral_profile"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [691, 692]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["neutral_profile"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.profile_reads"
stage_instance_id = "fastq.profile_reads.neutral_profile"
tools = ["seqfu", "seqkit_stats"]

[[stages.param_bindings]]
stage_instance_id = "fastq.profile_reads.neutral_profile"
[stages.param_bindings.values]
threads = 6

schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_correct_errors_surface"

[[datasets]]
id = "synthetic_fastq_correct_errors_surface_01"
hash = "fixture-fastq-correct-errors-surface-01"
size = 1
origin = "synthetic"
class_label = "error_prone_reads"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [911, 912]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["error_prone_reads"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.surface"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.correct_errors"
stage_instance_id = "fastq.correct_errors.surface"
tools = ["rcorrector", "musket", "bayeshammer"]
upstream_stage_instance_ids = ["fastq.validate_reads.surface"]

[[stages.param_bindings]]
stage_instance_id = "fastq.correct_errors.surface"
[stages.param_bindings.values]
threads = 4
quality_encoding = "phred33"

[[stages]]
stage = "fastq.correct_errors"
stage_instance_id = "fastq.correct_errors.lighter_surface"
tools = ["lighter"]
upstream_stage_instance_ids = ["fastq.validate_reads.surface"]

[[stages.param_bindings]]
stage_instance_id = "fastq.correct_errors.lighter_surface"
[stages.param_bindings.values]
threads = 4
quality_encoding = "phred33"
genome_size = 2500000

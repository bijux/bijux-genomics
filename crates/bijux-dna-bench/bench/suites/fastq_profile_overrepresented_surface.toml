[[stratifications]]
key = "dataset_class"
required_values = ["adapter_repeat_heavy"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.profile_overrepresented_sequences"
stage_instance_id = "fastq.profile_overrepresented_sequences.adapter_repeat_heavy"
tools = ["fastqc", "seqkit"]

[[stages.param_bindings]]
stage_instance_id = "fastq.profile_overrepresented_sequences.adapter_repeat_heavy"
[stages.param_bindings.values]
top_k = 25

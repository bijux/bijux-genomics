schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_profile_overrepresented_surface"

[[datasets]]
id = "synthetic_fastq_profile_overrepresented_surface_01"
hash = "fixture-fastq-profile-overrepresented-surface-01"
size = 1
origin = "synthetic"
class_label = "adapter_repeat_heavy"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [711, 712]

[diversity]
min_dataset_count = 1
min_classes = 1

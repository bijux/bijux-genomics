schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_infer_asvs_surface"

[[datasets]]
id = "synthetic_fastq_infer_asvs_surface_01"
hash = "fixture-fastq-infer-asvs-surface-01"
size = 1
origin = "synthetic"
class_label = "amplicon_infer_asvs"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [971, 972]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["amplicon_infer_asvs"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.infer_asvs"
stage_instance_id = "fastq.infer_asvs.surface"
tools = ["dada2"]

[[stages.param_bindings]]
stage_instance_id = "fastq.infer_asvs.surface"
[stages.param_bindings.values]
denoising_method = "dada2"
pooling_mode = "independent"
chimera_policy = "remove_bimera_denovo"
threads = 2

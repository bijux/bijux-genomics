schema_version = "bijux.bench.suite.v1"
suite_id = "bam_stage03_filter"

[[datasets]]
id = "synthetic_bam_filter_01"
hash = "fixture-bam-filter-01"
size = 1
origin = "synthetic"
class_label = "ancient"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [421, 422]

[diversity]
min_dataset_count = 1
min_classes = 1

schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_error_cleanup_cohort"

[[datasets]]
id = "synthetic_fastq_error_cleanup_01"
hash = "fixture-fastq-error-cleanup-01"
size = 1
origin = "synthetic"
class_label = "degraded_reads"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [531, 532]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["degraded_reads"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.validation"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.correct_errors"
stage_instance_id = "fastq.correct_errors.error_correction"
tools = ["rcorrector", "musket", "lighter", "bayeshammer"]
upstream_stage_instance_ids = ["fastq.validate_reads.validation"]

[[stages]]
stage = "fastq.filter_low_complexity"
stage_instance_id = "fastq.filter_low_complexity.low_complexity_screen"
tools = ["prinseq", "bbduk"]
upstream_stage_instance_ids = ["fastq.validate_reads.validation"]

[[stages]]
stage = "fastq.remove_duplicates"
stage_instance_id = "fastq.remove_duplicates.duplicate_collapse"
tools = ["fastuniq", "clumpify"]
upstream_stage_instance_ids = ["fastq.validate_reads.validation"]

schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_trim_branch_qc_join"

[[datasets]]
id = "synthetic_fastq_trim_branch_01"
hash = "fixture-fastq-trim-branch-01"
size = 1
origin = "synthetic"
class_label = "trueseq"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [481, 482]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["trueseq"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.validation"
tools = ["fastqvalidator"]

[[stages]]
stage = "fastq.trim_reads"
stage_instance_id = "fastq.trim_reads.fastp_branch"
tools = ["fastp"]
upstream_stage_instance_ids = ["fastq.validate_reads.validation"]

[[stages]]
stage = "fastq.trim_reads"
stage_instance_id = "fastq.trim_reads.cutadapt_branch"

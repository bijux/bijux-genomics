schema_version = "bijux.bench.suite.v1"
suite_id = "fastq_stage01_validate_pre"

[[datasets]]
id = "synthetic_fastq_validate_01"
hash = "fixture-fastq-validate-01"
size = 1
origin = "synthetic"
class_label = "trueseq"
read_layout = "paired"

[replicate_policy]
count = 2
warmup = 1
seeds = [431, 432]

[diversity]
min_dataset_count = 1
min_classes = 1
min_read_layouts = 1

[[stratifications]]
key = "dataset_class"
required_values = ["trueseq"]

[analysis_requirements]
require_bootstrap = false
require_outlier_detection = false
min_replicates_for_bootstrap = 5

[[stages]]
stage = "fastq.validate_reads"
stage_instance_id = "fastq.validate_reads.validation"
tools = ["fastqvalidator"]

[package]
name = "bijux"
version = "0.1.0"
edition.workspace = true
license.workspace = true
default-run = "bijux"

[dependencies]
bijux-core = { path = "../bijux-core" }
bijux-api = { path = "../bijux-api" }
bijux-io = { path = "../bijux-io" }
anyhow.workspace = true
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tracing-appender.workspace = true
sha2.workspace = true
uuid.workspace = true
rusqlite.workspace = true
chrono.workspace = true
bijux-env-runtime = { path = "../bijux-env-runtime" }
bijux-env-builder = { path = "../bijux-env-builder" }
bijux-analyze = { path = "../bijux-analyze" }
bijux-engine = { path = "../bijux-engine" }
bijux-domain-bam = { path = "../bijux-domain-bam" }
bijux-domain-fastq = { path = "../bijux-domain-fastq" }
bijux-pipelines = { path = "../bijux-pipelines" }
bijux-bench = { path = "../bijux-bench" }

[features]
bam_downstream = ["bijux-api/bam_downstream", "bijux-pipelines/bam_downstream"]

[dev-dependencies]
bijux-guardrails = { path = "../bijux-guardrails" }
assert_cmd = "2"
tempfile = "3"
predicates = "3"

[lints]
workspace = true

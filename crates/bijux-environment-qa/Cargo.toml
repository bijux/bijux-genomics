[package]
name = "bijux-environment-qa"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
regex.workspace = true
sha2.workspace = true
tracing.workspace = true
uuid.workspace = true
clap.workspace = true
rusqlite = { version = "0.31", optional = true }
bijux-environment = { path = "../bijux-environment" }
bijux-analyze = { path = "../bijux-analyze" }
bijux-core = { path = "../bijux-core" }
bijux-domain-fastq = { path = "../bijux-domain-fastq" }
bijux-infra = { path = "../bijux-infra", features = ["yaml"] }
bijux-runtime = { path = "../bijux-runtime" }

[dev-dependencies]
bijux-policies = { path = "../bijux-policies" }
tempfile.workspace = true
bijux-testkit = { path = "../bijux-testkit" }

[lints]
workspace = true

[features]
default = ["sqlite"]
sqlite = ["dep:rusqlite", "bijux-analyze/sqlite"]

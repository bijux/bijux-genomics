[package]
name = "bijux-dna-engine"
version = "0.1.0"
edition = "2021"

license.workspace = true
rust-version.workspace = true
[dependencies]
anyhow = "1"
bijux-dna-core = { path = "../bijux-dna-core" }
bijux-dna-runtime = { path = "../bijux-dna-runtime" }
bijux-dna-infra = { path = "../bijux-dna-infra" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"], optional = true }
tracing-appender = "0.2"
sha2 = "0.10"
thiserror = "1"
walkdir = "2"
uuid = { version = "1", features = ["v4"] }
chrono.workspace = true
flate2 = "1"
opentelemetry = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }

[dev-dependencies]
bijux-dna-policies = { path = "../bijux-dna-policies" }
bijux-dna-infra = { path = "../bijux-dna-infra" }
assert_cmd = "2"
tempfile.workspace = true
cargo_metadata = "0.18"

[features]
otel = ["opentelemetry", "opentelemetry_sdk"]
tracing = ["dep:tracing-subscriber"]

[lints]
workspace = true

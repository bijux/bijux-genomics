[package]
name = "bijux-engine"
version = "0.1.0"
edition = "2021"

rust-version.workspace = true
[dependencies]
anyhow = "1"
bijux-core = { path = "../bijux-core" }
bijux-env-runtime = { path = "../bijux-env-runtime" }
bijux-env-builder = { path = "../bijux-env-builder" }
bijux-stages-fastq = { path = "../bijux-stages-fastq" }
bijux-domain-fastq = { path = "../bijux-domain-fastq" }
bijux-stages-bam = { path = "../bijux-stages-bam" }
bijux-domain-bam = { path = "../bijux-domain-bam" }
bijux-infra = { path = "../bijux-infra" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"
sha2 = "0.10"
thiserror = "1"
walkdir = "2"
uuid = { version = "1", features = ["v4"] }
chrono.workspace = true
flate2 = "1"
opentelemetry = { version = "0.24", optional = true }
opentelemetry_sdk = { version = "0.24", optional = true }

[dev-dependencies]
bijux-guardrails = { path = "../bijux-guardrails" }
bijux-pipelines = { path = "../bijux-pipelines" }
assert_cmd = "2"
tempfile.workspace = true

[features]
otel = ["opentelemetry", "opentelemetry_sdk"]

[lints]
workspace = true

[package]
name = "bijux-engine"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
bijux-core = { path = "../bijux-core" }
bijux-environment = { path = "../bijux-environment" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"
sha2 = "0.10"
thiserror = "1"
walkdir = "2"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
assert_cmd = "2"

[lints]
workspace = true

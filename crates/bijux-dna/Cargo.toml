[package]
name = "bijux-dna"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
default-run = "bijux-dna"

[[bin]]
name = "bijux-dna"
path = "src/bin/bijux-dna.rs"

[dependencies]
bijux-dna-api = { path = "../bijux-dna-api" }
bijux-dna-domain-compiler = { path = "../bijux-dna-domain-compiler" }
bijux-dna-infra = { path = "../bijux-dna-infra" }
bijux-dna-db-ena = { path = "../bijux-dna-db-ena" }
anyhow = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }
regex = { workspace = true }
toml = { workspace = true }
sha2 = { workspace = true }
tar.workspace = true
flate2.workspace = true

[features]
bam_downstream = ["bijux-dna-api/bam_downstream"]
bench = ["bijux-dna-api/bench"]
docker-runner = ["bijux-dna-api/docker-runner"]
report-html = ["bijux-dna-api/report-html"]
default = []

[dev-dependencies]
bijux-dna-policies.workspace = true
tempfile.workspace = true
predicates.workspace = true
insta = { workspace = true }
filetime.workspace = true

[lints]
workspace = true

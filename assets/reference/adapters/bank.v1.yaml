schema_version: bijux.adapter_bank.v1
bank_id: bijux-dna-fastq-adapter-bank
version: 1
provenance_status: complete
license: CC-BY-4.0
source_document: assets/reference/EVIDENCE.md
source_checksum_sha256: 3b7d30dc1f08f9d9f13ef6ba9d7a57d9f7441f6e4248d6380a66fddf8662ef31
applicable_assays: [shotgun, ancient_dna, amplicon, edna_metabarcoding]
selection_logic: Select adapter presets by explicit library-prep family and assay contract; production planning rejects incomplete provenance.
adapters:
  - id: truseq_universal
    tags: [truseq]
    name: TruSeq Universal Adapter
    sequence: AGATCGGAAGAGC
    read_scope: single_end
    enabled_by_default: true
    rationale: Core TruSeq adapter seed for common single-end trimming.
    source: "Illumina TruSeq adapter sequence specification"
    notes: "Canonical vendor adapter seed used for deterministic trimming."
  - id: truseq_indexed
    tags: [truseq]
    name: TruSeq Indexed Adapter
    sequence: AGATCGGAAGAGCACACGTCTGAACTCCAGTCA
    read_scope: paired_end
    enabled_by_default: true
    rationale: Indexed TruSeq adapter used in paired-end libraries.
    source: "Illumina TruSeq adapter sequence specification"
    notes: "Indexed TruSeq motif validated against vendor sequence cards."
  - id: nextera_transposase
    tags: [nextera]
    name: Nextera Transposase Adapter
    sequence: CTGTCTCTTATACACATCT
    read_scope: both
    enabled_by_default: false
    rationale: Nextera tagmentation adapter frequently present in reads.
    source: "Illumina Nextera transposase adapter specification"
    notes: "Representative Nextera tagmentation motif."
  - id: nextera_index
    tags: [nextera]
    name: Nextera Index Adapter
    sequence: GTCTCGTGGGCTCGG
    read_scope: both
    enabled_by_default: false
    rationale: Secondary Nextera index motif seen in some tagmentation workflows.
    source: "Illumina Nextera index adapter specification"
    notes: "Secondary Nextera index sequence for mixed libraries."
  - id: ssdna_splint_seed
    tags: [ssdna]
    name: ssDNA Splint Seed
    sequence: NNNNNNGGTACNNNNN
    read_scope: single_end
    enabled_by_default: false
    rationale: Synthetic splint motif seed for ssDNA workflow detection fallback.
    source: "Bijux synthetic motif set for ssDNA adapter detection fallback"
    notes: "Synthetic motif maintained for deterministic benchmark coverage."
  - id: ssdna_splint_tail
    tags: [ssdna]
    name: ssDNA Splint Tail
    sequence: NNNNNNCCGTAANNNNN
    read_scope: single_end
    enabled_by_default: false
    rationale: Secondary ssDNA splint motif for tail detection.
    source: "Bijux synthetic motif set for ssDNA adapter detection fallback"
    notes: "Synthetic companion motif for deterministic fallback coverage."
  - id: pcr_primer_fwd
    tags: [pcr]
    name: PCR Primer Forward
    sequence: AATGATACGGCGACCACCGA
    read_scope: both
    enabled_by_default: false
    rationale: Common PCR primer motif seen in library amplification.
    source: "Illumina PCR primer motif sequence references"
    notes: "Common forward amplification primer motif."
  - id: pcr_primer_rev
    tags: [pcr]
    name: PCR Primer Reverse
    sequence: CAAGCAGAAGACGGCATACG
    read_scope: both
    enabled_by_default: false
    rationale: Reverse primer motif commonly paired with PCR primer forward.
    source: "Illumina PCR primer motif sequence references"
    notes: "Common reverse amplification primer motif."
  - id: umi_construct_a
    tags: [umi]
    name: UMI Construct Adapter
    sequence: ACGTNNNNNNNNACGT
    read_scope: both
    enabled_by_default: false
    rationale: Synthetic UMI construct motif containing an N-stretch.
    source: "Bijux synthetic UMI construct motif set"
    notes: "Synthetic motif to exercise poly-N aware trimming paths."
  - id: umi_construct_b
    tags: [umi]
    name: UMI Construct Adapter B
    sequence: TGCANNNNNNNNTGCA
    read_scope: both
    enabled_by_default: false
    rationale: Secondary UMI construct motif for alternate library designs.
    source: "Bijux synthetic UMI construct motif set"
    notes: "Synthetic alternate UMI motif for deterministic parser coverage."
  - id: kit_custom_adapter
    tags: [custom]
    name: Kit Custom Adapter
    sequence: GATCGGAAGAGCACACGTCT
    read_scope: both
    enabled_by_default: false
    rationale: Representative custom kit adapter motif.
    source: "Vendor kit adapter reference motif catalog"
    notes: "Representative custom-kit adapter for broad compatibility tests."
  - id: kit_custom_adapter_b
    tags: [custom]
    name: Kit Custom Adapter B
    sequence: ACAGTGGTATCAACGCAGAG
    read_scope: both
    enabled_by_default: false
    rationale: Alternate custom kit adapter for vendor-specific workflows.
    source: "Vendor kit adapter reference motif catalog"
    notes: "Alternate custom-kit adapter motif."
  - id: capture_linker_a
    tags: [capture]
    name: Capture Linker A
    sequence: TCGTCGGCAGCGTCAGATGTGTATAAGAGACAG
    read_scope: both
    enabled_by_default: false
    rationale: Linker motif often used in capture workflows.
    source: "Capture library linker motif references"
    notes: "Representative capture linker motif."
  - id: capture_linker_b
    tags: [capture]
    name: Capture Linker B
    sequence: GTCTCGTGGGCTCGGAGATGTGTATAAGAGACAG
    read_scope: both

    source: "Derived from common Illumina adapter prefix motifs"
    notes: "Short partial seed for degraded-read adapter rescue."
  - id: partial_motif_seed_short
    tags: [partial]
    name: Partial Adapter Motif Short
    sequence: AGATC
    read_scope: unknown

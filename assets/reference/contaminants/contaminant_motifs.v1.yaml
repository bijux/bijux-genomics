schema_version: bijux.contaminant_motifs.v1
bank_id: contaminants.motifs
version: v1
motifs:
  - id: phix_kmer
    name: PhiX motif
    sequence: "GTTTTCCC"
    enabled_by_default: true
    rationale: "PhiX control can appear as a spike-in contaminant."
    source: "Illumina PhiX control"
    notes: "Short motif for quick screening."
  - id: univec_adapter_motif
    name: UniVec adapter motif
    sequence: "AGATCGGAAG"
    enabled_by_default: false
    rationale: "Vector/adapter sequences can leak into reads."
    source: "NCBI UniVec"
    notes: "Enable for vector-heavy datasets."

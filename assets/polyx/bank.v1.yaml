    notes: "Default enabled for two-color platforms."
  - id: polyA
    name: Poly-A
    sequence: "AAAAAAAAAA"
    enabled_by_default: false
    rationale: "Poly-A tails can appear in RNA workflows; disabled by default."
    source: "Common RNA library artifact"
    notes: "Enable when needed."
  - id: polyT
    name: Poly-T
    sequence: "TTTTTTTTTT"
    enabled_by_default: false
    rationale: "Poly-T artifacts may appear in some protocols; disabled by default."
    source: "Protocol-specific artifact"
    notes: "Enable when needed."
  - id: polyC
    name: Poly-C
    sequence: "CCCCCCCCCC"
    enabled_by_default: false
    rationale: "Poly-C artifacts are rare; disabled by default."
    source: "Observed in specific chemistries"
    notes: "Enable when needed."

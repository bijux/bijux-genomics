schema_version: bijux.polyx_bank.v1
bank_id: polyx.default
version: v1
entries:
  - id: polyG
    name: Poly-G
    sequence: "GGGGGGGGGG"
    enabled_by_default: true
    rationale: "Two-color Illumina chemistry often yields poly-G artifacts."

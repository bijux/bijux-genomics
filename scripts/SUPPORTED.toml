# Supported script surface

[[script]]
id = "run"
path = "scripts/run.sh"
purpose = "run.sh script"
inputs = []
outputs = ["artifacts/", "$ISO_ROOT/"]
ci_allowed = true

[[script]]
id = "common"
path = "scripts/_lib/common.sh"
purpose = "shared shell library"
inputs = []
outputs = ["artifacts/", "$ISO_ROOT/"]
ci_allowed = false

[[script]]
id = "runtime"
path = "scripts/_lib/runtime.sh"
purpose = "shared shell runtime library"
inputs = []
outputs = ["artifacts/", "$ISO_ROOT/"]
ci_allowed = false

[[script]]
id = "tooling_make"
path = "scripts/tooling/make.sh"
purpose = "tooling group dispatcher"
inputs = []
outputs = ["artifacts/", "$ISO_ROOT/"]
ci_allowed = true

[[script]]
id = "flake_hunt"
path = "scripts/experimental/flake-hunt.sh"
purpose = "experimental script"
inputs = ["configs/rust/nextest.toml"]
outputs = ["artifacts/", "$ISO_ROOT/"]
ci_allowed = false

[[script]]
id = "flake_hunt_tooling"
path = "scripts/tooling/flake-hunt.sh"
purpose = "tooling script"
inputs = ["configs/rust/nextest.toml"]
outputs = ["artifacts/", "$ISO_ROOT/"]
ci_allowed = true

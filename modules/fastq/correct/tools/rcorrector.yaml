schema_version: "bijux.tool.v1"
tool_id: "rcorrector"
stage_id: "fastq.correct"
role: "transform"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "PE"
  - "SE"
container:
  image: "bijuxdna/rcorrector"
  digest: "sha256:pending"
command_template:
  - "rcorrector"
  - "-1"
  - "{{reads_r1}}"
  - "-2"
  - "{{reads_r2}}"
outputs:
  - name: "corrected_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "corrected_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "rcorrector_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4

schema_version: "bijux.tool.v1"
tool_id: "fastqvalidator_official"
stage_id: "fastq.validate"
role: "gatekeeper"
authoritative: true
strict_capable: true
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/fastqvalidator_official"
  digest: "sha256:pending"
command_template:
  - "fastq-validator"
  - "--file"
  - "{{reads_r1}}"
  - "--printCount"
outputs: []
metrics_parser: "fastqvalidator_v1"
constraints:
  runtime: "local"
  mem_gb: 2
  tmp_gb: 1
  threads: 1

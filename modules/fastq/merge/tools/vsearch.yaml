schema_version: "bijux.tool.v1"
tool_id: "vsearch"
stage_id: "fastq.merge"
capabilities:
  - "PE"
container:
  image: "bijuxdna/vsearch"
  digest: "sha256:c16ef98d6fd67ac0b8eea3ebb4f3dc6df9c582d6f838317d5f6ccc7a09e60bb3"
command_template:
  - "vsearch"
  - "--fastq_mergepairs"
  - "{{reads_r1}}"
  - "--reverse"
  - "{{reads_r2}}"
  - "--fastqout"
  - "{{merged_reads}}"
  - "--fastqout_notmerged_fwd"
  - "{{unmerged_reads_r1}}"
  - "--fastqout_notmerged_rev"
  - "{{unmerged_reads_r2}}"
outputs:
  - name: "merged_reads"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "unmerged_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "vsearch_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 2

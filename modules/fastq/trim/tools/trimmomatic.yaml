schema_version: "bijux.tool.v1"
tool_id: "trimmomatic"
stage_id: "fastq.trim"
role: "transform"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/trimmomatic"
  digest: "sha256:41c0d161444ee7bb6b36ead3bbceb998af611be6ead6784231c5440e092bd5a4"
command_template:
  - "trimmomatic"
  - "SE"
  - "-phred33"
  - "{{reads}}"
  - "{{trimmed_reads}}"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "fastq_trim_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "trimmomatic.fastq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true


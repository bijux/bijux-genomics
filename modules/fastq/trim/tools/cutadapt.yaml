schema_version: "bijux.tool.v1"
tool_id: "cutadapt"
stage_id: "fastq.trim"
capabilities:
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/cutadapt"
  digest: "sha256:4405f2effc1a195c93098408aa36268357c25b758348bfe6da8790bbe7e842ba"
command_template:
  - "cutadapt"
  - "-o"
  - "{{trimmed_reads}}"
  - "{{reads}}"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "fastq_trim_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4

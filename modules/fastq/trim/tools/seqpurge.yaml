schema_version: "bijux.tool.v1"
tool_id: "seqpurge"
stage_id: "fastq.trim"
role: "transform"
authoritative: false
strict_capable: false
status: "experimental"
capabilities:
  - "PE"
  - "SE"
container:
  image: "bijuxdna/seqpurge"
  digest: "sha256:65c1249b64696ad0783c6409126e45f8025851fd4eaf7f651b2df9bda2a0a662"
command_template:
  - "seqpurge"
  - "-in1"

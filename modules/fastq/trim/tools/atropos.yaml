schema_version: "bijux.tool.v1"
tool_id: "atropos"
stage_id: "fastq.trim"
role: "transform"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/atropos"
  digest: "sha256:pending"
command_template:
  - "atropos"
  - "trim"
  - "-a"
  - "ADAPTER"
  - "-o"
  - "{{trimmed_reads}}"
  - "{{reads}}"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "atropos_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 2
  threads: 2

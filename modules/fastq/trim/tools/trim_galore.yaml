schema_version: "bijux.tool.v1"
tool_id: "trim_galore"
stage_id: "fastq.trim"
role: "transform"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
  - "adapters"
container:
  image: "bijuxdna/trim_galore"
  digest: "sha256:f323405a5a0ba19bbdae765dd4269e9156c415993977996079b63c5eb5bb0a61"
command_template:
  - "trim_galore"
  - "--output_dir"
  - "{{trimmed_reads}}"
  - "{{reads}}"
outputs:
  - name: "trimmed_reads"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "fastq_trim_v1"
constraints:
  runtime: "local"
  mem_gb: 8
  tmp_gb: 4
  threads: 4
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "*trimmed.fq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: false

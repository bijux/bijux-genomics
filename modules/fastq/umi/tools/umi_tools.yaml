schema_version: "bijux.tool.v1"
tool_id: "umi_tools"
stage_id: "fastq.umi"
role: "transform"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/umi_tools"
  digest: "sha256:pending"
command_template:
  - "umi_tools"
  - "dedup"
  - "-I"
  - "{{reads_r1}}"
  - "-S"
  - "{{dedup_reads_r1}}"
outputs:
  - name: "dedup_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "dedup_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
metrics_parser: "umi_tools_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 4
  threads: 2
execution_contract:
  required_inputs:
    - "reads_r1"
  expected_outputs:
    - "umi_tools.fastq.gz"
  forbidden_outputs: []
  forbid_unexpected_outputs: true


schema_version: "bijux.tool.v1"
tool_id: "fastqc"
stage_id: "fastq.qc2"
role: "report"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/fastqc"
  digest: "sha256:55963e17aebb78f047b43e6001855ce18ede30eb68e403f478bb3d9580062d60"
command_template:
  - "fastqc"
  - "-o"
  - "{{qc_report_html}}"
  - "{{reads_r1}}"
outputs:
  - name: "qc_report_html"
    data_type: "html"
    cardinality: "Many"
  - name: "qc_report_json"
    data_type: "json"
    cardinality: "Many"
metrics_parser: "fastqc_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 4
  threads: 2

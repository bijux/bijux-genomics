schema_version: "bijux.tool.v1"
tool_id: "qualimap"
stage_id: "fastq.qc2"
role: "report"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/qualimap"
  digest: "sha256:pending"
command_template:
  - "qualimap"
  - "bamqc"
  - "-outdir"
  - "{{qc_report_html}}"
  - "-bam"
  - "{{reads_r1}}"
outputs:
  - name: "qc_report_html"
    data_type: "html"
    cardinality: "Many"
  - name: "qc_report_json"
    data_type: "json"
    cardinality: "Many"
metrics_parser: "qualimap_v1"
constraints:
  runtime: "local"
  mem_gb: 4
  tmp_gb: 4
  threads: 2

schema_version: "bijux.stage.v1"
stage_id: "fastq.screen"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "4"
metrics:
  - name: "reads_in"
    meaning: "Number of input reads"
  - name: "contamination_rate"
    meaning: "Fraction of reads classified as contaminants"
description: "FASTQ stage for taxonomic screening/contamination assessment."

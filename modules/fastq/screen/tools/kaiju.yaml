schema_version: "bijux.tool.v1"
tool_id: "kaiju"
stage_id: "fastq.screen"
role: "report"
authoritative: false
strict_capable: false
status: "stable"
capabilities:
  - "SE"
  - "PE"
container:
  image: "bijuxdna/kaiju"
  digest: "sha256:pending"
command_template:
  - "kaiju"
  - "-i"
  - "{{reads_r1}}"
  - "-o"
  - "{{screen_report_tsv}}"
outputs:
  - name: "screen_report_tsv"
    data_type: "tsv"
    cardinality: "Many"
metrics_parser: "kaiju_v1"
constraints:
  runtime: "local"
  mem_gb: 16
  tmp_gb: 8
  threads: 4

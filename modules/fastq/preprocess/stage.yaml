schema_version: "bijux.stage.v1"
stage_id: "fastq.preprocess"
domain: "fastq"
inputs:
  - name: "reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "reads_r2"
    data_type: "fastq"
    cardinality: "Many"
outputs:
  - name: "final_reads_r1"
    data_type: "fastq"
    cardinality: "Many"
  - name: "final_reads_r2"
    data_type: "fastq"
    cardinality: "Many"
  - name: "manifest_json"
    data_type: "json"
    cardinality: "Many"
parameters:
  - name: "threads"
    param_type: "int"
    default: "4"
metrics:
  - name: "read_retention"
    meaning: "Final reads_out / reads_in"
  - name: "base_retention"
    meaning: "Final bases_out / bases_in"
  - name: "delta_mean_q"
    meaning: "Mean quality delta across pipeline"
description: "Meta-stage orchestrating validate → trim → merge → correct → filter → stats."

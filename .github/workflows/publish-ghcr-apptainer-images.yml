name: publish-ghcr-apptainer-images

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: "Enable GHCR publication for this run"
        required: true
        type: boolean
        default: false
      tool_ids:
        description: "Optional comma or space separated tool ids"
        required: false
        type: string
        default: ""
      status_filter:
        description: "Optional comma or space separated statuses"
        required: false
        type: string
        default: ""
      package_prefix:
        description: "GHCR package prefix"
        required: false
        type: string
        default: "ghcr.io/bijux/bijux-genomics"
      push_latest:
        description: "Add latest tag for production tools"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-apptainer-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve-ghcr-apptainer-plan
    runs-on: ubuntu-24.04
    outputs:
      matrix_json: ${{ steps.plan.outputs.matrix_json }}
    steps:
      - name: Checkout release configuration
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
        with:
          fetch-depth: 1

      - name: Ensure Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.86.0 --profile minimal
          rustup default 1.86.0

      - name: Generate GHCR apptainer publish matrix
        id: plan
        shell: bash
        env:
          INPUT_ENABLED: ${{ inputs.enabled }}
          INPUT_TOOL_IDS: ${{ inputs.tool_ids }}
          INPUT_STATUS_FILTER: ${{ inputs.status_filter }}
          INPUT_PACKAGE_PREFIX: ${{ inputs.package_prefix }}
        run: |
          set -euo pipefail

          enabled="${INPUT_ENABLED,,}"
          case "${enabled}" in
            true|1|yes|on) ;;
            *)
              echo "Manual GHCR publication is disabled for this run." >&2
              echo "Set enabled=true to publish governed Apptainer packages." >&2
              exit 1
              ;;
          esac

          mkdir -p artifacts/containers/ghcr
          args=("artifacts/containers/ghcr/apptainer-publish-matrix.json")

          if [[ -n "${INPUT_PACKAGE_PREFIX// }" ]]; then
            args+=(--package-prefix "${INPUT_PACKAGE_PREFIX}")
          fi

          python3 - <<'PY' "${INPUT_TOOL_IDS}" "${INPUT_STATUS_FILTER}" > "${RUNNER_TEMP}/publish-filters.json"
          import json
          import re
          import sys

          def split_values(raw: str) -> list[str]:
              return [part for part in re.split(r"[\s,;]+", raw.strip()) if part]

          payload = {
              "tool_ids": split_values(sys.argv[1]),
              "statuses": split_values(sys.argv[2]),
          }
          print(json.dumps(payload))
          PY

          while IFS= read -r tool_id; do
            [[ -n "${tool_id}" ]] || continue
            args+=(--tool "${tool_id}")
          done < <(python3 - <<'PY' "${RUNNER_TEMP}/publish-filters.json"
          import json
          import pathlib

          payload = json.loads(pathlib.Path(__import__("sys").argv[1]).read_text())
          for item in payload["tool_ids"]:
              print(item)
          PY
          )

          while IFS= read -r status; do
            [[ -n "${status}" ]] || continue
            args+=(--status "${status}")
          done < <(python3 - <<'PY' "${RUNNER_TEMP}/publish-filters.json"
          import json
          import pathlib

          payload = json.loads(pathlib.Path(__import__("sys").argv[1]).read_text())
          for item in payload["statuses"]:
              print(item)
          PY
          )

          GHCR_PUBLISH_ARGS="${args[*]}" make _ghcr-apptainer-publish-matrix

          matrix_json="$(python3 - <<'PY'
          import json
          import pathlib

          payload = json.loads(pathlib.Path("artifacts/containers/ghcr/apptainer-publish-matrix.json").read_text())
          print(json.dumps(payload["items"], separators=(",", ":")))
          PY
          )"

          if [[ "${matrix_json}" == "[]" ]]; then
            echo "No governed Apptainer packages matched this GHCR publication request." >&2
            exit 1
          fi

          {
            echo "matrix_json<<EOF"
            printf '%s\n' "${matrix_json}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload GHCR apptainer publish plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghcr-apptainer-publish-plan
          path: artifacts/containers/ghcr/apptainer-publish-matrix.json
          if-no-files-found: error

  publish:
    name: publish-apptainer-${{ matrix.tool_id }}
    needs: resolve
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.matrix_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
        with:
          fetch-depth: 1

      - name: Ensure Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.86.0 --profile minimal
          rustup default 1.86.0

      - name: Install Apptainer
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer
          apptainer --version

      - name: Build and publish Apptainer package
        shell: bash
        env:
          TOOL_ID: ${{ matrix.tool_id }}
          TOOL_VERSION: ${{ matrix.tool_version }}
          PACKAGE_REF: ${{ matrix.package_ref }}
          ARTIFACT_PATH: ${{ matrix.artifact_path }}
          MATRIX_PUSH_LATEST: ${{ matrix.push_latest }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          set -euo pipefail

          export APPTAINER_AUTHFILE="${RUNNER_TEMP}/apptainer-auth.json"
          export APPTAINER_CACHEDIR="${RUNNER_TEMP}/apptainer-cache"
          export APPTAINER_TMPDIR="${RUNNER_TEMP}/apptainer-tmp"

          mkdir -p \
            "${APPTAINER_CACHEDIR}" \
            "${APPTAINER_TMPDIR}" \
            artifacts/containers/ghcr/workflow/apptainer

          sha_tag="sha-${GITHUB_SHA::12}"
          result_path="artifacts/containers/ghcr/workflow/apptainer/${TOOL_ID}.json"

          make _ghcr-apptainer-build-one TOOL_ID="${TOOL_ID}"

          if [[ ! -f "${ARTIFACT_PATH}" ]]; then
            echo "missing built SIF artifact: ${ARTIFACT_PATH}" >&2
            exit 1
          fi

          printf '%s' "${{ github.token }}" | apptainer registry login \
            --authfile "${APPTAINER_AUTHFILE}" \
            --username "${{ github.actor }}" \
            --password-stdin \
            oras://ghcr.io

          apptainer push --authfile "${APPTAINER_AUTHFILE}" --allow-unsigned \
            "${ARTIFACT_PATH}" "oras://${PACKAGE_REF}:${TOOL_VERSION}"
          apptainer push --authfile "${APPTAINER_AUTHFILE}" --allow-unsigned \
            "${ARTIFACT_PATH}" "oras://${PACKAGE_REF}:${sha_tag}"

          push_latest_applied="false"
          if [[ "${INPUT_PUSH_LATEST}" == "true" && "${MATRIX_PUSH_LATEST}" == "true" ]]; then
            apptainer push --authfile "${APPTAINER_AUTHFILE}" --allow-unsigned \
              "${ARTIFACT_PATH}" "oras://${PACKAGE_REF}:latest"
            push_latest_applied="true"
          fi

          python3 - <<'PY' "${ARTIFACT_PATH}" "${result_path}" "${PACKAGE_REF}" "${TOOL_ID}" "${TOOL_VERSION}" "${sha_tag}" "${push_latest_applied}"
          import hashlib
          import json
          import pathlib
          import sys

          artifact_path = pathlib.Path(sys.argv[1])
          result_path = pathlib.Path(sys.argv[2])
          artifact_sha256 = hashlib.sha256(artifact_path.read_bytes()).hexdigest()
          result = {
              "tool_id": sys.argv[4],
              "package_ref": sys.argv[3],
              "artifact_path": str(artifact_path),
              "artifact_sha256": artifact_sha256,
              "tool_version": sys.argv[5],
              "sha_tag": sys.argv[6],
              "push_latest_applied": sys.argv[7] == "true",
          }
          result_path.write_text(json.dumps(result, indent=2) + "\n")
          print(json.dumps(result, indent=2))
          PY

      - name: Upload GHCR apptainer publish result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghcr-apptainer-publish-${{ matrix.tool_id }}
          path: artifacts/containers/ghcr/workflow/apptainer/${{ matrix.tool_id }}.json
          if-no-files-found: error

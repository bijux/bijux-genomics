name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla/sccache-action@v0.0.6
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Minimal CI gate
        env:
          TZ: UTC
          LC_ALL: C
        run: make ci

  snapshot-invariance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-insta
        run: cargo install cargo-insta --locked
      - name: Snapshots (env A)
        env:
          TMPDIR: /tmp/snap-a
          TEMP: /tmp/snap-a
          TMP: /tmp/snap-a
          RUST_TEST_THREADS: "1"
          CARGO_TARGET_DIR: /tmp/target-snap-a
        run: make snapshots
      - name: Ensure no new snapshots (env A)
        run: |
          if rg --files -g '*.snap.new' crates; then
            echo "snapshot drift detected in env A"
            exit 1
          fi
      - name: Snapshots (env B, different cwd)
        env:
          TMPDIR: /tmp/snap-b
          TEMP: /tmp/snap-b
          TMP: /tmp/snap-b
          RUST_TEST_THREADS: "4"
          CARGO_TARGET_DIR: /tmp/target-snap-b
        run: |
          ln -s "$GITHUB_WORKSPACE" /tmp/workspace-link
          cd /tmp/workspace-link
          make snapshots
      - name: Ensure no new snapshots (env B)
        run: |
          if rg --files -g '*.snap.new' crates; then
            echo "snapshot drift detected in env B"
            exit 1
          fi

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.76.0
      - name: MSRV Check
        run: make msrv

name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_slow_tier:
        description: "Run slow/manual CI tier"
        required: false
        type: boolean
        default: false

jobs:
  fast-tier:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla/sccache-action@v0.0.6
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build
      - name: Minimal CI gate
        env:
          TZ: UTC
          LC_ALL: C
        run: |
          make ssot-policy-fast
          make ci-fast

  slow-tier:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_slow_tier == true }}
    runs-on: ubuntu-latest
    needs: fast-tier
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla/sccache-action@v0.0.6
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build
      - name: Slow CI gate
        env:
          TZ: UTC
          LC_ALL: C
        run: |
          make ci-slow

  example-dry-run:
    runs-on: ubuntu-latest
    needs: fast-tier
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build
      - name: Example schema + dry plan
        run: |
          cargo run -p bijux-dna -- dna example validate example-101
          cargo run -p bijux-dna -- dna example plan example-101
          cargo run -p bijux-dna -- dna example validate example-102
          cargo run -p bijux-dna -- dna example plan example-102
          cargo run -p bijux-dna -- dna example validate example-103
          cargo run -p bijux-dna -- dna example plan example-103
          cargo run -p bijux-dna -- dna example validate example-201
          cargo run -p bijux-dna -- dna example plan example-201
          cargo run -p bijux-dna -- dna example validate example-202
          cargo run -p bijux-dna -- dna example plan example-202
          cargo run -p bijux-dna -- dna example validate example-203
          cargo run -p bijux-dna -- dna example plan example-203

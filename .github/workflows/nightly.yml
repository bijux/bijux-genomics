name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla/sccache-action@v0.0.6
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked
      - name: E2E tests
        run: BIJUX_E2E=1 make test-e2e

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla/sccache-action@v0.0.6
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Coverage floor
        run: |
          make coverage
          python3 - <<'PY'
          import json
          data=json.load(open("target/coverage.json"))
          totals=data["data"][0]["totals"]["lines"]
          covered=totals.get("covered",0)
          count=totals.get("count",1)
          pct=covered/count
          floor=0.60
          print(f"line coverage: {pct:.2%} (floor {floor:.0%})")
          if pct < floor:
              raise SystemExit(1)
          PY

name: publish-ghcr-docker-arm64-images

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: "Enable GHCR publication for this run"
        required: true
        type: boolean
        default: false
      tool_ids:
        description: "Optional comma or space separated tool ids"
        required: false
        type: string
        default: ""
      status_filter:
        description: "Optional comma or space separated statuses"
        required: false
        type: string
        default: ""
      package_prefix:
        description: "GHCR package prefix"
        required: false
        type: string
        default: "ghcr.io/bijux/bijux-genomics"
      push_latest:
        description: "Add latest tag for production tools"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-docker-arm64-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve-ghcr-docker-arm64-plan
    runs-on: ubuntu-24.04-arm
    outputs:
      matrix_json: ${{ steps.plan.outputs.matrix_json }}
    steps:
      - name: Checkout release configuration
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.0
        with:
          fetch-depth: 1

      - name: Ensure Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Generate GHCR docker-arm64 publish matrix
        id: plan
        shell: bash
        env:
          INPUT_ENABLED: ${{ inputs.enabled }}
          INPUT_TOOL_IDS: ${{ inputs.tool_ids }}
          INPUT_STATUS_FILTER: ${{ inputs.status_filter }}
          INPUT_PACKAGE_PREFIX: ${{ inputs.package_prefix }}
        run: |
          set -euo pipefail

          enabled="${INPUT_ENABLED,,}"
          case "${enabled}" in
            true|1|yes|on) ;;
            *)
              echo "Manual GHCR publication is disabled for this run." >&2
              echo "Set enabled=true to publish governed container images." >&2
              exit 1
              ;;
          esac

          mkdir -p artifacts/containers/ghcr
          args=("artifacts/containers/ghcr/docker-arm64-publish-matrix.json")

          if [[ -n "${INPUT_PACKAGE_PREFIX// }" ]]; then
            args+=(--package-prefix "${INPUT_PACKAGE_PREFIX}")
          fi

          python3 - <<'PY' "${INPUT_TOOL_IDS}" "${INPUT_STATUS_FILTER}" > "${RUNNER_TEMP}/publish-filters.json"
          import json
          import re
          import sys

          def split_values(raw: str) -> list[str]:
              return [part for part in re.split(r"[\s,;]+", raw.strip()) if part]

          payload = {
              "tool_ids": split_values(sys.argv[1]),
              "statuses": split_values(sys.argv[2]),
          }
          print(json.dumps(payload))
          PY

          while IFS= read -r tool_id; do
            [[ -n "${tool_id}" ]] || continue
            args+=(--tool "${tool_id}")
          done < <(python3 - <<'PY' "${RUNNER_TEMP}/publish-filters.json"
          import json
          import pathlib

          payload = json.loads(pathlib.Path(__import__("sys").argv[1]).read_text())
          for item in payload["tool_ids"]:
              print(item)
          PY
          )

          while IFS= read -r status; do
            [[ -n "${status}" ]] || continue
            args+=(--status "${status}")
          done < <(python3 - <<'PY' "${RUNNER_TEMP}/publish-filters.json"
          import json
          import pathlib

          payload = json.loads(pathlib.Path(__import__("sys").argv[1]).read_text())
          for item in payload["statuses"]:
              print(item)
          PY
          )

          GHCR_PUBLISH_ARGS="${args[*]}" make _ghcr-docker-publish-matrix

          matrix_json="$(python3 - <<'PY'
          import json
          import pathlib

          payload = json.loads(pathlib.Path("artifacts/containers/ghcr/docker-arm64-publish-matrix.json").read_text())
          print(json.dumps(payload["items"], separators=(",", ":")))
          PY
          )"

          if [[ "${matrix_json}" == "[]" ]]; then
            echo "No governed Docker images matched this GHCR publication request." >&2
            exit 1
          fi

          {
            echo "matrix_json<<EOF"
            printf '%s\n' "${matrix_json}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload GHCR docker-arm64 publish plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghcr-docker-arm64-publish-plan
          path: artifacts/containers/ghcr/docker-arm64-publish-matrix.json
          if-no-files-found: error

  publish:
    name: publish-docker-arm64-${{ matrix.tool_id }}
    needs: resolve
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.matrix_json) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.0
        with:
          fetch-depth: 1

      - name: Log in to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Ensure Docker buildx is ready
        shell: bash
        run: |
          set -euo pipefail
          docker buildx version
          docker buildx inspect default >/dev/null 2>&1 || docker buildx create --name default --driver docker-container --use

      - name: Build and publish image
        shell: bash
        env:
          PACKAGE_REF: ${{ matrix.package_ref }}
          TOOL_ID: ${{ matrix.tool_id }}
          TOOL_VERSION: ${{ matrix.tool_version }}
          DOCKERFILE_PATH: ${{ matrix.dockerfile }}
          BUILD_CONTEXT: ${{ matrix.build_context }}
          BUILD_PLATFORM: ${{ matrix.platform }}
          MATRIX_PUSH_LATEST: ${{ matrix.push_latest }}
          INPUT_PUSH_LATEST: ${{ inputs.push_latest }}
          SMOKE_VERSION_CMD: ${{ matrix.smoke_version_cmd }}
          SMOKE_HELP_CMD: ${{ matrix.smoke_help_cmd }}
          SMOKE_REQUIRE_HELP: ${{ matrix.smoke_require_help }}
          SMOKE_MINIMAL_CMD: ${{ matrix.smoke_minimal_cmd }}
          SMOKE_MINIMAL_EXIT_CODE: ${{ matrix.smoke_minimal_exit_code }}
          SMOKE_PROBES_JSON: ${{ toJson(matrix.smoke_probes) }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/containers/ghcr/workflow/docker-arm64
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sha_tag="sha-${GITHUB_SHA::12}"
          metadata_path="artifacts/containers/ghcr/workflow/docker-arm64/${TOOL_ID}.metadata.json"
          result_path="artifacts/containers/ghcr/workflow/docker-arm64/${TOOL_ID}.json"
          smoke_path="artifacts/containers/ghcr/workflow/docker-arm64/${TOOL_ID}.smoke_proof.json"

          tags=(
            --tag "${PACKAGE_REF}:${TOOL_VERSION}"
            --tag "${PACKAGE_REF}:${sha_tag}"
          )

          if [[ "${INPUT_PUSH_LATEST}" == "true" && "${MATRIX_PUSH_LATEST}" == "true" ]]; then
            tags+=(--tag "${PACKAGE_REF}:latest")
          fi

          docker buildx build \
            --file "${DOCKERFILE_PATH}" \
            --platform "${BUILD_PLATFORM}" \
            --build-arg "OCI_REVISION=${GITHUB_SHA}" \
            --build-arg "OCI_CREATED=${created}" \
            --build-arg "TOOL_VERSION=${TOOL_VERSION}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=${created}" \
            --label "org.opencontainers.image.tool=${TOOL_ID}" \
            --label "org.opencontainers.image.title=${TOOL_ID}" \
            --metadata-file "${metadata_path}" \
            "${tags[@]}" \
            --push \
            "${BUILD_CONTEXT}"

          python3 - <<'PY' "${smoke_path}" "${PACKAGE_REF}" "${TOOL_VERSION}" "${SMOKE_PROBES_JSON}" "${SMOKE_VERSION_CMD}" "${SMOKE_HELP_CMD}" "${SMOKE_REQUIRE_HELP}" "${SMOKE_MINIMAL_CMD}" "${SMOKE_MINIMAL_EXIT_CODE}"
          import hashlib
          import json
          import pathlib
          import subprocess
          import sys

          smoke_path = pathlib.Path(sys.argv[1])
          package_ref = sys.argv[2]
          tool_version = sys.argv[3]
          probes_json = sys.argv[4]
          smoke_version_cmd = sys.argv[5].strip()
          smoke_help_cmd = sys.argv[6].strip()
          require_help = sys.argv[7].strip().lower() == "true"
          smoke_minimal_cmd = sys.argv[8].strip()
          minimal_exit_code_raw = sys.argv[9].strip()
          try:
              minimal_exit_code = int(minimal_exit_code_raw) if minimal_exit_code_raw else 0
          except ValueError:
              minimal_exit_code = 0

          try:
              probes = json.loads(probes_json) if probes_json.strip() else []
          except json.JSONDecodeError:
              probes = []
          if not isinstance(probes, list):
              probes = []

          commands = []
          for probe in probes:
              if isinstance(probe, str) and probe.strip():
                  commands.append({"kind": "probe", "command": probe.strip(), "expected_exit_code": 0})
          if not commands:
              if smoke_version_cmd:
                  commands.append({"kind": "version", "command": smoke_version_cmd, "expected_exit_code": 0})
              if require_help and smoke_help_cmd:
                  commands.append({"kind": "help", "command": smoke_help_cmd, "expected_exit_code": 0})
          if smoke_minimal_cmd:
              commands.append({"kind": "minimal", "command": smoke_minimal_cmd, "expected_exit_code": minimal_exit_code})

          if not commands:
              raise SystemExit("missing smoke commands for docker publication")

          image = f"{package_ref}:{tool_version}"
          results = []
          for entry in commands:
              command = entry["command"]
              expected = int(entry["expected_exit_code"])
              proc = subprocess.run(
                  ["docker", "run", "--rm", image, "sh", "-lc", command],
                  capture_output=True,
                  text=True,
              )
              output = (proc.stdout or "") + (proc.stderr or "")
              first_line = next((line.strip() for line in output.splitlines() if line.strip()), "")
              results.append(
                  {
                      "kind": entry["kind"],
                      "command": command,
                      "expected_exit_code": expected,
                      "exit_code": proc.returncode,
                      "ok": proc.returncode == expected,
                      "output_sha256": hashlib.sha256(output.encode("utf-8")).hexdigest(),
                      "output_first_line": first_line,
                  }
              )

          smoke_payload = {
              "schema_version": "bijux.container.publish_smoke_proof.v1",
              "runtime": "docker-arm64",
              "image": image,
              "checked_commands": results,
              "ok": all(row["ok"] for row in results),
          }
          smoke_path.write_text(json.dumps(smoke_payload, indent=2) + "\n")
          if not smoke_payload["ok"]:
              raise SystemExit("docker smoke proof failed")
          print(json.dumps(smoke_payload, indent=2))
          PY

          python3 - <<'PY' "${metadata_path}" "${result_path}" "${smoke_path}" "${PACKAGE_REF}" "${TOOL_ID}" "${TOOL_VERSION}" "${sha_tag}" "${INPUT_PUSH_LATEST}" "${MATRIX_PUSH_LATEST}"
          import hashlib
          import json
          import pathlib
          import sys

          metadata_path = pathlib.Path(sys.argv[1])
          result_path = pathlib.Path(sys.argv[2])
          smoke_path = pathlib.Path(sys.argv[3])
          payload = json.loads(metadata_path.read_text())
          digest = payload.get("containerimage.digest", "")
          smoke = json.loads(smoke_path.read_text())
          result = {
              "tool_id": sys.argv[5],
              "package_ref": sys.argv[4],
              "tool_version": sys.argv[6],
              "sha_tag": sys.argv[7],
              "push_latest_requested": sys.argv[8] == "true",
              "push_latest_applied": sys.argv[8] == "true" and sys.argv[9] == "true",
              "digest": digest,
              "smoke_proof_path": str(smoke_path),
              "smoke_proof_sha256": hashlib.sha256(smoke_path.read_bytes()).hexdigest(),
              "smoke_ok": smoke.get("ok", False),
          }
          result_path.write_text(json.dumps(result, indent=2) + "\n")
          print(json.dumps(result, indent=2))
          PY

      - name: Upload GHCR docker-arm64 publish result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghcr-docker-arm64-publish-${{ matrix.tool_id }}
          path: |
            artifacts/containers/ghcr/workflow/docker-arm64/${{ matrix.tool_id }}.json
            artifacts/containers/ghcr/workflow/docker-arm64/${{ matrix.tool_id }}.metadata.json
            artifacts/containers/ghcr/workflow/docker-arm64/${{ matrix.tool_id }}.smoke_proof.json
          if-no-files-found: error

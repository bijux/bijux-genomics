schema_version = "bijux.bench.bam_corpus_fixture.v1"
corpus_id = "corpus-01-genotyping-mini"
species = "Homo sapiens"
description = "Tiny BAM genotyping corpus with a governed candidate-sites sample, target-region contract, and shared human-like reference for local benchmark checks."
reference_fasta = "../corpus-01-bam-mini/reference/corpus_01_bam_reference.fasta"

[genotyping_contract]
sample_id = "human_like_genotyping_candidate_panel"
sites_vcf = "../corpus-01-bam-mini/variants/human_like_genotyping_candidate_sites.vcf"
regions = "../corpus-01-bam-mini/regions/human_like_genotyping_target_regions.txt"
min_posterior = 0.9
min_call_rate = 0.5
expected_outputs = [
  "genotyping_bcf",
  "genotyping_vcf",
  "genotyping_vcf_tbi",
  "genotyping_gl",
  "summary",
  "stage_metrics",
]

[[samples]]
sample_id = "human_like_genotyping_candidate_panel"
cohort = "human_like"
alignment_path = "../corpus-01-bam-mini/aligned/human_like_genotyping_candidate_panel.sam"
index_path = "../corpus-01-bam-mini/aligned/human_like_genotyping_candidate_panel.sam.bai"
expected_contigs = ["chr1"]
expected_header_sample_ids = ["human_like_genotyping_candidate_panel"]
expected_read_group_ids = ["rg-genotyping-human-like"]
expected_record_count = 4
source_paths = [
  "benchmarks/tests/fixtures/corpora/corpus-01-bam-mini/aligned/human_like_genotyping_candidate_panel.sam",
  "benchmarks/tests/fixtures/corpora/corpus-01-bam-mini/reference/corpus_01_bam_reference.fasta",
  "benchmarks/tests/fixtures/corpora/corpus-01-bam-mini/variants/human_like_genotyping_candidate_sites.vcf",
  "benchmarks/tests/fixtures/corpora/corpus-01-bam-mini/regions/human_like_genotyping_target_regions.txt",
]

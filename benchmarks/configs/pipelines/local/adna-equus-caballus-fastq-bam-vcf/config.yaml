schema_version: bijux.bench.local_pipeline_dag.v1
pipeline_id: adna-equus-caballus-fastq-bam-vcf
domain: cross
summary: >-
  Ancient-DNA Equus caballus FASTQ-to-BAM-to-VCF DAG for read-length-aware
  short-read alignment on EquCab3, aggressive adapter-aware preprocessing,
  post-alignment duplicate marking, BAM damage evidence, and downstream
  variant calling.
default_corpus_id: corpus-01-mini
reference_context:
  species_id: Equus caballus
  build_id: EquCab3
  reference_bundle_id: ecaballus_equcab3_primary
execution_context:
  site_profile_id: lunarc
  default_campaign_config: benchmarks/configs/hpc/campaign/lunarc-fastq-bam-vcf-local-ready.toml
  frontend_surfaces:
    - downloads
    - ref-prep
    - snp-prep
  compute_surfaces:
    - fastq-qc
    - fastq-to-bam
    - bam-qc
    - bam-to-vcf
project_sources:
  - project_id: PRJEB10854
    metadata_url: https://www.ebi.ac.uk/ena/portal/api/filereport?accession=PRJEB10854&result=read_run&fields=study_accession,sample_accession,experiment_accession,run_accession,tax_id,scientific_name,fastq_ftp,submitted_ftp,sra_ftp,bam_ftp&format=tsv&download=true&limit=0
    retries: 3
  - project_id: PRJEB22390
    metadata_url: https://www.ebi.ac.uk/ena/portal/api/filereport?accession=PRJEB22390&result=read_run&fields=study_accession,sample_accession,experiment_accession,run_accession,tax_id,scientific_name,fastq_ftp,submitted_ftp,sra_ftp,bam_ftp&format=tsv&download=true&limit=0
    retries: 3
  - project_id: PRJEB31613
    metadata_url: https://www.ebi.ac.uk/ena/portal/api/filereport?accession=PRJEB31613&result=read_run&fields=study_accession,sample_accession,experiment_accession,run_accession,tax_id,scientific_name,fastq_ftp,submitted_ftp,sra_ftp,bam_ftp&format=tsv&download=true&limit=0
    retries: 3
  - project_id: PRJEB44430
    metadata_url: https://www.ebi.ac.uk/ena/portal/api/filereport?accession=PRJEB44430&result=read_run&fields=study_accession,sample_accession,experiment_accession,run_accession,tax_id,scientific_name,fastq_ftp,submitted_ftp,sra_ftp,bam_ftp&format=tsv&download=true&limit=0
    retries: 3
  - project_id: PRJEB7537
    metadata_url: https://www.ebi.ac.uk/ena/portal/api/filereport?accession=PRJEB7537&result=read_run&fields=study_accession,sample_accession,experiment_accession,run_accession,tax_id,scientific_name,fastq_ftp,submitted_ftp,sra_ftp,bam_ftp&format=tsv&download=true&limit=0
    retries: 3
ancient_dna_policy:
  aligner_mode: auto
  auto_bwa_aln_p75_threshold_bp: 35
  adapter_cleanup_tool: adapterremoval
  merge_pairs_in_preprocess: true
  duplicate_stage_id: bam.markdup
  duplicate_tool: samtools
  caller_tool: bcftools
reference_assets:
  directory_name: ref_EquCab3
  genome_url: https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/002/863/925/GCF_002863925.1_EquCab3.0/GCF_002863925.1_EquCab3.0_genomic.fna.gz
  genome_filename: GCF_002863925.1_EquCab3.0_genomic.fna.gz
  assembly_report_url: https://ftp.ncbi.nlm.nih.gov/genomes/all/GCF/002/863/925/GCF_002863925.1_EquCab3.0/GCF_002863925.1_EquCab3.0_assembly_report.txt
  assembly_report_filename: GCF_002863925.1_EquCab3.0_assembly_report.txt
variant_assets:
  directory_name: snp_EquCab3
  source_vcf_url: https://ftp.ensembl.org/pub/release-113/variation/vcf/equus_caballus/equus_caballus.vcf.gz
  source_vcf_filename: equus_caballus.vcf.gz
  refseq_vcf_filename: equus_caballus_EquCab3_refseq.vcf.gz
  annotated_vcf_filename: equus_caballus_EquCab3_annotated.vcf.gz
  snpeff:
    genome_id: EquCab3.0.99
    database_url: https://snpeff-public.s3.amazonaws.com/databases/v5_0/snpEff_v5_0_EquCab3.0.99.zip
    database_filename: snpEff_v5_0_EquCab3.0.99.zip
    core_url: https://snpeff-public.s3.amazonaws.com/versions/snpEff_latest_core.zip
    core_filename: snpEff_latest_core.zip

# schema_version = 1
# owner = bijux-dna-bench
# purpose = Contract config for the local BAM authenticity DAG.
# authority = bijux-dna-bench
# stability = evolving
# last_updated = 2026-06-01

schema_version = "bijux.bench.local_pipeline_dag.v1"
pipeline_id = "bam-authenticity"
domain = "bam"
summary = "BAM authenticity DAG for governed ancient-like evidence composition over damage, contamination, complexity, coverage, mapping, and sex diagnostics."
default_corpus_id = "corpus-01-adna-damage-mini"

[[nodes]]
node_id = "bam.mapping_summary"
stage_id = "bam.mapping_summary"
readiness_kind = "smoke"
summary = "Summarize governed BAM mapping state before downstream authenticity evidence interprets coverage or fragment patterns."
depends_on = []
external_inputs = ["corpus.aligned_bam"]
upstream_inputs = []
outputs = ["mapping_summary_report_json", "mapping_summary_stage_metrics"]

[[nodes]]
node_id = "bam.coverage"
stage_id = "bam.coverage"
readiness_kind = "smoke"
summary = "Measure governed BAM coverage using the mapping summary context required for downstream authenticity evidence."
depends_on = ["bam.mapping_summary"]
external_inputs = ["corpus.aligned_bam", "coverage_region_contract"]
upstream_inputs = ["mapping_summary_report_json"]
outputs = ["coverage_report_json", "coverage_stage_metrics"]

[[nodes]]
node_id = "bam.damage"
stage_id = "bam.damage"
readiness_kind = "smoke"
summary = "Quantify governed terminal damage signal from the ancient-like BAM input."
depends_on = []
external_inputs = ["corpus.aligned_bam"]
upstream_inputs = []
outputs = ["damage_report_json", "damage_stage_metrics"]

[[nodes]]
node_id = "bam.contamination"
stage_id = "bam.contamination"
readiness_kind = "dry_or_smoke"
summary = "Estimate contamination against the governed panel inputs needed for authenticity composition."
depends_on = []
external_inputs = ["corpus.aligned_bam", "contamination_panel_contract"]
upstream_inputs = []
outputs = ["contamination_report_json", "contamination_stage_metrics"]

[[nodes]]
node_id = "bam.complexity"
stage_id = "bam.complexity"
readiness_kind = "smoke"
summary = "Measure library complexity from the governed BAM input so authenticity can distinguish sparse unique-read support from stronger evidence."
depends_on = []
external_inputs = ["corpus.aligned_bam"]
upstream_inputs = []
outputs = ["complexity_report_json", "complexity_stage_metrics"]

[[nodes]]
node_id = "bam.sex"
stage_id = "bam.sex"
readiness_kind = "smoke"
summary = "Derive a governed sex-coverage diagnostic branch from BAM coverage without forcing authenticity composition to wait on unrelated metrics."
depends_on = ["bam.coverage"]
external_inputs = ["corpus.aligned_bam", "sex_reference_contract"]
upstream_inputs = ["coverage_report_json"]
outputs = ["sex_report_json", "sex_stage_metrics"]

[[nodes]]
node_id = "bam.authenticity"
stage_id = "bam.authenticity"
readiness_kind = "smoke"
summary = "Compose authenticity evidence only from the governed metrics currently consumed by the authenticity surface."
depends_on = [
  "bam.mapping_summary",
  "bam.coverage",
  "bam.damage",
  "bam.contamination",
  "bam.complexity",
]
external_inputs = ["corpus.aligned_bam"]
upstream_inputs = [
  "mapping_summary_report_json",
  "coverage_report_json",
  "damage_report_json",
  "contamination_report_json",
  "complexity_report_json",
]
outputs = ["authenticity_report_json", "authenticity_stage_metrics"]

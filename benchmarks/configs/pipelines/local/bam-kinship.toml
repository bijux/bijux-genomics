# schema_version = 1
# owner = bijux-dna-bench
# purpose = Contract config for the local BAM kinship DAG.
# authority = bijux-dna-bench
# stability = evolving
# last_updated = 2026-06-01

schema_version = "bijux.bench.local_pipeline_dag.v1"
pipeline_id = "bam-kinship"
domain = "bam"
summary = "BAM kinship DAG for explicit filtered-BAM, overlap-sufficiency, genotyping-readiness, and pairwise relatedness handoffs."
default_corpus_id = "corpus-01-bam-mini"

[[nodes]]
node_id = "bam.filter"
stage_id = "bam.filter"
readiness_kind = "dry_or_smoke"
summary = "Filter the governed BAM so overlap-sensitive and kinship-sensitive downstream work starts from a curated aligned input."
depends_on = []
external_inputs = ["corpus.aligned_bam"]
upstream_inputs = []
outputs = [
  "filtered_bam",
  "filtered_bai",
  "filter_report_json",
  "filter_stage_metrics",
]

[[nodes]]
node_id = "bam.overlap_correction"
stage_id = "bam.overlap_correction"
readiness_kind = "dry_or_smoke"
summary = "Correct paired-end overlap and emit the overlap-sufficiency summary that can block kinship without stalling unrelated BAM stages."
depends_on = ["bam.filter"]
external_inputs = ["overlap_pairing_contract"]
upstream_inputs = ["filtered_bam", "filtered_bai"]
outputs = [
  "overlap_corrected_bam",
  "overlap_corrected_bai",
  "overlap_correction_summary_json",
  "overlap_correction_stage_metrics",
]

[[nodes]]
node_id = "bam.genotyping"
stage_id = "bam.genotyping"
readiness_kind = "dry_or_smoke"
summary = "Materialize the genotype-readiness context that kinship interpretation depends on for shared-marker sufficiency."
depends_on = ["bam.filter"]
external_inputs = [
  "genotyping_reference_contract",
  "candidate_sites_vcf_contract",
  "target_regions_contract",
]
upstream_inputs = ["filtered_bam", "filtered_bai"]
outputs = [
  "genotyping_bcf",
  "genotyping_vcf_gz",
  "genotyping_vcf_tbi",
  "genotyping_gl_json",
  "genotyping_report_json",
  "genotyping_stage_metrics",
]

[[nodes]]
node_id = "bam.kinship"
stage_id = "bam.kinship"
readiness_kind = "smoke"
summary = "Compute pairwise kinship only after the governed overlap and genotype-readiness requirements have been made explicit."
depends_on = ["bam.overlap_correction", "bam.genotyping"]
external_inputs = [
  "kinship_reference_panel_contract",
  "kinship_population_scope_contract",
  "kinship_pairing_contract",
]
upstream_inputs = [
  "overlap_corrected_bam",
  "overlap_corrected_bai",
  "overlap_correction_summary_json",
  "genotyping_report_json",
]
outputs = [
  "kinship_report_json",
  "kinship_segments_tsv",
  "kinship_summary_json",
  "kinship_stage_metrics",
]

[profile.fast]
max_parallel_window_seconds = 1200.0
targets = [
  "ci-fast",
  "bench-active-fast",
  "bench-parser-fast",
  "bench-adapter-fast",
  "science-fixtures-fast",
]

[target.ci-fast]
command = "make ci-fast"
max_seconds = 900.0

[target.bench-active-fast]
command = "make bench-active-fast"
max_seconds = 180.0

[target.bench-parser-fast]
command = "make bench-parser-fast"
max_seconds = 180.0

[target.bench-adapter-fast]
command = "make bench-adapter-fast"
max_seconds = 180.0

[target.science-fixtures-fast]
command = "make science-fixtures-fast"
max_seconds = 180.0

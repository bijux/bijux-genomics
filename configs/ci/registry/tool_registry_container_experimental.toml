# schema_version = 1
# owner = bijux-dna-platform
# purpose = Container-only experimental registry for governed definitions that
#   are not yet admitted to domain production registries.
# authority = containers/TOOL_IDS.txt + containers/versions/versions.toml
# stability = experimental

[[tools]]
id = "bamutil"
tool_id = "bamutil"
status = "experimental"
domain = "bam"
domains = ["bam"]
container = true
runtimes = ["docker", "apptainer"]
expected_bin = "bam"
dockerfile = "containers/docker/arm64/Dockerfile.bamutil"
apptainer_def = "containers/apptainer/shared/bamutil.def"


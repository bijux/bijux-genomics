# schema_version = 1
# owner = bijux-dna-platform

policy = "bijux.apptainer.cache.v1"

# When running in isolate, cache and temp roots are anchored under ISO_ROOT.
isolate_cache_subdir = "cache/apptainer"
isolate_tmp_subdir = "tmp/apptainer"

# Outside isolate, cache and temp roots must stay outside the repo tree.
non_isolate_cache_root = "~/.cache/bijux-dna/apptainer"
non_isolate_tmp_root = "~/.cache/bijux-dna/apptainer/tmp"

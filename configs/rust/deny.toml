# schema_version = 1
# owner = bijux-dna-infra
# purpose = Cargo deny policy for repository-wide dependency auditing
# authority = bijux-dna-infra
# stability = stable
# last_updated = 2026-04-22

[graph]
all-features = true

[advisories]
unmaintained = "workspace"
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "warn"

[[bans.skip]]
name = "hashbrown"
# why = "Transitive across serde_json/indexmap paths; tracked for consolidation."

[[bans.skip]]
name = "linux-raw-sys"
# why = "Required by rustix stack on Unix targets."

[[bans.skip]]
name = "rustix"
# why = "System-call abstraction used by dependencies in test/runtime tooling."

[[bans.skip]]
name = "windows-sys"
# why = "Target-specific dependency for cross-platform crates."

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

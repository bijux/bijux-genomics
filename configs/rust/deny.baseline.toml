# schema_version = 1
# owner = bijux-dna-infra
# purpose = Cargo-deny baseline policy for allowed licenses and source gates
# authority = bijux-dna-infra
# stability = stable
# last_updated = 2026-04-24

[graph]
all-features = true

[advisories]
yanked = "deny"

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

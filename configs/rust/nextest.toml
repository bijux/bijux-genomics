# schema_version = 1
# owner = bijux-dna-infra
# purpose = Contract config for configs/rust/nextest.toml
# authority = bijux-dna-infra
# stability = stable
# last_updated = 2026-03-25

[profile.default]
retries = { count = 1, backoff = "fixed", delay = "1s" }

[store]
dir = "artifacts/rust/test/nextest-store"

[profile.ci]
retries = { count = 0, backoff = "fixed", delay = "1s" }
fail-fast = false
test-threads = 1
slow-timeout = { period = "1s", terminate-after = 1 }
failure-output = "immediate"
success-output = "never"
status-level = "pass"

[profile.full]
retries = { count = 0, backoff = "fixed", delay = "1s" }
fail-fast = false
test-threads = 1
slow-timeout = { period = "1s", terminate-after = 1 }
failure-output = "immediate"
success-output = "never"
status-level = "pass"

[profile.slow]
retries = { count = 1, backoff = "fixed", delay = "1s" }

[profile.e2e]
retries = { count = 0, backoff = "fixed", delay = "1s" }

[profile.science]
retries = { count = 1, backoff = "fixed", delay = "1s" }

[profile.flake]
retries = { count = 0, backoff = "fixed", delay = "1s" }
fail-fast = true
test-threads = 1
failure-output = "immediate"
success-output = "never"
status-level = "fail"

[profile.fast-unit]
retries = { count = 0, backoff = "fixed", delay = "1s" }
fail-fast = true
test-threads = 8
slow-timeout = { period = "1s", terminate-after = 1 }
failure-output = "immediate-final"
success-output = "never"
status-level = "pass"

[profile.slow-integration]
retries = { count = 1, backoff = "fixed", delay = "1s" }
fail-fast = false
test-threads = 4
failure-output = "immediate-final"
success-output = "never"
status-level = "pass"

[profile.certification]
retries = { count = 0, backoff = "fixed", delay = "1s" }
fail-fast = true
test-threads = 1
failure-output = "immediate-final"
success-output = "never"
status-level = "skip"

# schema_version = 1
# owner = bijux-dna-runtime
# purpose = Runtime asset lock-family contracts and comparability boundaries.
# authority = configs/runtime/asset_locks.toml
# stability = stable
# last_updated = 2026-04-26

schema_version = "bijux.runtime.asset_locks.v1"
authority = "configs/runtime/asset_locks.toml"

[[lock_family]]
id = "host_depletion_index"
stage_ids = ["fastq.prepare_host_reference_bundle", "fastq.deplete_host"]
asset_kind = "reference_index"
required_fields = [
  "source_reference_id",
  "source_reference_digest",
  "index_backend",
  "index_backend_version",
  "index_digest",
  "build_command_digest",
]
comparability_boundary = "Changing source reference, backend, backend version, or index digest changes host-depletion comparability."

[[lock_family]]
id = "contaminant_depletion_index"
stage_ids = ["fastq.build_contaminant_db", "fastq.deplete_reference_contaminants"]
asset_kind = "reference_index"
required_fields = [
  "source_bundle_id",
  "source_bundle_digest",
  "index_backend",
  "index_backend_version",
  "index_digest",
  "build_command_digest",
]
comparability_boundary = "Changing contaminant bundle, backend, backend version, or index digest changes contaminant-depletion comparability."

[[lock_family]]
id = "kraken2_database"
stage_ids = ["fastq.build_taxonomy_db", "fastq.screen_taxonomy"]
tool_ids = ["kraken2"]
asset_kind = "taxonomy_database"
required_fields = [
  "library_sources",
  "taxonomy_dump_digest",
  "database_digest",
  "build_command_digest",
  "kmer_policy",
]
comparability_boundary = "Kraken2 reports are comparable only within the same library sources, taxonomy dump, and database digest."


# schema_version = 1
# owner = bijux-dna-infra
# purpose = Contract config for configs/runtime/coverage_regimes.toml
# authority = bijux-dna-planner
# stability = stable
# last_updated = 2026-02-13

[decision.coverage_regime]
id = "decision.coverage_regime"
description = "Planner-level rule mapping empirical coverage to calling regime."
units = "mean_depth_x"

[decision.coverage_regime.thresholds]
gl_max_depth = 1.5
pseudohaploid_max_depth = 6.0
diploid_min_depth = 8.0

[decision.coverage_regime.rules]
gl = "mean_depth_x <= gl_max_depth"
pseudohaploid = "mean_depth_x > gl_max_depth && mean_depth_x <= pseudohaploid_max_depth"
diploid = "mean_depth_x >= diploid_min_depth"
fallback = "pseudohaploid"

[decision.coverage_regime.outputs]
decision_key = "coverage_regime"
allowed_values = ["gl", "pseudohaploid", "diploid"]
trace_required = true

[decision.coverage_regime.profiles.adna_lowcov_capture]
description = "aDNA low-coverage capture defaults"
gl_max_depth = 2.0
pseudohaploid_max_depth = 8.0
diploid_min_depth = 12.0
capture = true
shotgun = false

[decision.coverage_regime.profiles.adna_lowcov_shotgun]
description = "aDNA low-coverage shotgun defaults"
gl_max_depth = 1.5
pseudohaploid_max_depth = 6.0
diploid_min_depth = 10.0
capture = false
shotgun = true

[decision.coverage_regime.profiles.modern_wgs_capture]
description = "modern WGS/capture defaults"
gl_max_depth = 1.0
pseudohaploid_max_depth = 3.0
diploid_min_depth = 12.0
capture = true
shotgun = false

[decision.coverage_regime.profiles.modern_wgs_shotgun]
description = "modern WGS shotgun defaults"
gl_max_depth = 0.5
pseudohaploid_max_depth = 2.0
diploid_min_depth = 10.0
capture = false
shotgun = true

[species_profile]
"Homo sapiens:GRCh38" = "modern_wgs_shotgun"
"Canis lupus:CanFam4" = "modern_wgs_shotgun"

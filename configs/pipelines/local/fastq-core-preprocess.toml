# schema_version = 1
# owner = bijux-dna-bench
# purpose = Contract config for the local FASTQ core preprocessing DAG.
# authority = bijux-dna-bench
# stability = evolving
# last_updated = 2026-06-01

schema_version = "bijux.bench.local_pipeline_dag.v1"
pipeline_id = "fastq-core-preprocess"
domain = "fastq"
summary = "Core FASTQ preprocessing DAG for corpus-01 validation, read-length profiling, adapter detection, trimming, filtering, and terminal QC collation."
default_corpus_id = "corpus-01-mini"

[[nodes]]
node_id = "fastq.validate_reads"
stage_id = "fastq.validate_reads"
readiness_kind = "smoke"
summary = "Validate tiny governed FASTQ inputs before downstream preprocessing consumes them."
depends_on = []
external_inputs = ["corpus.raw_fastq_reads"]
upstream_inputs = []
outputs = ["validated_reads", "validation_report"]

[[nodes]]
node_id = "fastq.profile_read_lengths"
stage_id = "fastq.profile_read_lengths"
readiness_kind = "smoke"
summary = "Profile validated read lengths before trimming changes the length distribution."
depends_on = ["fastq.validate_reads"]
external_inputs = []
upstream_inputs = ["validated_reads"]
outputs = ["read_length_metrics"]

[[nodes]]
node_id = "fastq.detect_adapters"
stage_id = "fastq.detect_adapters"
readiness_kind = "smoke"
summary = "Detect adapter signal from the governed validated reads."
depends_on = ["fastq.validate_reads"]
external_inputs = []
upstream_inputs = ["validated_reads"]
outputs = ["adapter_report"]

[[nodes]]
node_id = "fastq.trim_reads"
stage_id = "fastq.trim_reads"
readiness_kind = "smoke"
summary = "Trim reads using the governed adapter signal from detection."
depends_on = ["fastq.validate_reads", "fastq.detect_adapters"]
external_inputs = []
upstream_inputs = ["validated_reads", "adapter_report"]
outputs = ["trimmed_reads", "trim_metrics"]

[[nodes]]
node_id = "fastq.filter_reads"
stage_id = "fastq.filter_reads"
readiness_kind = "smoke"
summary = "Apply quality and length filters to the trimmed read set."
depends_on = ["fastq.trim_reads"]
external_inputs = []
upstream_inputs = ["trimmed_reads"]
outputs = ["filtered_reads", "filter_metrics"]

[[nodes]]
node_id = "fastq.profile_reads"
stage_id = "fastq.profile_reads"
readiness_kind = "smoke"
summary = "Profile the filtered read set that is ready for downstream FASTQ work."
depends_on = ["fastq.filter_reads"]
external_inputs = []
upstream_inputs = ["filtered_reads"]
outputs = ["filtered_profile"]

[[nodes]]
node_id = "fastq.report_qc"
stage_id = "fastq.report_qc"
readiness_kind = "smoke"
summary = "Collate validation, profiling, adapter, trim, and filter metrics into the governed QC bundle."
depends_on = [
  "fastq.validate_reads",
  "fastq.profile_read_lengths",
  "fastq.detect_adapters",
  "fastq.trim_reads",
  "fastq.filter_reads",
  "fastq.profile_reads",
]
external_inputs = []
upstream_inputs = [
  "validation_report",
  "read_length_metrics",
  "adapter_report",
  "trim_metrics",
  "filter_metrics",
  "filtered_profile",
]
outputs = ["qc_bundle"]

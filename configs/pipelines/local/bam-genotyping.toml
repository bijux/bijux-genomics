# schema_version = 1
# owner = bijux-dna-bench
# purpose = Contract config for the local BAM genotyping DAG.
# authority = bijux-dna-bench
# stability = evolving
# last_updated = 2026-06-01

schema_version = "bijux.bench.local_pipeline_dag.v1"
pipeline_id = "bam-genotyping"
domain = "bam"
summary = "BAM genotyping DAG for explicit filtered-BAM, coverage-gated recalibration, and downstream genotype-calling handoffs."
default_corpus_id = "corpus-01-bam-mini"

[[nodes]]
node_id = "bam.filter"
stage_id = "bam.filter"
readiness_kind = "dry_or_smoke"
summary = "Filter the governed BAM so downstream coverage and genotyping readiness operate on the curated aligned input."
depends_on = []
external_inputs = ["corpus.aligned_bam"]
upstream_inputs = []
outputs = [
  "filtered_bam",
  "filtered_bai",
  "filter_report_json",
  "filter_stage_metrics",
]

[[nodes]]
node_id = "bam.coverage"
stage_id = "bam.coverage"
readiness_kind = "smoke"
summary = "Measure governed coverage from the filtered BAM so recalibration can make an explicit low-coverage skip-versus-run decision."
depends_on = ["bam.filter"]
external_inputs = ["coverage_region_contract"]
upstream_inputs = ["filtered_bam", "filtered_bai"]
outputs = ["coverage_report_json", "coverage_stage_metrics"]

[[nodes]]
node_id = "bam.recalibration"
stage_id = "bam.recalibration"
readiness_kind = "smoke"
summary = "Apply known-sites recalibration policy against the filtered BAM and emit the summary that tells downstream genotyping whether recalibration ran or was skipped."
depends_on = ["bam.filter", "bam.coverage"]
external_inputs = [
  "recalibration_reference_contract",
  "recalibration_known_sites_contract",
  "recalibration_coverage_gate_contract",
]
upstream_inputs = ["filtered_bam", "coverage_report_json"]
outputs = [
  "recalibrated_bam",
  "recalibrated_bai",
  "recalibration_report_text",
  "recalibration_summary_json",
  "recalibration_stage_metrics",
]

[[nodes]]
node_id = "bam.genotyping"
stage_id = "bam.genotyping"
readiness_kind = "dry_or_smoke"
summary = "Call genotypes using the recalibration summary to distinguish the low-coverage filtered-BAM fallback from the recalibrated-BAM run path."
depends_on = ["bam.filter", "bam.recalibration"]
external_inputs = [
  "genotyping_reference_contract",
  "candidate_sites_vcf_contract",
  "target_regions_contract",
]
upstream_inputs = [
  "filtered_bam",
  "filtered_bai",
  "recalibrated_bam",
  "recalibrated_bai",
  "recalibration_summary_json",
]
outputs = [
  "genotyping_bcf",
  "genotyping_vcf_gz",
  "genotyping_vcf_tbi",
  "genotyping_gl_json",
  "genotyping_report_json",
  "genotyping_stage_metrics",
]

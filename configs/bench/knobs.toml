# schema_version = 1
# owner = bijux-dna-bench
# purpose = Contract config for configs/bench/knobs.toml
# authority = bijux-dna-bench
# stability = stable
# last_updated = 2026-02-13

[defaults]
warmup_policy = "once"
repetitions = 3
threads = 8
mem_gb = 32
cold_runs = 1
warm_runs = 1
tmp_policy = "unique-per-run"
capture_cpu = true
capture_memory = true
capture_io = true

[variance]
runtime_relative_max = 0.20
memory_relative_max = 0.25
report_structure_match = true

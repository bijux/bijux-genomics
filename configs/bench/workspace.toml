# schema_version = 1
# owner = bijux-dna-bench
# purpose = Compatibility shim for legacy workspace-only benchmark consumers
# authority = bijux-dna
# stability = compatibility
# last_updated = 2026-03-28
# compatibility = Mirrors [workspace] from configs/bench/benchmark.toml
# migration = Prefer configs/bench/benchmark.toml for new automation and docs

[local]
results_root = "${BIJUX_BENCHMARK_LOCAL_RESULTS_ROOT}"
cache_mirror_root = "${BIJUX_BENCHMARK_LOCAL_CACHE_MIRROR_ROOT}"
extra_data_root = "${BIJUX_BENCHMARK_LOCAL_EXTRA_DATA_ROOT}"
reference_root = "${BIJUX_BENCHMARK_LOCAL_REFERENCE_ROOT}"

[remote]
ssh_host = "${BIJUX_BENCHMARK_REMOTE_SSH_HOST}"
repo_root = "${BIJUX_BENCHMARK_REMOTE_REPO_ROOT}"
cache_root = "${BIJUX_BENCHMARK_REMOTE_CACHE_ROOT}"
corpus_root = "${BIJUX_BENCHMARK_REMOTE_CORPUS_ROOT}"
results_root = "${BIJUX_BENCHMARK_REMOTE_RESULTS_ROOT}"
results_legacy_root = "${BIJUX_BENCHMARK_REMOTE_RESULTS_LEGACY_ROOT}"
extra_data_root = "${BIJUX_BENCHMARK_REMOTE_EXTRA_DATA_ROOT}"
containers_root = "${BIJUX_BENCHMARK_REMOTE_CONTAINERS_ROOT}"
reference_root = "${BIJUX_BENCHMARK_REMOTE_REFERENCE_ROOT}"

[artifacts.fastq_deplete_host]
reference_index_template = "benchmark/fastq.deplete_host/{reference_catalog_id}/{reference_index_backend}/index"

[artifacts.fastq_screen_taxonomy]
database_root_template = "benchmark/fastq.screen_taxonomy/{database_namespace}/{database_scope}/{database_artifact_id}"

[layout.stage_runs]
remote_results_template = "{corpus_id}/{stage_id}/lunarc"
local_cache_results_template = "results/{corpus_id}/{stage_id}/lunarc"
local_archive_results_template = "{corpus_id}/{stage_id}/lunarc"

[sync.defaults]
pull_base = "${BIJUX_BENCHMARK_PULL_BASE}"
pull_mode = "results"
include_profile = "pull-results-default"
exclude_profile = "pull-full-default"
clean_context = true
allow_dirty = false
include_containers_manifest = false
data_manifest_glob = ""

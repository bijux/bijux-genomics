# schema_version = 1
# owner = bijux-dna-bench
# purpose = Compatibility shim for legacy publication-only benchmark consumers
# authority = bijux-dna
# stability = compatibility
# last_updated = 2026-03-28
# compatibility = Mirrors [publication] from configs/bench/benchmark.toml
# migration = Prefer configs/bench/benchmark.toml for new automation and docs

[[corpus_01.contracts]]
stage_id = "fastq.validate_reads"
scenario_id = "validation_fairness"
sample_scope = "full"
tools = ["fastq_scan", "fastqc", "fastqvalidator", "fqtools", "seqtk"]

[[corpus_01.contracts]]
stage_id = "fastq.detect_adapters"
scenario_id = "detect_adapters_fairness"
sample_scope = "full"
tools = ["fastqc"]

[[corpus_01.contracts]]
stage_id = "fastq.profile_reads"
scenario_id = "profile_reads_fairness"
sample_scope = "full"
tools = ["seqkit_stats"]

[[corpus_01.contracts]]
stage_id = "fastq.profile_read_lengths"
scenario_id = "read_length_fairness"
sample_scope = "full"
tools = ["seqkit_stats"]

[[corpus_01.contracts]]
stage_id = "fastq.profile_overrepresented_sequences"
scenario_id = "overrepresented_sequence_fairness"
sample_scope = "full"
tools = ["fastqc", "fastq_scan", "seqkit"]

[[corpus_01.contracts]]
stage_id = "fastq.normalize_primers"
scenario_id = "primer_normalization_fairness"
sample_scope = "full"
tools = ["cutadapt"]

[[corpus_01.contracts]]
stage_id = "fastq.trim_polyg_tails"
scenario_id = "polyg_trim_fairness"
sample_scope = "full"
tools = ["bbduk", "fastp"]

[[corpus_01.contracts]]
stage_id = "fastq.trim_reads"
scenario_id = "trim_fairness"
sample_scope = "full"
tools = [
  "adapterremoval",
  "alientrimmer",
  "atropos",
  "bbduk",
  "cutadapt",
  "fastp",
  "fastx_clipper",
  "leehom",
  "prinseq",
  "seqkit",
  "skewer",
  "trim_galore",
  "trimmomatic",
]

[[corpus_01.contracts]]
stage_id = "fastq.filter_reads"
scenario_id = "filter_fairness"
sample_scope = "full"
tools = ["bbduk", "fastp", "prinseq", "seqkit"]

[[corpus_01.contracts]]
stage_id = "fastq.filter_low_complexity"
scenario_id = "low_complexity_fairness"
sample_scope = "full"
tools = ["bbduk", "prinseq"]

[[corpus_01.contracts]]
stage_id = "fastq.deplete_rrna"
scenario_id = "rrna_depletion_fairness"
sample_scope = "full"
tools = ["sortmerna"]

[[corpus_01.contracts]]
stage_id = "fastq.merge_pairs"
scenario_id = "merge_fairness"
sample_scope = "paired"
tools = ["adapterremoval", "bbmerge", "flash2", "leehom", "pear", "vsearch"]

[[corpus_01.contracts]]
stage_id = "fastq.remove_duplicates"
scenario_id = "dedup_fairness"
sample_scope = "paired"
tools = ["clumpify", "fastuniq"]

[[corpus_01.contracts]]
stage_id = "fastq.deplete_host"
scenario_id = "host_depletion_fairness"
sample_scope = "full"
tools = ["bowtie2"]

[[corpus_01.contracts]]
stage_id = "fastq.deplete_reference_contaminants"
scenario_id = "contaminant_depletion_fairness"
sample_scope = "full"
tools = ["bowtie2"]

[[corpus_01.contracts]]
stage_id = "fastq.correct_errors"
scenario_id = "correction_fairness"
sample_scope = "paired"
tools = ["bayeshammer", "lighter", "musket", "rcorrector"]

[[corpus_01.contracts]]
stage_id = "fastq.extract_umis"
scenario_id = "umi_extraction_fairness"
sample_scope = "paired"
tools = ["umi_tools"]

[[corpus_01.contracts]]
stage_id = "fastq.screen_taxonomy"
scenario_id = "screen_fairness"
sample_scope = "full"
tools = ["centrifuge", "kaiju", "kraken2", "krakenuniq"]

[[corpus_01.contracts]]
stage_id = "fastq.trim_terminal_damage"
scenario_id = "terminal_damage_fairness"
sample_scope = "full"
tools = ["adapterremoval", "cutadapt", "seqkit"]

[[corpus_01.contracts]]
stage_id = "fastq.report_qc"
scenario_id = "qc_aggregation_fairness"
sample_scope = "full"
tools = ["multiqc"]

[[corpus_01.exclusions]]
stage_id = "fastq.index_reference"
reason = "Reference-index benchmarking measures bundle build throughput rather than sample-cohort execution on corpus-01 FASTQ inputs."

[[corpus_01.exclusions]]
stage_id = "fastq.cluster_otus"
reason = "OTU clustering is amplicon-specific and does not fit the human whole-genome FASTQ cohort contract used by corpus-01."

[[corpus_01.exclusions]]
stage_id = "fastq.normalize_abundance"
reason = "Abundance normalization benchmarks require derived abundance tables rather than the raw FASTQ corpus-01 publication surface."

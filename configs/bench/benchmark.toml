# schema_version = 1
# owner = bijux-dna-bench
# purpose = Contract config for benchmark orchestration, publication, and workspace roots.
# authority = bijux-dna
# stability = evolving
# last_updated = 2026-03-28

[workspace.local]
results_root = "/Users/bijan/bijux/bijux-dna-results"
cache_mirror_root = "/Users/bijan/bijux/bijux-dna-results/home/bijan/lu2024-12-24/.cache"
extra_data_root = "/Users/bijan/bijux/bijux-dna-results/home/bijan/lu2024-12-24/.cache/extra-data"
reference_root = "/Users/bijan/bijux/bijux-dna-results/home/bijan/lu2024-12-24/.cache/reference"

[workspace.remote]
ssh_host = "lunarc"
repo_root = "/home/bijan/bijux/bijux-dna"
cache_root = "/home/bijan/lu2024-12-24/.cache"
corpus_root = "/home/bijan/lu2024-12-24/.cache/corpus_01"
results_root = "/home/bijan/lu2024-12-24/.cache/results"
results_legacy_root = "/home/bijan/lu2024-12-24/.cache/bijux-dna-results"
extra_data_root = "/home/bijan/lu2024-12-24/.cache/extra-data"
containers_root = "/home/bijan/lu2024-12-24/.cache/bijux-dna-container"
reference_root = "/home/bijan/lu2024-12-24/.cache/reference"

[workspace.artifacts.fastq_deplete_host]
reference_index_template = "benchmark/fastq.deplete_host/{reference_catalog_id}/{reference_index_backend}/index"

[workspace.artifacts.fastq_screen_taxonomy]
database_root_template = "benchmark/fastq.screen_taxonomy/{database_namespace}/{database_scope}/{database_artifact_id}"

[workspace.layout.stage_runs]
remote_results_template = "{corpus_id}/{stage_id}/lunarc"
local_cache_results_template = "results/{corpus_id}/{stage_id}/lunarc"
local_archive_results_template = "{corpus_id}/{stage_id}/lunarc"

[workspace.sync.defaults]
pull_base = "/Users/bijan/bijux/bijux-dna-results"
pull_mode = "results"
include_profile = "pull-results-default"
exclude_profile = "pull-full-default"
clean_context = true
allow_dirty = false
include_containers_manifest = false
data_manifest_glob = ""

[corpora.corpus-01]
spec_path = "configs/runtime/corpora/corpus-01.toml"

[stage_inputs.fastq_deplete_rrna]
rrna_db = "/home/bijan/lu2024-12-24/.cache/extra-data/benchmark/fastq.deplete_rrna/sortmerna_v4_3_default_db.fasta"
rrna_bundle_id = "sortmerna_v4_3_default_db"
min_identity = "0.95"

[stage_inputs.fastq_deplete_host]
reference_index = "/home/bijan/lu2024-12-24/.cache/extra-data/benchmark/fastq.deplete_host/host_reference/bowtie2_build/index"
reference_catalog_id = "host_reference"
reference_index_backend = "bowtie2_build"

[stage_inputs.fastq_deplete_reference_contaminants]
reference_index = "/home/bijan/lu2024-12-24/.cache/extra-data/benchmark/fastq.deplete_reference_contaminants/contaminant_reference/bowtie2_build/index"
reference_catalog_id = "contaminant_reference"
reference_index_backend = "bowtie2_build"

[stage_inputs.fastq_screen_taxonomy]
database_root = "/home/bijan/lu2024-12-24/.cache/extra-data/benchmark/fastq.screen_taxonomy/read_screening/read_screening/taxonomy_db"
database_catalog_id = "taxonomy_reference"
database_artifact_id = "taxonomy_db"
database_namespace = "read_screening"
database_scope = "read_screening"


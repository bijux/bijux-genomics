[shared_tools.samtools]
domains = ["fastq", "bam"]
default_version = "1.21"
license = "MIT"
upstream = "https://github.com/samtools/samtools"

[shared_tools.bowtie2]
domains = ["fastq", "bam"]
default_version = "2.5.4"
license = "GPL-3.0"
upstream = "https://github.com/BenLangmead/bowtie2"

[shared_tools.angsd]
domains = ["bam", "vcf"]
default_version = "0.940"
license = "GPL-3.0"
upstream = "https://github.com/ANGSD/angsd"

[shared_tools.multiqc]
domains = ["fastq", "bam"]
default_version = "1.24"
license = "GPL-3.0"
upstream = "https://github.com/multiqc/multiqc"

schema_version = "bijux.bench-suite.fastq.v1"
suite_id = "bench-suite-01-fastq-5stages"
corpus = "corpus-01"
repetitions = 3

[resource_hints]
threads = 16
mem_gb = 64

[[stages]]
stage = "validate_pre"
tools = ["fastqvalidator_official"]

[[stages]]
stage = "trim"
tools = ["bbduk", "fastp", "fastx_clipper", "seqkit"]

[[stages]]
stage = "filter"
tools = ["fastp", "seqkit"]

[[stages]]
stage = "stats"
tools = ["seqkit_stats"]

[[stages]]
stage = "qc_post"
tools = ["multiqc", "samtools"]

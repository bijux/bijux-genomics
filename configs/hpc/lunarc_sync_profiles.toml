# schema_version = 1
# owner = platform
# purpose = Contract config for configs/hpc/lunarc_sync_profiles.toml
# authority = platform
# stability = stable
# last_updated = 2026-02-13

[[profiles]]
name = "push-default"
exclude_file = "configs/hpc/rsync/push-excludes.txt"

[[profiles]]
name = "pull-full-default"
exclude_file = "configs/hpc/rsync/pull-full-excludes.txt"

[[profiles]]
name = "pull-results-default"
include_file = "configs/hpc/rsync/pull-results-includes.txt"

[[profiles]]
name = "pull-benchmark-publication"
mode = "results"
include_file = "configs/hpc/rsync/pull-results-includes.txt"
workspace_scope = "corpus-01-fastq-publication"
pull_destination = "local.results_root"
remote_roots = [
  "remote.results_root",
  "remote.extra_data_root",
]
data_manifest_globs = [
  "benchmark/fastq.screen_taxonomy/read_screening/read_screening/taxonomy_db/lineage.tsv",
]
